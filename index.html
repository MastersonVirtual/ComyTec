<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComyTec - Gestión de Instalaciones</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --navy: #003366;
        --navy-soft: #0d457d;
        --bg: #f3f7fb;
        --card: #ffffff;
        --border: #d8e2ef;
        --text: #1f2a37;
        --muted: #637387;
        --ok: #14a44d;
        --pause: #d64545;
        --pending: #f0ad4e;
        --contract: #6c757d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Inter', Arial, sans-serif;
        background: linear-gradient(180deg, #e9f0f8 0%, var(--bg) 180px);
        color: var(--text);
      }

      .dashboard {
        max-width: 1200px;
        margin: 24px auto;
        padding: 0 16px 24px;
      }

      .header {
        background: var(--navy);
        color: #fff;
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 10px 28px rgba(0, 30, 60, 0.2);
      }

      .header h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .header p {
        margin: 8px 0 0;
        color: #d2e6ff;
        font-size: 0.95rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        margin-bottom: 16px;
      }

      .card h2 {
        margin: 0 0 12px;
        color: var(--navy);
        font-size: 1.1rem;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 12px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #27425b;
      }

      input,
      select,
      textarea,
      button {
        font-family: inherit;
        font-size: 0.95rem;
        border-radius: 10px;
        border: 1px solid #cbd8e7;
        padding: 10px 12px;
        outline: none;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--navy-soft);
        box-shadow: 0 0 0 3px rgba(13, 69, 125, 0.14);
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .actions {
        grid-column: 1 / -1;
      }

      button {
        background: var(--navy);
        color: #fff;
        border: 1px solid var(--navy);
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: var(--navy-soft);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.75;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 780px;
      }

      th,
      td {
        text-align: left;
        padding: 11px;
        border-bottom: 1px solid #e4edf7;
        font-size: 0.92rem;
        vertical-align: top;
      }

      th {
        color: var(--navy);
        background: #f5f9ff;
        position: sticky;
        top: 0;
      }

      .state-badge {
        display: inline-block;
        font-size: 0.78rem;
        font-weight: 700;
        padding: 5px 9px;
        border-radius: 999px;
        color: #fff;
        letter-spacing: 0.2px;
      }

      .state-ongoing {
        background: var(--ok);
      }

      .state-pausa {
        background: var(--pause);
      }

      .state-pendiente {
        background: var(--pending);
      }

      .state-contrato {
        background: var(--contract);
      }

      .empty {
        text-align: center;
        color: var(--muted);
        padding: 18px;
      }

      .footer-note {
        color: var(--muted);
        margin-top: 8px;
        font-size: 0.85rem;
      }

      @media (max-width: 860px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useState } = React;

      const firebaseConfig = {
        apiKey: 'AIzaSyCXTX7h33uCXK4K8FSSnD7PcoayjAGV9x4',
        authDomain: 'mastersonvirtual-c0742.firebaseapp.com',
        projectId: 'mastersonvirtual-c0742',
        storageBucket: 'mastersonvirtual-c0742.firebasestorage.app',
        messagingSenderId: '465591582078',
        appId: '1:465591582078:web:0a8b71792c842a67e5872f',
      };

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      const db = firebase.firestore();

      const TIPO_ACCIONES = [
        'Nuevo Servicio',
        'Nuevo Servicio Obra',
        'Agregados/Adicionales',
        'Novación',
        'Movimiento de Obra',
        'Baja de Servicio',
        'Solicitud de Presupuesto',
      ];

      const RESPONSABLES = ['Comercial', 'Atención al Cliente', 'Ayrton Oviedo', 'Gaston', 'Gonzalo'];

      const ESTADOS = ['ONGOING', 'PAUSA', 'Pendiente de Agenda', 'Contrato no Firmado'];

      function getStateClass(estado) {
        if (estado === 'ONGOING') return 'state-badge state-ongoing';
        if (estado === 'PAUSA') return 'state-badge state-pausa';
        if (estado === 'Pendiente de Agenda') return 'state-badge state-pendiente';
        return 'state-badge state-contrato';
      }

      function App() {
        const [tipoAccion, setTipoAccion] = useState(TIPO_ACCIONES[0]);
        const [nombreServicioCliente, setNombreServicioCliente] = useState('');
        const [responsable, setResponsable] = useState(RESPONSABLES[0]);
        const [estado, setEstado] = useState(ESTADOS[0]);
        const [detalles, setDetalles] = useState('');
        const [instalaciones, setInstalaciones] = useState([]);
        const [guardando, setGuardando] = useState(false);

        useEffect(() => {
          const ref = db
            .collection('instalaciones')
            .orderBy('creadoEn', 'desc')
            .onSnapshot(
              (snapshot) => {
                const rows = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
                setInstalaciones(rows);
              },
              (error) => {
                console.error('Error escuchando instalaciones:', error);
              }
            );

          return () => ref();
        }, []);

        async function handleSubmit(e) {
          e.preventDefault();

          if (!nombreServicioCliente.trim()) {
            alert('Ingresá el Nombre del Servicio/Cliente.');
            return;
          }

          try {
            setGuardando(true);

            await db.collection('instalaciones').add({
              tipoAccion,
              nombreServicioCliente: nombreServicioCliente.trim(),
              responsable,
              estado,
              detalles: detalles.trim(),
              creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
            });

            setTipoAccion(TIPO_ACCIONES[0]);
            setNombreServicioCliente('');
            setResponsable(RESPONSABLES[0]);
            setEstado(ESTADOS[0]);
            setDetalles('');
          } catch (error) {
            console.error('Error al guardar instalación:', error);
            alert('No se pudo guardar. Revisá la consola para más detalle.');
          } finally {
            setGuardando(false);
          }
        }

        return (
          <div className="dashboard">
            <header className="header">
              <h1>ComyTec - Gestión de Instalaciones</h1>
              <p>Panel operativo para seguimiento comercial y técnico en tiempo real.</p>
            </header>

            <section className="card">
              <h2>Nuevo Registro</h2>
              <form className="form-grid" onSubmit={handleSubmit}>
                <div className="field">
                  <label>Tipo de Acción</label>
                  <select value={tipoAccion} onChange={(e) => setTipoAccion(e.target.value)}>
                    {TIPO_ACCIONES.map((accion) => (
                      <option key={accion} value={accion}>
                        {accion}
                      </option>
                    ))}
                  </select>
                </div>

                <div className="field">
                  <label>Responsable</label>
                  <select value={responsable} onChange={(e) => setResponsable(e.target.value)}>
                    {RESPONSABLES.map((item) => (
                      <option key={item} value={item}>
                        {item}
                      </option>
                    ))}
                  </select>
                </div>

                <div className="field full">
                  <label>Nombre del Servicio/Cliente</label>
                  <input
                    type="text"
                    value={nombreServicioCliente}
                    onChange={(e) => setNombreServicioCliente(e.target.value)}
                    placeholder="Ej: Instalación Cámaras - Cliente X"
                  />
                </div>

                <div className="field">
                  <label>Estado</label>
                  <select value={estado} onChange={(e) => setEstado(e.target.value)}>
                    {ESTADOS.map((item) => (
                      <option key={item} value={item}>
                        {item}
                      </option>
                    ))}
                  </select>
                </div>

                <div className="field full">
                  <label>Detalles / Comentarios</label>
                  <textarea
                    value={detalles}
                    onChange={(e) => setDetalles(e.target.value)}
                    placeholder="Observaciones, avances, bloqueos, condiciones, etc."
                  ></textarea>
                </div>

                <div className="actions">
                  <button type="submit" disabled={guardando}>
                    {guardando ? 'Guardando...' : 'Guardar en instalaciones'}
                  </button>
                </div>
              </form>
            </section>

            <section className="card">
              <h2>Tabla de Control</h2>
              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Tipo de Acción</th>
                      <th>Servicio / Cliente</th>
                      <th>Responsable</th>
                      <th>Estado</th>
                      <th>Detalles</th>
                    </tr>
                  </thead>
                  <tbody>
                    {instalaciones.length === 0 ? (
                      <tr>
                        <td colSpan="5" className="empty">
                          Sin registros todavía.
                        </td>
                      </tr>
                    ) : (
                      instalaciones.map((item) => (
                        <tr key={item.id}>
                          <td>{item.tipoAccion || '-'}</td>
                          <td>{item.nombreServicioCliente || '-'}</td>
                          <td>{item.responsable || '-'}</td>
                          <td>
                            <span className={getStateClass(item.estado || '')}>{item.estado || '-'}</span>
                          </td>
                          <td>{item.detalles || '-'}</td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
              <p className="footer-note">
                Estados con color: verde (ONGOING), rojo (PAUSA), ámbar (Pendiente de Agenda), gris
                (Contrato no Firmado).
              </p>
            </section>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
