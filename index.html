                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre de servicio</label><input value={agregadoForm.nombreServicio} onChange={(e) => setAgregadoField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Administración</label><input value={agregadoForm.administracion} onChange={(e) => setAgregadoField('administracion', e.target.value)} type="text" placeholder="Consorcio/empresa responsable" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Detalles del Movimiento</h3>
                          <div className="card-grid">
                            <div className="field span-3"><label>Detalles del adicional agregado</label><textarea value={agregadoForm.detalleAdicional} onChange={(e) => setAgregadoField('detalleAdicional', e.target.value)} placeholder="Qué se instaló: cámaras, sensores, controles, etc." /></div>
                            <div className="field"><label>Fecha de alta</label><input value={agregadoForm.fechaAltaAdicional} onChange={(e) => setAgregadoField('fechaAltaAdicional', e.target.value)} type="date" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>3. Control Administrativo y Contable</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Importe a facturar por el adicional instalado</label><input value={agregadoForm.importeFacturarCliente} onChange={(e) => setAgregadoField('importeFacturarCliente', e.target.value)} type="text" placeholder="Monto acordado" /></div>
                            <div className="field"><label>FACTURADO</label><select value={agregadoForm.facturado} onChange={(e) => setAgregadoField('facturado', e.target.value)}><option>Sí</option><option>No</option></select></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : (editingServiceId ? 'Actualizar Operación' : 'Guardar Operación')}</button></div>
                      </div>
                    ) : grupo === 'movimiento-detalle' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Movimiento de Obra</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID asociado</label><input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Identificación de la Gestión</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre de servicio</label><input value={movimientoForm.nombreServicio} onChange={(e) => setMovimientoField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Nombre del solicitante</label><input value={movimientoForm.nombreSolicitante} onChange={(e) => setMovimientoField('nombreSolicitante', e.target.value)} type="text" /></div>
                            <div className="field"><label>Fecha del movimiento</label><input value={movimientoForm.fechaMovimiento} onChange={(e) => setMovimientoField('fechaMovimiento', e.target.value)} type="date" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Liquidación y Cobro</h3>
                          <div className="card-grid">
                            <div className="field"><label>Monto en dólares</label><input value={movimientoForm.montoUsd} onChange={(e) => setMovimientoField('montoUsd', e.target.value)} type="number" min="0" /></div>
                            <div className="field"><label>FACTURADO</label><select value={movimientoForm.facturado} onChange={(e) => setMovimientoField('facturado', e.target.value)}><option>Sí</option><option>No</option></select></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : (editingServiceId ? 'Actualizar Operación' : 'Guardar Operación')}</button></div>
                      </div>
                    ) : grupo === 'baja-detalle' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Baja de Servicio</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID asociado</label><input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Identificación del Punto de Baja</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre del Servicio</label><input value={bajaForm.nombreServicio} onChange={(e) => setBajaField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Dirección</label><input value={bajaForm.direccionServicio} onChange={(e) => setBajaField('direccionServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Fecha de Ingreso</label><input value={bajaForm.fechaIngreso} onChange={(e) => setBajaField('fechaIngreso', e.target.value)} type="date" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Contacto y Justificación</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Quien lo Solicita</label><input value={bajaForm.quienSolicita} onChange={(e) => setBajaField('quienSolicita', e.target.value)} type="text" /></div>
                            <div className="field"><label>Motivo de Baja</label><input value={bajaForm.motivoBaja} onChange={(e) => setBajaField('motivoBaja', e.target.value)} type="text" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>3. Detalles Técnicos y Conectividad</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Internet</label><input value={bajaForm.internetEstado} onChange={(e) => setBajaField('internetEstado', e.target.value)} type="text" /></div>
                            <div className="field"><label>Propietario de Equipamiento</label><select value={bajaForm.propietarioEquipamiento} onChange={(e) => setBajaField('propietarioEquipamiento', e.target.value)}><option>S-Video</option><option>Cliente</option><option>Mixto</option></select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>4. Logística de Retiro y Cierre</h3>
                          <div className="card-grid">
                            <div className="field span-3"><label>Equipamiento a Retirar</label><input value={bajaForm.equipamientoRetirar} onChange={(e) => setBajaField('equipamientoRetirar', e.target.value)} type="text" placeholder="Referencia o nombre de planilla" /></div>
                            <div className="field span-3"><label>Observaciones</label><textarea value={bajaForm.observaciones} onChange={(e) => setBajaField('observaciones', e.target.value)} /></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : (editingServiceId ? 'Actualizar Operación' : 'Guardar Operación')}</button></div>
                      </div>
                    ) : grupo === 'charla-detalle' ? (
                      <div className="charla-studio">
                        <div className="charla-main">
                          <section className="charla-panel">
                            <h4>Charla Informativa · Diseño operativo</h4>
                            <div className="charla-hero">
                              <div className="charla-micro"><b>Cliente ID asociado</b><input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio/proyecto" /></div>
                              <div className="charla-micro"><b>Status</b><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                              <div className="charla-micro"><b>Nombre del servicio</b><input value={charlaForm.nombreServicio} onChange={(e) => setCharlaField('nombreServicio', e.target.value)} type="text" placeholder="Servicio a presentar" /></div>
                            </div>
                          </section>

                          <section className="charla-panel">
                            <h4>Agenda y responsable</h4>
                            <div className="charla-agenda">
                              <div className="field"><label>Responsable de la charla</label><input value={charlaForm.responsableCharla} onChange={(e) => setCharlaField('responsableCharla', e.target.value)} type="text" placeholder="Nombre y apellido" /></div>
                              <div className="field"><label>Fecha</label><input value={charlaForm.fecha} onChange={(e) => setCharlaField('fecha', e.target.value)} type="date" /></div>
                              <div className="field"><label>Hora</label><input value={charlaForm.horario} onChange={(e) => setCharlaField('horario', e.target.value)} type="time" /></div>
                            </div>
                          </section>

                          <section className="charla-panel">
                            <h4>Observaciones del día</h4>
                            <div className="charla-observ">
                              <textarea value={charlaForm.observaciones} onChange={(e) => setCharlaField('observaciones', e.target.value)} placeholder="Accesos, comisión/administración, recomendaciones logísticas, etc." />
                            </div>
                          </section>

                          <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : (editingServiceId ? 'Actualizar Operación' : 'Guardar Operación')}</button></div>
                        </div>

                        <aside className="charla-side">
                          <section className="charla-panel">
                            <h4>Ubicación y mapa</h4>
                            <div className="field" style={{ marginBottom: 10 }}><label>Dirección completa</label><input value={charlaForm.direccion} onChange={(e) => setCharlaField('direccion', e.target.value)} type="text" placeholder="Calle, altura, ciudad" /></div>
                            <div className="charla-map-wrap">
                              {charlaMapUrl ? (
                                <iframe
                                  title="Mapa charla"
                                  src={charlaMapUrl}
                                  loading="lazy"
                                  referrerPolicy="no-referrer-when-downgrade"
                                />
                              ) : (
                                <div className="charla-map-empty">Ingresá la dirección para previsualizar el lugar de la presentación.</div>
                              )}
                            </div>
                          </section>

                          <section className="charla-panel">
                            <h4>Resumen rápido</h4>
                            <div className="charla-summary-item"><small>Responsable</small><strong>{charlaForm.responsableCharla || '-'}</strong></div>
                            <div className="charla-summary-item"><small>Fecha y hora</small><strong>{charlaForm.fecha || '-'} · {charlaForm.horario || '--:--'}</strong></div>
                            <div className="charla-summary-item"><small>Dirección</small><strong>{charlaForm.direccion || '-'}</strong></div>
                            <div className="charla-summary-item"><small>Observaciones</small><strong>{charlaForm.observaciones || '-'}</strong></div>
                          </section>
                        </aside>
                      </div>
) : (
                      <div className="compact-grid">
                        <div className="field"><label>Tipo de Acción</label><select value={tipoAccion} onChange={(e) => { setTipoAccion(e.target.value); resetFields(); }}>{ACCIONES.map((a) => <option key={a} value={a}>{a}</option>)}</select></div>
                        <div className="field"><label>{autoIdMode ? "Cliente ID" : "Cliente ID asociado"}</label>{autoIdMode ? <input value={clienteId} readOnly type="text" /> : <input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" />}</div>
                        <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>

                        {grupo === 'base' && <><div className="field"><label>Cliente</label><input value={cliente} onChange={(e) => setCliente(e.target.value)} /></div><div className="field"><label>Fecha Carga</label><input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" /></div><div className="field"><label>Tiempo Instalación</label><input value={tiempoInstalacion} onChange={(e) => setTiempoInstalacion(e.target.value)} /></div><div className="field"><label>Fecha Alta</label><input value={fechaAlta} onChange={(e) => setFechaAlta(e.target.value)} type="date" /></div><div className="field"><label>Cobro</label><input value={cobro} onChange={(e) => setCobro(e.target.value)} /></div></>}



                        <div className="field full"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : (editingServiceId ? 'Actualizar Operación' : 'Guardar Operación')}</button></div>
                      </div>
                    )}
                  </form>
                </section>
                )}
              </main>

              <div className="app-footer" aria-label="signature">
                <strong>v1.0 | Powered by Alfonso Carballo</strong>
              </div>

              {ENABLE_CLIENT_TRACKING_VIEW && showClientViewModal && isAdminUser && (
                <div className="confirm-modal" onClick={() => setShowClientViewModal(false)}>
                  <div className="client-view-modal" onClick={(e) => e.stopPropagation()}>
                    <h3>Vista Clientes</h3>
                    <div className="hint">Ingresá el Cliente ID (ej: CLI-949017) o el ID del documento de Firebase (ej: 2TC1hWWzANjGrC48HCzA).</div>
                    <div className="field">
                      <label>ID de Operación</label>
                      <input value={clientOperationId} onChange={(e) => setClientOperationId(e.target.value)} type="text" placeholder="Ej: 1024" />
                    </div>
                    <div className="client-view-actions">
                      <button type="button" className="edit-btn" onClick={() => setShowClientViewModal(false)}>Cancelar</button>
                      <button type="button" className="save-btn" onClick={openClientTrackingView}>Ingresar</button>
                    </div>
                  </div>
                </div>
              )}

              {deleteTargetService && isAdminUser && (
                <div className="confirm-modal" onClick={() => { if (!deletingService) setDeleteTargetService(null); }}>
                  <div className="confirm-modal-card" onClick={(e) => e.stopPropagation()}>
                    <h3 style={{ marginTop: 0 }}>Confirmar eliminación segura</h3>
                    <p style={{ margin: '6px 0 0', color: '#d7f4ef' }}>
                      ¿Estás seguro de eliminar este servicio? Se generará un registro de esta acción. El servicio permanecerá oculto pero recuperable por 24 horas antes de su eliminación definitiva.
                    </p>
                    <div className="confirm-modal-actions">
                      <button type="button" className="edit-btn" onClick={() => setDeleteTargetService(null)} disabled={deletingService}>Cancelar</button>
                      <button type="button" className="danger-btn" onClick={handleDeleteServiceConfirm} disabled={deletingService}>{deletingService ? 'Procesando...' : 'Confirmar eliminación'}</button>
                    </div>
                  </div>
                </div>
              )}

              {isMobile && !isGerencia && (
                <>
                  {fabOpen && <div className="mobile-fab-overlay" onClick={() => setFabOpen(false)} />}
                  {fabOpen && (
                    <div className="mobile-fab-menu">
                      {mobileFabSections.map((section) => (
                        <div key={section.title} className="mobile-fab-section">
                          <h4>{section.title}</h4>
                          <div className="mobile-fab-actions">
                            {section.items.map((item) => (
                              <button key={`${section.title}-${item.action}`} className="mobile-fab-action" type="button" onClick={() => { setFabOpen(false); selectAction(item.action); }}>
                                {item.label}
                              </button>
                            ))}
                          </div>
                        </div>
                      ))}
                      <div className="mobile-fab-section mobile-fab-links">
                        <button className="mobile-fab-link" type="button" onClick={() => { setFabOpen(false); setSelectedForm('historial'); setMobileTab('historial'); }}>
                          Historial de servicios
                        </button>
                        {ENABLE_CLIENT_TRACKING_VIEW && isAdminUser && (
                          <button className="mobile-fab-link" type="button" onClick={() => { setFabOpen(false); setShowClientViewModal(true); }}>
                            Vista clientes
                          </button>
                        )}
                        {isAdminUser && (
                          <button className="mobile-fab-link" type="button" onClick={() => { setFabOpen(false); setSelectedForm('dashboard-gerencia'); }}>
                            Vista gerencia
                          </button>
                        )}
                      </div>
                    </div>
                  )}
                  <button className="mobile-fab" type="button" onClick={() => setFabOpen((v) => !v)} aria-label="Abrir formularios">+</button>
                  <nav className="mobile-bottom-nav">
                    <button className={mobileTab === 'home' && selectedForm === 'home' ? 'active' : ''} type="button" onClick={() => { setMobileTab('home'); setSelectedForm('home'); }}><i data-lucide="house" />Inicio</button>
                    <button className={mobileTab === 'servicios' ? 'active' : ''} type="button" onClick={() => { setMobileTab('servicios'); setSelectedForm('home'); }}><i data-lucide="layers" />Servicios</button>
                    <button className={selectedForm === 'historial' ? 'active' : ''} type="button" onClick={() => { setMobileTab('historial'); setSelectedForm('historial'); setSelectedService(null); }}><i data-lucide="history" />Historial</button>
                    <button className={fabOpen ? 'active' : ''} type="button" onClick={() => setFabOpen((v) => !v)}><i data-lucide="plus-circle" />Formularios</button>
                    {isAdminUser && <button className={selectedForm === 'notificaciones' ? 'active' : ''} type="button" onClick={openNotificationsView}><i data-lucide="bell" />Avisos</button>}
                    <button className={selectedForm === 'perfil' ? 'active' : ''} type="button" onClick={openProfileView}><i data-lucide="user-round" />Perfil</button>
                  </nav>
                </>
              )}

            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
