<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masterson Seguridad</title>
    <style>
      :root {
        --base: #062f2d;
        --motion-fast: 160ms;
        --motion-mid: 240ms;
        --motion-slow: 320ms;
        --base-900: #041f1e;
        --base-700: #0b4e49;
        --text: #ebf6f5;
        --muted: #a9c8c6;
        --accent: #4ee3d1;
        --accent-soft: #97f3e7;
        --line: rgba(255, 255, 255, 0.18);
        --panel: rgba(8, 31, 30, 0.52);
        --panel-2: rgba(10, 44, 42, 0.56);
        --shadow-soft: 0 8px 22px rgba(0, 0, 0, 0.24);
        --shadow-deep: 0 18px 46px rgba(0, 0, 0, 0.34);
        --ok: #2ecc71;
        --pause: #ff6666;
        --chip: #7f8f9a;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; overflow-x: hidden; }
      body {
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(900px 500px at -10% -10%, rgba(78, 227, 209, 0.22), transparent 62%),
          radial-gradient(800px 420px at 115% -15%, rgba(25, 164, 151, 0.25), transparent 62%),
          radial-gradient(700px 500px at 50% 120%, rgba(9, 71, 67, 0.32), transparent 62%),
          linear-gradient(145deg, #011716 0%, var(--base-900) 28%, var(--base) 55%, var(--base-700) 100%);
      }

      .app-shell { min-height: 100vh; display: flex; }
      .sidebar {
        position: fixed; inset: 0 auto 0 0; width: 320px;
        background: linear-gradient(180deg, rgba(4, 25, 24, 0.95), rgba(10, 52, 49, 0.9));
        border-right: 1px solid var(--line);
        backdrop-filter: blur(8px) saturate(120%);
        box-shadow: var(--shadow-deep);
        transform: translateX(-105%);
        transition: transform var(--motion-slow) cubic-bezier(.2,.8,.2,1);
        z-index: 1000;
        overflow-y: auto;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-header {
        padding: 18px;
        font-weight: 800;
        letter-spacing: .5px;
        border-bottom: 1px solid var(--line);
        background: rgba(255,255,255,.06);
      }
      .menu { padding: 12px; }
      .menu-button, .submenu-button {
        width: 100%;
        text-align: left;
        cursor: pointer;
        color: var(--text);
        padding: 12px 13px;
        margin-bottom: 8px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 6px 14px rgba(0,0,0,.2);
        transition: transform var(--motion-fast) ease, background var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
      }
      .menu-button:hover, .submenu-button:hover {
        transform: translateX(5px);
        background: linear-gradient(180deg, rgba(255,255,255,.2), rgba(255,255,255,.08));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 10px 18px rgba(0,0,0,.25);
      }
      .submenu {
        max-height: 0;
        overflow: hidden;
        padding-left: 10px;
        opacity: 0;
        transition: max-height var(--motion-mid) ease, opacity var(--motion-fast) ease;
      }
      .submenu.open { max-height: 420px; opacity: 1; }
      .submenu-button { font-size: 13px; }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(2px);
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--motion-mid) ease;
      }
      .overlay.show { opacity: 1; pointer-events: auto; }
      .content { width: 100%; transition: filter var(--motion-mid) ease; }
      .content.shift { transform: none; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 60;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: linear-gradient(90deg, rgba(3,32,30,.8), rgba(8,66,62,.72));
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(10px) saturate(125%);
        box-shadow: 0 8px 22px rgba(0,0,0,.24);
      }
      .burger {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
        color: #fff;
        font-size: 24px;
        cursor: pointer;
      }
      .top-titles h1 {
        margin: 0;
        font-size: 1.42rem;
        font-weight: 800;
        letter-spacing: .4px;
        text-shadow: 0 4px 16px rgba(0,0,0,.4);
      }
      .top-titles p { margin: 4px 0 0; color: #caeeee; font-size: .9rem; }
      .subtitle-voga { font-family: 'Voga', 'VOGA', 'Didot', 'Bodoni MT', 'Times New Roman', serif; letter-spacing: .9px; }

      .top-search { margin-left: auto; min-width: 220px; max-width: 430px; width: 38%; }
      .top-search input { width: 100%; padding-left: 38px; }
      .search-wrap { position: relative; }
      .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .85; font-size: 14px; }
      .search-preview {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        z-index: 120;
        max-height: 52vh;
        overflow: auto;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(4, 30, 28, .95);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow-deep);
      }
      .search-item { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,.12); cursor: pointer; }
      .search-item:hover { background: rgba(255,255,255,.08); }
      .search-item:last-child { border-bottom: 0; }
      .search-item strong { display: block; }
      .search-item small { color: #bfe2df; }
      .search-detail { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }

      .main { max-width: 1320px; margin: 20px auto; padding: 0 16px 24px; }
      .hero {
        border-radius: 24px;
        padding: 60px 30px;
        text-align: center;
        background: linear-gradient(135deg, rgba(255,255,255,.20), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.28);
        box-shadow: var(--shadow-deep);
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: '';
        position: absolute;
        width: 480px;
        height: 480px;
        top: -260px;
        right: -120px;
        background: radial-gradient(circle, rgba(78,227,209,.35), transparent 60%);
      }
      .hero h2 { margin: 0; font-size: clamp(2rem, 6vw, 4.2rem); letter-spacing: 0.4px; }
      .hero p { margin: 12px 0 0; font-size: clamp(1rem, 2.2vw, 1.5rem); color: #d7f4ef; }

      .panel {
        margin-bottom: 18px;
        border-radius: 22px;
        padding: 20px;
        background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.30);
        backdrop-filter: blur(9px) saturate(120%);
        box-shadow: var(--shadow-soft);
      }
      .panel h2 { margin: 0 0 8px; font-size: 1.25rem; font-weight: 800; letter-spacing: .2px; }
      .hint { color: var(--muted); font-size: 13px; margin-bottom: 12px; }

      .service-layout { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 12px; }
      .service-card {
        grid-column: span 12;
        background: linear-gradient(135deg, rgba(255,255,255,.13), rgba(255,255,255,.04));
        border: 1px solid rgba(255,255,255,.24);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 20px rgba(0,0,0,.2);
        transition: transform var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
      }
      .service-card:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(0,0,0,.26); }
      .service-card h3 {
        margin: 0 0 12px;
        font-size: 15px;
        color: #e8fffb;
        font-weight: 800;
        letter-spacing: .25px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .service-card h3::before { content: '◆'; color: var(--accent); font-size: 12px; }
      .card-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 10px; }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .span-2 { grid-column: span 2; }
      .span-3, .full { grid-column: 1 / -1; }
      label { font-size: 12.8px; font-weight: 650; color: #d8f1f1; line-height: 1.25; word-break: break-word; }

      input, select, button, textarea {
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.30);
        padding: 10px 12px;
        font-size: 14px;
        color: #efffff;
        background: rgba(255,255,255,.10);
        outline: none;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      }
      textarea { min-height: 90px; resize: vertical; }
      input::placeholder, textarea::placeholder { color: #c5dede; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent-soft);
        box-shadow: 0 0 0 3px rgba(123,233,223,.22), 0 8px 18px rgba(0,0,0,.18);
      }
      option { color: #103233; background: #dff3f3; }

      .radio-row, .switch-row, .state-row { display: flex; gap: 12px; flex-wrap: wrap; }
      .radio-pill, .state-pill {
        border: 1px solid rgba(255,255,255,.28);
        border-radius: 999px;
        padding: 8px 10px;
        cursor: pointer;
        background: rgba(255,255,255,.08);
        font-size: 13px;
      }
      .radio-pill input, .state-pill input { display: none; }
      .radio-pill.active, .state-pill.active { background: rgba(255,255,255,.26); }

      .save-btn {
        width: 100%;
        background: linear-gradient(135deg, #0e756f, #064745);
        border-color: rgba(255,255,255,.40);
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 12px 26px rgba(0,0,0,.28);
        transition: transform var(--motion-fast) ease, filter var(--motion-fast) ease;
      }
      .save-btn:hover { transform: translateY(-1px); filter: brightness(1.06); }

      .compact-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 12px; }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; min-width: 950px; border-collapse: separate; border-spacing: 0; overflow: hidden; border-radius: 14px; }
      th, td { padding: 10px; text-align: left; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,.16); }
      tr.detail-row td { background: rgba(255,255,255,.06); }
      .detail-box { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: #d8efef; line-height: 1.45; }
      .link-btn { border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.12); color: #eaf7f7; border-radius: 8px; padding: 6px 8px; cursor: pointer; }
      th { position: sticky; top: 0; background: rgba(255,255,255,.18); }
      .chip { display: inline-block; padding: 4px 8px; border-radius: 999px; color: #fff; font-size: 12px; font-weight: 700; }
      .status-ongoing { background: var(--ok); }
      .status-pausa { background: var(--pause); }
      .status-default { background: var(--chip); }
      .muted { color: var(--muted); }

      .history-grid { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 12px; }
      .widget {
        background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.28);
        border-radius: 16px;
        padding: 13px;
        box-shadow: var(--shadow-soft);
        position: relative;
      }
      .widget::after {
        content: '';
        position: absolute;
        inset: 0 auto 0 0;
        width: 3px;
        border-radius: 16px 0 0 16px;
        background: linear-gradient(var(--accent), transparent 70%);
        opacity: .9;
      }
      .widget h4 { margin: 0 0 8px; font-size: 13px; color: #d7f4ef; }
      .kv { font-size: 12px; color: #bfe2df; margin: 4px 0; }
      .kv b { color: #ffffff; font-weight: 700; }
      .widget.full { grid-column: 1 / -1; }



      /* Dashboard ERP corporativo SaaS */
      :root {
        --base: #005255;
        --base-900: #003f41;
        --base-700: #0a6666;
        --highlight: #e6fffd;
        --bg-main: #0f172a;
        --bg-surface: #1f2937;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #005255;
        --accent-soft: rgba(0, 100, 101, 0.18);
        --line: #d8e1ea;
        --panel: #ffffff;
        --panel-2: #f8fbfb;
        --shadow-soft: 0 10px 20px rgba(0,0,0,0.08);
        --shadow-deep: 0 20px 40px rgba(0,0,0,0.12);
        --ok: #10b981;
        --pause: #ef4444;
        --chip: #94a3b8;
      }

      * {
        transition: all 0.2s cubic-bezier(.4,0,.2,1);
      }

      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-thumb {
        background: var(--base);
        border-radius: 10px;
      }
      *::-webkit-scrollbar-track {
        background: rgba(230,255,253,.14);
      }

      body {
        color: var(--text);
        background:
          radial-gradient(860px 420px at -12% -10%, rgba(0, 100, 101, .23), transparent 60%),
          radial-gradient(740px 360px at 112% -12%, rgba(11, 123, 123, .18), transparent 60%),
          linear-gradient(180deg, #1f2937 0%, #111827 50%, #0b1220 100%);
      }

      .sidebar {
        width: 286px;
        background: linear-gradient(180deg, var(--base) 0%, var(--base-900) 100%);
        border-right: 1px solid rgba(230,255,253,.16);
        box-shadow: var(--shadow-deep);
      }
      .sidebar-header {
        background: rgba(230,255,253,.08);
        color: #e6fffd;
        border-bottom-color: rgba(230,255,253,.16);
      }
      .menu {
        padding: 14px;
      }
      .menu-button, .submenu-button {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #e6fffd;
        border: 1px solid rgba(230,255,253,.18);
        background: rgba(230,255,253,.08);
        border-radius: 12px;
        padding: 12px 14px;
      }
      .menu-button:hover, .submenu-button:hover {
        transform: translateX(4px);
        background: rgba(230,255,253,.18);
        box-shadow: 0 10px 20px rgba(0,0,0,.2);
      }

      .topbar {
        background: var(--base);
        border-bottom: 1px solid var(--base-700);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 24px rgba(0,0,0,.18);
      }
      .burger {
        color: transparent;
        border-color: rgba(230,255,253,.45);
        border-radius: 14px;
        padding: 0;
        overflow: hidden;
        background-color: rgba(255,255,255,.08);
        background-image: url('https://i.postimg.cc/0jMF5Jpk/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        box-shadow: 0 8px 16px rgba(0,0,0,.18);
      }
      .top-titles h1 {
        color: #e6fffd;
        letter-spacing: .2px;
        text-shadow: none;
      }
      .top-titles p {
        color: #d8fbf8;
        letter-spacing: .07em;
      }
      .subtitle-voga {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-weight: 700;
      }

      .top-search {
        max-width: 460px;
      }
      .search-icon { color: #64748b; opacity: 1; }
      .top-search input {
        border-radius: 12px;
        border: 1px solid #d6dee8;
        background: #ffffff;
        box-shadow: 0 4px 10px rgba(15, 23, 42, .05);
      }
      .search-preview {
        background: var(--base);
        border: 1px solid rgba(230,255,253,.3);
        box-shadow: var(--shadow-deep);
      }
      .search-item { border-bottom: 1px solid rgba(230,255,253,.2); color: #ffffff; }
      .search-item:hover { background: var(--base-700); }
      .search-item small { color: #e6fffd; }
      .search-detail {
        color: #e6fffd;
        border-top-color: rgba(230,255,253,.3);
        background: rgba(0, 78, 80, .86);
      }

      .main {
        max-width: 1360px;
        margin: 26px auto;
      }
      .hero,
      .panel,
      .service-card,
      .widget,
      .kpi-card {
        background: #006465;
        border: 1px solid rgba(230,255,253,.25);
        box-shadow: var(--shadow-soft);
      }
      .hero {
        border-radius: 18px;
        padding: 64px 34px;
        background: linear-gradient(140deg, #004c4d 0%, #006465 58%, #0b7b7b 100%);
      }
      .hero::before {
        background: radial-gradient(circle, rgba(230,255,253,.28), transparent 62%);
      }
      .hero h2, .hero p { color: #e6fffd; }

      .panel {
        border-radius: 14px;
        padding: 24px;
      }
      .panel h2, .service-card h3, .widget h4 {
        color: #e6fffd;
      }
      .hint, .kv {
        color: #d1faf5;
      }

      .service-layout { gap: 18px; }
      .service-card {
        border-radius: 14px;
        padding: 22px;
      }
      .service-card h3,
      .service-card label,
      .service-card .hint,
      .service-card .muted,
      .service-card .kv,
      .service-card .detail-box {
        color: #e6fffd;
      }
      .service-card h3::before {
        color: var(--base);
      }
      .service-card:hover,
      .widget:hover,
      .kpi-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 26px rgba(0,0,0,0.12);
      }
      .card-grid, .compact-grid, .history-grid { gap: 16px; }

      .kpi-grid {
        margin-top: 24px;
        display: grid;
        grid-template-columns: repeat(4, minmax(160px, 1fr));
        gap: 18px;
        align-items: start;
      }
      .kpi-card-wrap {
        position: relative;
      }
      .kpi-card {
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
      }
      .kpi-card.active {
        border-color: #006465;
        box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      }
      .kpi-value {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        color: #e6fffd;
      }
      .kpi-label {
        margin-top: 8px;
        color: #d1faf5;
        font-size: .8rem;
        text-transform: uppercase;
        letter-spacing: .08em;
      }
      .kpi-breakdown {
        margin-top: 10px;
        border-radius: 14px;
        padding: 14px;
        background: #006465;
        border: 1px solid rgba(230,255,253,.25);
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        color: #e6fffd;
      }
      .kpi-breakdown h3 {
        margin: 0 0 12px;
        font-size: 0.95rem;
        color: #e6fffd;
      }
      .kpi-breakdown-list {
        display: grid;
        gap: 8px;
      }
      .kpi-breakdown-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(230,255,253,.1);
      }
      .kpi-breakdown-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .kpi-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--dot-color, #22c55e);
        box-shadow: 0 0 0 2px rgba(255,255,255,.18);
      }
      .kpi-breakdown-count {
        font-weight: 700;
        background: transparent;
        border: 0;
        color: #e6fffd;
        cursor: pointer;
        padding: 0;
      }
      .kpi-breakdown-services {
        width: 100%;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed rgba(230,255,253,.4);
        display: grid;
        gap: 6px;
      }
      .kpi-service-link {
        text-align: left;
        border: 0;
        border-radius: 8px;
        background: rgba(230,255,253,.16);
        color: #e6fffd;
        font-size: 12px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .kpi-service-link:hover {
        background: rgba(230,255,253,.28);
      }

      .ranking-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin: 8px 0 14px;
      }
      .ranking-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(260px, 1fr));
        gap: 14px;
      }
      .ranking-section {
        background: #006465;
        border: 1px solid rgba(230,255,253,.25);
        border-radius: 14px;
        padding: 14px;
      }
      .ranking-section h3 {
        margin: 0 0 8px;
        color: #e6fffd;
        font-size: 1rem;
      }
      .ranking-services {
        display: grid;
        gap: 8px;
      }
      .ranking-service-btn {
        text-align: left;
        border: 1px solid rgba(230,255,253,.2);
        border-radius: 10px;
        background: rgba(230,255,253,.12);
        color: #e6fffd;
        padding: 9px 10px;
        cursor: pointer;
      }
      .ranking-service-btn:hover {
        background: rgba(230,255,253,.22);
      }

      label {
        color: #334155;
        font-weight: 600;
      }
      input, select, button, textarea {
        color: #0f172a;
        background: #ffffff;
        border: 1px solid #d6dee8;
        border-radius: 10px;
        padding: 10px 12px;
        box-shadow: none;
      }
      input::placeholder, textarea::placeholder {
        color: #94a3b8;
      }

          if (type === 'inprogress') return rows.filter((r) => (r.status || '').toLowerCase().includes('curso'));
          if (type === 'completed') return rows.filter((r) => (r.status || '').toLowerCase().includes('complet'));
          return [];

          const pool = getKpiRows(type);
          const counts = pool.reduce((acc, row) => {
            const rep = (row.representanteComercial || 'Sin asignar').trim();
            acc[rep] = (acc[rep] || 0) + 1;
            return acc;
          }, {});

          return Object.entries(counts)
            .map(([name, value]) => ({ name, value }))
            .sort((a, b) => b.value - a.value);
        }

        function getRankColor(index, total) {
          if (total <= 1) return 'hsl(120 70% 45%)';
          const ratio = index / (total - 1);
          const hue = Math.round(120 - ratio * 120);
          return `hsl(${hue} 70% 45%)`;

        async function handleDownloadPdf(service) {
          if (!service || !window.jspdf?.jsPDF) {
            alert('No se pudo cargar el generador de PDF.');
            return;
          }

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: 'mm', format: 'a4' });
          const pageWidth = doc.internal.pageSize.getWidth();
          const margin = 14;
          const topBarHeight = 28;
          const logoUrl = 'https://i.postimg.cc/0jMF5Jpk/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png';

          doc.setFillColor(0, 100, 101);
          doc.rect(0, 0, pageWidth, topBarHeight, 'F');
          doc.setTextColor(230, 255, 253);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(16);
          doc.text('Masterson Seguridad', margin, 10);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10.5);
          doc.text('Área de Coordinación Técnica y Comercial', margin, 17);

          try {
            const imgData = await fetch(logoUrl)
              .then((r) => r.blob())
              .then((blob) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
              }));
            doc.addImage(imgData, 'PNG', pageWidth - 24, 5, 14, 14, undefined, 'FAST');
          } catch (err) {
            console.warn('No se pudo cargar el logo para PDF', err);
          }

          let y = 36;
          doc.setTextColor(20, 23, 28);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(12);
          doc.text(`Servicio: ${service.nombreServicio || '-'}`, margin, y);
          y += 7;
          doc.text(`ID: ${service.clienteId || '-'}`, margin, y);
          y += 7;
          doc.setFont('helvetica', 'normal');
          doc.text(`Fecha de descarga: ${formatNow()}`, margin, y);
          y += 9;

          const detailLines = buildServiceDetailText(service).split('\n');
          doc.setFontSize(10.5);
          detailLines.forEach((line) => {
            const wrapped = doc.splitTextToSize(line, pageWidth - margin * 2);
            if (y > 280) {
              doc.addPage();
              y = 18;
            }
            doc.text(wrapped, margin, y);
            y += wrapped.length * 5 + 1;
          });

          const safeId = String(service.clienteId || 'servicio').replace(/[^a-z0-9_-]/gi, '_');
          const safeName = String(service.nombreServicio || 'detalle').replace(/[^a-z0-9_-]/gi, '_');
          doc.save(`Masterson_${safeId}_${safeName}.pdf`);
        }

        useEffect(() => {
          if (!user) {
            setRows([]);
            return () => {};
          }
          const unsub = db.collection('operaciones').orderBy('creadoEn', 'desc').onSnapshot(
            (snap) => setRows(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
            (err) => console.error('Error onSnapshot:', err)
          );
          return () => unsub();
        }, [user]);

        useEffect(() => {
          const unsub = auth.onAuthStateChanged((currentUser) => {
            setUser(currentUser);
            setAuthLoading(false);
          });
          return () => unsub();
        }, []);

        useEffect(() => {
          if (!user) {
            setNotificationsCount(0);
            return () => {};
          }
          const unsub = db.collection('notificaciones_admin').onSnapshot(
            (snap) => setNotificationsCount(snap.size),
            (err) => console.error('Error notificaciones_admin:', err)
          );
          return () => unsub();
        }, [user]);

        function resetFields() {
          setCliente(''); setFechaCarga(''); setTiempoInstalacion(''); setCosto(''); setStatus('Pendiente');
          setFechaAlta(''); setCobro(''); setFechaRealizado(''); setVerificado(''); setFechaCharla(''); setHora(''); setLugar('');
          setServicioForm(servicioInicial); setObraForm(obraInicial); setNovacionForm(novacionInicial); setAgregadoForm(agregadoInicial); setMovimientoForm(movimientoInicial); setBajaForm(bajaInicial); setCharlaForm(charlaInicial); setClienteId(generarClienteId()); setClienteIdAsociado('');
        }

        function setServicioField(key, value) {
          setServicioForm((prev) => ({ ...prev, [key]: value }));
        }

        function setObraField(key, value) {
          setObraForm((prev) => ({ ...prev, [key]: value }));
        }

        function setNovacionField(key, value) {
          setNovacionForm((prev) => ({ ...prev, [key]: value }));
        }

        function setAgregadoField(key, value) {
          setAgregadoForm((prev) => ({ ...prev, [key]: value }));
        }

        function setMovimientoField(key, value) {
          setMovimientoForm((prev) => ({ ...prev, [key]: value }));
        }

        function setBajaField(key, value) {
          setBajaForm((prev) => ({ ...prev, [key]: value }));
        }

        function setCharlaField(key, value) {
          setCharlaForm((prev) => ({ ...prev, [key]: value }));
        }

        function closeSidebar() {
          setMenuOpen(false);
          setOpenMenus({ nuevo: false, fact: false });
        }

        function toggleSidebar() {
          if (menuOpen) {
            closeSidebar();
            return;
          }
          setMenuOpen(true);
        }

        function selectAction(action) {
          setTipoAccion(action);
          resetFields();
          if (['Nuevo Servicio', 'Obra'].includes(action)) {
            setClienteId(generarClienteId());
            setClienteIdAsociado('');
          } else {
            setClienteId('');
          }
          setSelectedForm(['Nuevo Servicio', 'Obra'].includes(action) ? 'servicio' : 'other');
          closeSidebar();
        }

        async function handleSubmit(e) {
          e.preventDefault();
          if (selectedForm === 'home') return;
          if (!effectiveClienteId) return alert('Debes indicar un Cliente ID asociado para esta acción.');
          const doc = { tipoAccion, clienteId: effectiveClienteId, status, creadoEn: firebase.firestore.FieldValue.serverTimestamp() };

          if (grupo === 'servicio') {
            if (!servicioForm.nombreServicio || !servicioForm.razonSocial || !servicioForm.rut || !servicioForm.fechaAltaServicio) {
              return alert('Completá al menos: Nombre del servicio, Razón social, RUT y Fecha de alta.');
            }
            Object.assign(doc, { ...servicioForm, formulario: 'nuevo-servicio-optimizado' });
          }
          if (grupo === 'obra') {
            if (!obraForm.razonSocial || !obraForm.rut || !obraForm.mailFacturacion || !obraForm.nombreServicio || !obraForm.fechaAlta) {
              return alert('Completá al menos: Razón social, RUT, Mail, Nombre de servicio y Fecha de alta.');
            }
            Object.assign(doc, { ...obraForm, formulario: 'servicio-obra' });
          }
          if (grupo === 'novacion') {
            if (!novacionForm.nombreServicio || !novacionForm.duracionNuevoContratoMeses) {
              return alert('Completá al menos: Nombre del servicio y Duración del nuevo contrato.');
            }
            Object.assign(doc, { ...novacionForm, formulario: 'novacion' });
          }
          if (grupo === 'agregado') {
            if (!agregadoForm.nombreServicio || !agregadoForm.fechaAltaAdicional) {
              return alert('Completá al menos: Nombre del servicio y Fecha de alta del adicional.');
            }
            Object.assign(doc, { ...agregadoForm, formulario: 'agregado' });
          }
          if (grupo === 'base') {
            if (!cliente || !fechaCarga) return alert('Completá Cliente y Fecha Carga.');
            Object.assign(doc, { cliente, fechaCarga, tiempoInstalacion, fechaAlta, cobro });
          }
          if (grupo === 'movimiento-detalle') {
            if (!movimientoForm.nombreServicio || !movimientoForm.nombreSolicitante || !movimientoForm.fechaMovimiento) {
              return alert('Completá al menos: Nombre del servicio, Solicitante y Fecha del movimiento.');
            }
            Object.assign(doc, { ...movimientoForm, formulario: 'movimiento-obra' });
          }
          if (grupo === 'baja-detalle') {
            if (!bajaForm.nombreServicio || !bajaForm.direccionServicio || !bajaForm.fechaIngreso) {
              return alert('Completá al menos: Nombre del servicio, Dirección y Fecha de ingreso.');
            }
            Object.assign(doc, { ...bajaForm, formulario: 'baja-servicio' });
          }
          if (grupo === 'charla-detalle') {
            if (!charlaForm.nombreServicio || !charlaForm.fecha || !charlaForm.horario || !charlaForm.lugarReunion) {
              return alert('Completá al menos: Nombre de servicio, Fecha, Horario y Lugar de reunión.');
            }
            Object.assign(doc, { ...charlaForm, formulario: 'charla-informativa' });
          }

          try {
            setSaving(true);
            await db.collection('operaciones').add(doc);
            resetFields();
          } catch (error) {
            console.error('Error guardando:', error);
            alert('No se pudo guardar en operaciones.');
          } finally {
            setSaving(false);
          }
        }

        if (authLoading) {
          return <div className="login-shell"><div className="login-panel"><h2>Cargando...</h2></div></div>;
        }

        if (!user) {
          return <LoginScreen />;
        }

        return (
          <div className="app-shell">
            <aside className={`sidebar ${menuOpen ? 'open' : ''}`}>
              <div className="sidebar-header">MENÚ OPERATIVO</div>
              <div className="menu">
                <button className="menu-button" onClick={() => { setSelectedForm('home'); setSelectedService(null); setTipoAccion(''); closeSidebar(); }}>Inicio</button>
                <button className="menu-button" onClick={() => setOpenMenus((p) => ({ ...p, nuevo: !p.nuevo }))}>Nuevo {openMenus.nuevo ? '▾' : '▸'}</button>
                <div className={`submenu ${openMenus.nuevo ? 'open' : ''}`}>
                  <button className="submenu-button" onClick={() => selectAction('Nuevo Servicio')}>Servicio</button>
                  <button className="submenu-button" onClick={() => selectAction('Obra')}>Obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Novación')}>Novaciones</button>
                  <button className="submenu-button" onClick={() => selectAction('Agregado')}>Agregados</button>
                  <button className="submenu-button" onClick={() => selectAction('Movimiento de Obra')}>Movimiento de obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Baja')}>Baja de Servicio</button>
                </div>
                <button className="menu-button" onClick={() => setOpenMenus((p) => ({ ...p, fact: !p.fact }))}>Facturación {openMenus.fact ? '▾' : '▸'}</button>
                <div className={`submenu ${openMenus.fact ? 'open' : ''}`}>
                  <button className="submenu-button" onClick={() => selectAction('Agregado')}>Equipos agregados</button>
                  <button className="submenu-button" onClick={() => selectAction('Nuevo Servicio')}>Nuevo servicio</button>
                  <button className="submenu-button" onClick={() => selectAction('Novación')}>Novaciones</button>
                  <button className="submenu-button" onClick={() => selectAction('Obra')}>Nueva Obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Movimiento de Obra')}>Movimiento de Obra</button>
                </div>
                <button className="menu-button" onClick={() => selectAction('Charla')}>Charlas informativas</button>
                <button className="menu-button" onClick={() => { setSelectedForm('historial'); closeSidebar(); }}>Historial de Servicios</button>
                <button className="notification-btn" type="button" title="Notificaciones de contacto admin">
                  🔔 <span className="notification-count">{notificationsCount}</span>
                </button>
                <button className="logout-btn" type="button" onClick={() => auth.signOut()}>Cerrar Sesión</button>
              </div>
            </aside>

            <div className={`overlay ${menuOpen ? 'show' : ''}`} onClick={closeSidebar} />

            <div className={`content ${menuOpen ? 'shift' : ''}`}>
              <header className="topbar">
                <button className="burger" aria-label="Abrir menú" onClick={toggleSidebar} />
                <div className="top-titles">
                  <h1>Masterson Seguridad</h1>
                  <p className="subtitle-voga">ÁREA TÉCNICA Y COMERCIAL</p>
                </div>
                <div className="top-search">
                  <div className="search-wrap">
                    <span className="search-icon">🔍</span>
                    <input
                      type="text"
                      placeholder="Buscar cliente, ID, razón social o dirección..."
                      value={searchTerm}
                      onChange={(e) => { setSearchTerm(e.target.value); setExpandedId(null); }}
                    />
                    {searchTerm.trim() !== '' && (
                      <div className="search-preview">
                        {filteredRows.length === 0 ? (
                          <div className="search-item"><small>Sin resultados.</small></div>
                        ) : (
                          filteredRows.slice(0, 8).map((r) => (
                            <div key={r.id}>
                              <div className="search-item" onClick={() => { setSelectedService(r); setSelectedForm('historial'); setExpandedId(null); setSearchTerm(''); }}>
                                <strong>{r.clienteId || '-'} · {r.nombreServicio || 'Servicio sin nombre'}</strong>
                                <small>Fecha de alta: {r.fechaAlta || '-'}</small>
                              </div>
                              {expandedId === r.id && (
                                <div className="search-detail">
                                  <div className="detail-box">{buildServiceDetailText(r)}</div>
                                </div>
                              )}
                            </div>
                          ))
                        )}
                      </div>
                    )}
                  </div>
                </div>
              </header>

              <main className="main">
                {selectedForm === 'home' ? (
                  <>
                    <section className="hero">
                      <h2>Masterson Seguridad</h2>
                      <p className="subtitle-voga">ÁREA TÉCNICA Y COMERCIAL</p>
                    </section>
                    <section className="kpi-grid">
                      {[
                        { key: 'total', label: 'Servicios totales', value: kpiStats.total },
                        { key: 'pending', label: 'Pendientes', value: kpiStats.pending },
                        { key: 'inprogress', label: 'En curso', value: kpiStats.inprogress },
                        { key: 'completed', label: 'Completados', value: kpiStats.completed },
                      ].map((card) => (
                        <div
                          className="kpi-card-wrap"
                          key={card.key}
                          onMouseEnter={() => setActiveKpi(card.key)}
                          onMouseLeave={() => setActiveKpi((prev) => (prev === card.key ? null : prev))}
                        >
                          <article
                            className={`kpi-card ${activeKpi === card.key ? 'active' : ''}`}
                          >
                            <div className="kpi-value">{card.value}</div>
                            <div className="kpi-label">{card.label}</div>
                          </article>
                          {activeKpi === card.key && (
                            <section className="kpi-breakdown">
                              <h3>{card.key === 'total' ? 'Ranking Comercial · Servicios Totales' : card.key === 'pending' ? 'Ranking Comercial · Pendientes' : card.key === 'inprogress' ? 'Ranking Comercial · En curso' : 'Ranking Comercial · Completados'}</h3>
                              {getCommercialBreakdown(card.key).length === 0 ? (
                                <div className="hint" style={{ color: '#d1faf5', marginBottom: 0 }}>Sin datos para este indicador.</div>
                              ) : (
                                <div className="kpi-breakdown-list">
                                  {getCommercialBreakdown(card.key).map((item, index, arr) => (
                                    <div className="kpi-breakdown-item" key={`${card.key}-${item.name}`}>
                                      <div className="kpi-breakdown-left">
                                        <span className="kpi-dot" style={{ '--dot-color': getRankColor(index, arr.length) }} />
                                        <span>{item.name}</span>
                                      </div>
                                      <button
                                        type="button"
                                        className="kpi-breakdown-count"
                                        onClick={(e) => {
                                          e.stopPropagation();
                                          setSelectedCommercial(item.name);
                                          setSelectedForm('ranking-comercial');
                                          setActiveKpi(null);
                                        }}
                                      >
                                        {item.value} servicios
                                      </button>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </section>
                          )}
                        </div>
                      ))}
                    </section>
                  </>

                ) : selectedForm === 'ranking-comercial' ? (
                  <section className="panel">
                    <h2>Listado de servicios por vendedor</h2>
                    <div className="ranking-toolbar">
                      <div className="hint" style={{ marginBottom: 0 }}>
                        Vendedor seleccionado: <b style={{ color: '#e6fffd' }}>{selectedCommercial || 'Sin asignar'}</b>
                      </div>
                      <button className="pdf-btn" type="button" onClick={() => setSelectedForm('home')}>← Volver a Inicio</button>
                    </div>
                    <div className="ranking-grid">
                      {[
                        { key: 'total', label: 'Servicios totales' },
                        { key: 'pending', label: 'Pendientes' },
                        { key: 'inprogress', label: 'En curso' },
                        { key: 'completed', label: 'Completados' },
                      ].map((section) => {
                        const list = getServicesByCommercial(section.key, selectedCommercial || 'Sin asignar');
                        return (
                          <div className="ranking-section" key={section.key}>
                            <h3>{section.label} · {list.length}</h3>
                            {list.length === 0 ? (
                              <div className="hint" style={{ color: '#d1faf5', marginBottom: 0 }}>Sin servicios en esta sección.</div>
                            ) : (
                              <div className="ranking-services">
                                {list.map((service) => (
                                  <button
                                    type="button"
                                    key={service.id}
                                    className="ranking-service-btn"
                                    onClick={() => {
                                      setSelectedService(service);
                                      setSelectedForm('historial');
                                    }}
                                  >
                                    {service.nombreServicio || 'Servicio sin nombre'} · ID {service.clienteId || '-'}
                                  </button>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </section>
) : selectedForm === 'historial' ? (
                  <section className="panel">
                    <h2>Historial de Servicios · Vista Ejecutiva</h2>
                    <div className="hint">Vista completa del servicio seleccionado desde la vista previa de búsqueda.</div>
                    {!selectedService ? (
                      <div className="hero" style={{padding: '26px 18px'}}>
                        <h2 style={{fontSize:'1.4rem'}}>Selecciona un servicio desde la búsqueda</h2>
                        <p style={{fontSize:'1rem'}}>Usa la lupita arriba y toca una vista previa para ver el detalle completo.</p>
                      </div>
                    ) : (
                      <>
                        <div className="pdf-toolbar">
                          <button className="pdf-btn" type="button" onClick={() => handleDownloadPdf(selectedService)}>📄 Descargar PDF</button>
                        </div>
                        <div className="history-grid">
                        <div className="widget"><h4>Identificación</h4><div className="kv"><b>ID:</b> {selectedService.clienteId || '-'}</div><div className="kv"><b>Nombre:</b> {selectedService.nombreServicio || '-'}</div><div className="kv"><b>Tipo:</b> {selectedService.tipoServicioBrindar || '-'}</div><div className="kv"><b>Dirección:</b> {selectedService.direccionServicio || '-'}</div><div className="kv"><b>Unidades:</b> {selectedService.cantidadUnidades || '-'}</div></div>
                        <div className="widget"><h4>Comercial / Facturación</h4><div className="kv"><b>Representante:</b> {selectedService.representanteComercial || '-'}</div><div className="kv"><b>Razón Social:</b> {selectedService.razonSocial || '-'}</div><div className="kv"><b>RUT:</b> {selectedService.rut || '-'}</div><div className="kv"><b>Mail:</b> {selectedService.mailFacturacion || '-'}</div><div className="kv"><b>Duración:</b> {selectedService.duracionContratoMeses || '-'}</div></div>
                        <div className="widget"><h4>Costos</h4><div className="kv"><b>Importe mensual:</b> {selectedService.importeMensualServicioSinIva || '-'}</div><div className="kv"><b>Costo instalación US$:</b> {selectedService.costoInstalacionUsdSinIva || '-'}</div><div className="kv"><b>Presupuesto proveedor:</b> {selectedService.presupuestoProveedor || '-'}</div><div className="kv"><b>Condición equipamiento:</b> {selectedService.condicionEquipamiento || '-'}</div></div>
                        <div className="widget"><h4>Técnica</h4><div className="kv"><b>Control acceso:</b> {selectedService.condicionControlAcceso || '-'}</div><div className="kv"><b>Tags:</b> {selectedService.tagsPorAptos || '-'}</div><div className="kv"><b>Akuvox:</b> {selectedService.appAkuvox || '-'}</div><div className="kv"><b>Llaves:</b> {selectedService.llavesServicio || '-'}</div></div>
                        <div className="widget"><h4>Instalación</h4><div className="kv"><b>Referente:</b> {selectedService.referenteInstalacion || '-'}</div><div className="kv"><b>Teléfono:</b> {selectedService.telefonoReferenteInstalacion || '-'}</div><div className="kv"><b>Botti contacto:</b> {selectedService.bottiSeContactaCon || '-'}</div><div className="kv"><b>Jornales:</b> {selectedService.cantidadJornalesEstimados || '-'}</div><div className="kv"><b>Fecha inicio:</b> {selectedService.fechaEspecificaInicio || '-'}</div></div>
                        <div className="widget"><h4>Seguimiento</h4><div className="kv"><b>Tipo acción:</b> {selectedService.tipoAccion || '-'}</div><div className="kv"><b>Status:</b> {selectedService.status || '-'}</div><div className="kv"><b>Fecha ingreso:</b> {selectedService.fechaIngresoDatos || selectedService.fechaCarga || selectedService.fechaCharla || '-'}</div><div className="kv"><b>Proyecto:</b> {selectedService.proyectoServicio || '-'}</div></div>
                        <div className="widget full"><h4>Observaciones y Excepciones</h4><div className="detail-box">Observaciones: {selectedService.observacionesComentarios || '-'}

Excepciones: {selectedService.excepcionesAcordadas || '-'}</div></div>
                      </div>
                      </>
                    )}
                  </section>
                ) : (
                <section className="panel">
                  <h2>Formulario Operativo · Gestión de Acciones</h2>
                  <div className="hint">Nuevo Servicio conserva su formulario actual y Obra usa el formulario nuevo solicitado.</div>

                  <form onSubmit={handleSubmit}>
                    {grupo === 'servicio' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Nuevo Servicio</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID</label><input value={clienteId} readOnly type="text" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Identificación del Cliente (Datos Fiscales)</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre de servicio</label><input value={servicioForm.nombreServicio} onChange={(e) => setServicioField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Administración</label><input value={servicioForm.administracion} onChange={(e) => setServicioField('administracion', e.target.value)} type="text" /></div>
                            <div className="field"><label>Razón social</label><input value={servicioForm.razonSocial} onChange={(e) => setServicioField('razonSocial', e.target.value)} type="text" /></div>
                            <div className="field"><label>RUT</label><input value={servicioForm.rut} onChange={(e) => setServicioField('rut', e.target.value)} type="text" /></div>
                            <div className="field span-2"><label>Mail</label><input value={servicioForm.mailFacturacion} onChange={(e) => setServicioField('mailFacturacion', e.target.value)} type="email" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Clasificación y Vigencia</h3>
                          <div className="card-grid">
                            <div className="field"><label>Tipo de servicio</label><select value={servicioForm.tipoServicioBrindar} onChange={(e) => setServicioField('tipoServicioBrindar', e.target.value)}><option>Monitoreo</option><option>Portería</option><option>Mantenimiento</option><option>Control de Acceso</option><option>Portería Virtual</option></select></div>
                            <div className="field"><label>Fecha de alta</label><input value={servicioForm.fechaAltaServicio} onChange={(e) => setServicioField('fechaAltaServicio', e.target.value)} type="date" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>3. Liquidación Económica (Conceptos a Cobrar)</h3>
                          <div className="card-grid">
                            <div className="field"><label>Importe mensual por servicio</label><input value={servicioForm.importeMensualServicioSinIva} onChange={(e) => setServicioField('importeMensualServicioSinIva', e.target.value)} type="number" min="0" /></div>
                            <div className="field"><label>Importe mensual por arrendamiento</label><input value={servicioForm.importeMensualArrendamiento} onChange={(e) => setServicioField('importeMensualArrendamiento', e.target.value)} type="number" min="0" /></div>
                            <div className="field"><label>Importe por compra de equipamiento</label><input value={servicioForm.importeCompraEquipamiento} onChange={(e) => setServicioField('importeCompraEquipamiento', e.target.value)} type="number" min="0" /></div>
                            <div className="field span-3"><label>Descuentos negociados</label><textarea value={servicioForm.descuentosNegociados} onChange={(e) => setServicioField('descuentosNegociados', e.target.value)} /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>4. Control de Cierre</h3>
                          <div className="card-grid">
                            <div className="field"><label>FACTURADO</label><select value={servicioForm.facturado} onChange={(e) => setServicioField('facturado', e.target.value)}><option>Sí</option><option>No</option></select></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    ) : grupo === 'obra' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Nueva Obra</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID</label><input value={clienteId} readOnly type="text" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Datos Fiscales (Cabezal de Factura)</h3>
                          <div className="card-grid">
                            <div className="field"><label>Razón social</label><input value={obraForm.razonSocial} onChange={(e) => setObraField('razonSocial', e.target.value)} type="text" /></div>
                            <div className="field"><label>RUT</label><input value={obraForm.rut} onChange={(e) => setObraField('rut', e.target.value)} type="text" /></div>
                            <div className="field span-2"><label>Mail</label><input value={obraForm.mailFacturacion} onChange={(e) => setObraField('mailFacturacion', e.target.value)} type="email" /></div>
                            <div className="field span-2"><label>Nombre de servicio</label><input value={obraForm.nombreServicio} onChange={(e) => setObraField('nombreServicio', e.target.value)} type="text" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Configuración del Abono</h3>
                          <div className="card-grid">
                            <div className="field"><label>Tipo de servicio</label><select value={obraForm.tipoServicioBrindar} onChange={(e) => setObraField('tipoServicioBrindar', e.target.value)}><option>Monitoreo</option><option>Portería</option><option>Mantenimiento</option><option>Control de Acceso</option><option>Portería Virtual</option></select></div>
                            <div className="field"><label>Importe mensual por servicio</label><input value={obraForm.importeMensualServicio} onChange={(e) => setObraField('importeMensualServicio', e.target.value)} type="number" min="0" /></div>
                            <div className="field span-2"><label>Descuentos negociados</label><textarea value={obraForm.descuentosNegociados} onChange={(e) => setObraField('descuentosNegociados', e.target.value)} /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>3. Control de Ciclo y Estado</h3>
                          <div className="card-grid">
                            <div className="field"><label>Fecha de alta</label><input value={obraForm.fechaAlta} onChange={(e) => setObraField('fechaAlta', e.target.value)} type="date" /></div>
                            <div className="field"><label>FACTURADO</label><select value={obraForm.facturado} onChange={(e) => setObraField('facturado', e.target.value)}><option>Sí</option><option>No</option></select></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    ) : grupo === 'novacion' ? (
                      <div className="service-layout bento-grid facturacion-module">
                        <div className="service-card">
                          <h3>Facturación · Novaciones</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID asociado</label><input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Identificación y Vigencia</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre de servicio</label><input value={novacionForm.nombreServicio} onChange={(e) => setNovacionField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Duración del nuevo contrato</label><input value={novacionForm.duracionNuevoContratoMeses} onChange={(e) => setNovacionField('duracionNuevoContratoMeses', e.target.value)} type="number" min="0" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Actualización de Abonos Mensuales</h3>
                          <div className="card-grid">
                            <div className="field"><label>Nuevo importe de la novación</label><input value={novacionForm.nuevoImporteNovacion} onChange={(e) => setNovacionField('nuevoImporteNovacion', e.target.value)} type="number" min="0" /></div>
                            <div className="field"><label>Nuevo importe por arrendamiento</label><input value={novacionForm.nuevoImporteArrendamiento} onChange={(e) => setNovacionField('nuevoImporteArrendamiento', e.target.value)} type="number" min="0" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>3. Cargos por Única Vez y Respaldo</h3>
                          <div className="card-grid">
                            <div className="field"><label>Importe por venta de equipos</label><input value={novacionForm.importeVentaEquipos} onChange={(e) => setNovacionField('importeVentaEquipos', e.target.value)} type="number" min="0" /></div>
                            <div className="field span-2"><label>Detalle del equipamiento</label><textarea value={novacionForm.detalleEquipamiento} onChange={(e) => setNovacionField('detalleEquipamiento', e.target.value)} /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>4. Ajustes y Cierre de Ciclo</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Descuentos en el pago</label><textarea value={novacionForm.descuentosPago} onChange={(e) => setNovacionField('descuentosPago', e.target.value)} /></div>
                            <div className="field"><label>FACTURADO</label><select value={novacionForm.facturado} onChange={(e) => setNovacionField('facturado', e.target.value)}><option>Sí</option><option>No</option></select></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    ) : grupo === 'agregado' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Equipos Agregados</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID asociado</label><input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Identificación del Servicio</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre de servicio</label><input value={agregadoForm.nombreServicio} onChange={(e) => setAgregadoField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Administración</label><input value={agregadoForm.administracion} onChange={(e) => setAgregadoField('administracion', e.target.value)} type="text" placeholder="Consorcio/empresa responsable" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Detalles del Movimiento</h3>
                          <div className="card-grid">
                            <div className="field span-3"><label>Detalles del adicional agregado</label><textarea value={agregadoForm.detalleAdicional} onChange={(e) => setAgregadoField('detalleAdicional', e.target.value)} placeholder="Qué se instaló: cámaras, sensores, controles, etc." /></div>
                            <div className="field"><label>Fecha de alta</label><input value={agregadoForm.fechaAltaAdicional} onChange={(e) => setAgregadoField('fechaAltaAdicional', e.target.value)} type="date" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>3. Control Administrativo y Contable</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Importe a facturar por el adicional instalado</label><input value={agregadoForm.importeFacturarCliente} onChange={(e) => setAgregadoField('importeFacturarCliente', e.target.value)} type="text" placeholder="Monto acordado" /></div>
                            <div className="field"><label>FACTURADO</label><select value={agregadoForm.facturado} onChange={(e) => setAgregadoField('facturado', e.target.value)}><option>Sí</option><option>No</option></select></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    ) : grupo === 'movimiento-detalle' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Movimiento de Obra</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID asociado</label><input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Identificación de la Gestión</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre de servicio</label><input value={movimientoForm.nombreServicio} onChange={(e) => setMovimientoField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Nombre del solicitante</label><input value={movimientoForm.nombreSolicitante} onChange={(e) => setMovimientoField('nombreSolicitante', e.target.value)} type="text" /></div>
                            <div className="field"><label>Fecha del movimiento</label><input value={movimientoForm.fechaMovimiento} onChange={(e) => setMovimientoField('fechaMovimiento', e.target.value)} type="date" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Liquidación y Cobro</h3>
                          <div className="card-grid">
                            <div className="field"><label>Monto en dólares</label><input value={movimientoForm.montoUsd} onChange={(e) => setMovimientoField('montoUsd', e.target.value)} type="number" min="0" /></div>
                            <div className="field"><label>FACTURADO</label><select value={movimientoForm.facturado} onChange={(e) => setMovimientoField('facturado', e.target.value)}><option>Sí</option><option>No</option></select></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    ) : grupo === 'baja-detalle' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Baja de Servicio</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID asociado</label><input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Identificación del Punto de Baja</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre del Servicio</label><input value={bajaForm.nombreServicio} onChange={(e) => setBajaField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Dirección</label><input value={bajaForm.direccionServicio} onChange={(e) => setBajaField('direccionServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Fecha de Ingreso</label><input value={bajaForm.fechaIngreso} onChange={(e) => setBajaField('fechaIngreso', e.target.value)} type="date" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Contacto y Justificación</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Quien lo Solicita</label><input value={bajaForm.quienSolicita} onChange={(e) => setBajaField('quienSolicita', e.target.value)} type="text" /></div>
                            <div className="field"><label>Motivo de Baja</label><input value={bajaForm.motivoBaja} onChange={(e) => setBajaField('motivoBaja', e.target.value)} type="text" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>3. Detalles Técnicos y Conectividad</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Internet</label><input value={bajaForm.internetEstado} onChange={(e) => setBajaField('internetEstado', e.target.value)} type="text" /></div>
                            <div className="field"><label>Propietario de Equipamiento</label><select value={bajaForm.propietarioEquipamiento} onChange={(e) => setBajaField('propietarioEquipamiento', e.target.value)}><option>S-Video</option><option>Cliente</option><option>Mixto</option></select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>4. Logística de Retiro y Cierre</h3>
                          <div className="card-grid">
                            <div className="field span-3"><label>Equipamiento a Retirar</label><input value={bajaForm.equipamientoRetirar} onChange={(e) => setBajaField('equipamientoRetirar', e.target.value)} type="text" placeholder="Referencia o nombre de planilla" /></div>
                            <div className="field span-3"><label>Observaciones</label><textarea value={bajaForm.observaciones} onChange={(e) => setBajaField('observaciones', e.target.value)} /></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    ) : grupo === 'charla-detalle' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Charla Informativa</h3>
                          <div className="card-grid">
                            <div className="field"><label>Cliente ID asociado</label><input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio/proyecto" /></div>
                            <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>1. Identificación del Evento</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre de servicio</label><input value={charlaForm.nombreServicio} onChange={(e) => setCharlaField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Fecha</label><input value={charlaForm.fecha} onChange={(e) => setCharlaField('fecha', e.target.value)} type="date" /></div>
                            <div className="field"><label>Horario</label><input value={charlaForm.horario} onChange={(e) => setCharlaField('horario', e.target.value)} type="time" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>2. Localización y Logística</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Lugar de Reunión</label><input value={charlaForm.lugarReunion} onChange={(e) => setCharlaField('lugarReunion', e.target.value)} type="text" /></div>
                            <div className="field"><label>Dirección</label><input value={charlaForm.direccion} onChange={(e) => setCharlaField('direccion', e.target.value)} type="text" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>3. Contacto en el Sitio</h3>
                          <div className="card-grid">
                            <div className="field span-3"><label>Contacto de Referencia para la Charla</label><input value={charlaForm.contactoReferencia} onChange={(e) => setCharlaField('contactoReferencia', e.target.value)} type="text" placeholder="Nombre y teléfono" /></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
) : (
                      <div className="compact-grid">
                        <div className="field"><label>Tipo de Acción</label><select value={tipoAccion} onChange={(e) => { setTipoAccion(e.target.value); resetFields(); }}>{ACCIONES.map((a) => <option key={a} value={a}>{a}</option>)}</select></div>
                        <div className="field"><label>{autoIdMode ? "Cliente ID" : "Cliente ID asociado"}</label>{autoIdMode ? <input value={clienteId} readOnly type="text" /> : <input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" />}</div>
                        <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>

                        {grupo === 'base' && <><div className="field"><label>Cliente</label><input value={cliente} onChange={(e) => setCliente(e.target.value)} /></div><div className="field"><label>Fecha Carga</label><input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" /></div><div className="field"><label>Tiempo Instalación</label><input value={tiempoInstalacion} onChange={(e) => setTiempoInstalacion(e.target.value)} /></div><div className="field"><label>Fecha Alta</label><input value={fechaAlta} onChange={(e) => setFechaAlta(e.target.value)} type="date" /></div><div className="field"><label>Cobro</label><input value={cobro} onChange={(e) => setCobro(e.target.value)} /></div></>}



                        <div className="field full"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    )}
                  </form>
                </section>
                )}
              </main>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
