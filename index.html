<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComyTec - Operaciones</title>
    <style>
      :root {
        --navy: #003366;
        --bg: #f2f6fb;
        --card: #ffffff;
        --border: #d9e2ee;
        --text: #1d2b3a;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
      .head { background: var(--navy); color: #fff; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
      .grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 12px; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .full { grid-column: 1 / -1; }
      label { font-size: 13px; font-weight: 700; color: #2d4764; }
      input, select, button { border: 1px solid #c9d7e7; border-radius: 8px; padding: 10px 12px; font-size: 14px; }
      button { background: var(--navy); color: #fff; border-color: var(--navy); cursor: pointer; font-weight: 700; }
      button:disabled { opacity: .7; cursor: not-allowed; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid #e4ebf5; padding: 10px; text-align: left; font-size: 13px; vertical-align: top; }
      th { background: #f3f8ff; color: var(--navy); }
      .chip { display: inline-block; padding: 4px 8px; border-radius: 999px; color: #fff; font-size: 12px; font-weight: 700; }
      .status-ongoing { background: #1f9d4d; }
      .status-pausa { background: #d84444; }
      .status-default { background: #61748a; }
      .muted { color: #61748a; }
      .table-wrap { overflow-x: auto; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const firebaseConfig = {
        apiKey: 'AIzaSyCXTX7h33uCXK4K8FSSnD7PcoayjAGV9x4',
        authDomain: 'mastersonvirtual-c0742.firebaseapp.com',
        projectId: 'mastersonvirtual-c0742',
        storageBucket: 'mastersonvirtual-c0742.firebasestorage.app',
        messagingSenderId: '465591582078',
        appId: '1:465591582078:web:0a8b71792c842a67e5872f',
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const ACCIONES = [
        'Nuevo Servicio',
        'Novación',
        'Obra',
        'Agregado',
        'Movimiento de Obra',
        'Baja',
        'Charla',
      ];

      function statusClass(value) {
        if (!value) return 'chip status-default';
        const v = value.toLowerCase();
        if (v.includes('ongoing')) return 'chip status-ongoing';
        if (v.includes('pausa')) return 'chip status-pausa';
        return 'chip status-default';
      }

      function App() {
        const [tipoAccion, setTipoAccion] = useState(ACCIONES[0]);

        const [cliente, setCliente] = useState('');
        const [fechaCarga, setFechaCarga] = useState('');
        const [tiempoInstalacion, setTiempoInstalacion] = useState('');
        const [costo, setCosto] = useState('');
        const [status, setStatus] = useState('ONGOING');
        const [fechaAlta, setFechaAlta] = useState('');
        const [cobro, setCobro] = useState('');
        const [fechaRealizado, setFechaRealizado] = useState('');
        const [verificado, setVerificado] = useState('');
        const [fechaCharla, setFechaCharla] = useState('');
        const [hora, setHora] = useState('');
        const [lugar, setLugar] = useState('');

        const [rows, setRows] = useState([]);
        const [saving, setSaving] = useState(false);

        useEffect(() => {
          const unsub = db
            .collection('operaciones')
            .orderBy('creadoEn', 'desc')
            .onSnapshot((snap) => {
              setRows(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
            }, (err) => console.error('Error onSnapshot:', err));

          return () => unsub();
        }, []);

        const grupo = useMemo(() => {
          if (tipoAccion === 'Baja') return 'baja';
          if (tipoAccion === 'Charla') return 'charla';
          if (tipoAccion === 'Movimiento de Obra') return 'movimiento';
          return 'base';
        }, [tipoAccion]);

        function resetByAction() {
          setCliente('');
          setFechaCarga('');
          setTiempoInstalacion('');
          setCosto('');
          setStatus('ONGOING');
          setFechaAlta('');
          setCobro('');
          setFechaRealizado('');
          setVerificado('');
          setFechaCharla('');
          setHora('');
          setLugar('');
        }

        async function handleSubmit(e) {
          e.preventDefault();

          const doc = { tipoAccion, status, creadoEn: firebase.firestore.FieldValue.serverTimestamp() };

          if (grupo === 'base') {
            if (!cliente || !fechaCarga) return alert('Completá Cliente y Fecha Carga.');
            Object.assign(doc, { cliente, fechaCarga, tiempoInstalacion, fechaAlta, cobro });
          }

          if (grupo === 'movimiento') {
            if (!cliente || !fechaCarga) return alert('Completá Cliente y Fecha Carga.');
            Object.assign(doc, { cliente, fechaCarga, costo, fechaAlta, cobro });
          }

          if (grupo === 'baja') {
            if (!fechaCarga) return alert('Completá Fecha Carga.');
            Object.assign(doc, { fechaCarga, fechaRealizado, verificado });
          }

          if (grupo === 'charla') {
            if (!fechaCharla || !hora || !lugar) return alert('Completá Fecha Charla, Hora y Lugar.');
            Object.assign(doc, { fechaCharla, hora, lugar });
          }

          try {
            setSaving(true);
            await db.collection('operaciones').add(doc);
            resetByAction();
          } catch (error) {
            console.error('Error guardando:', error);
            alert('No se pudo guardar en operaciones.');
          } finally {
            setSaving(false);
          }
        }

        return (
          <div className="wrap">
            <div className="head">
              <h1 style={{ margin: 0 }}>ComyTec - Gestión de Operaciones</h1>
              <p style={{ margin: '8px 0 0', opacity: 0.9 }}>React + Firebase 9+ (colección: operaciones)</p>
            </div>

            <div className="card">
              <h2 style={{ marginTop: 0, color: '#003366' }}>Carga de Operación</h2>
              <form onSubmit={handleSubmit} className="grid">
                <div className="field">
                  <label>Tipo de Acción</label>
                  <select value={tipoAccion} onChange={(e) => { setTipoAccion(e.target.value); resetByAction(); }}>
                    {ACCIONES.map((a) => <option key={a} value={a}>{a}</option>)}
                  </select>
                </div>

                {(grupo === 'base' || grupo === 'movimiento') && (
                  <>
                    <div className="field">
                      <label>Cliente</label>
                      <input value={cliente} onChange={(e) => setCliente(e.target.value)} type="text" />
                    </div>
                    <div className="field">
                      <label>Fecha Carga</label>
                      <input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" />
                    </div>

                    {grupo === 'base' ? (
                      <div className="field">
                        <label>Tiempo Instalación</label>
                        <input value={tiempoInstalacion} onChange={(e) => setTiempoInstalacion(e.target.value)} type="text" placeholder="Ej: 3 días" />
                      </div>
                    ) : (
                      <div className="field">
                        <label>Costo</label>
                        <input value={costo} onChange={(e) => setCosto(e.target.value)} type="number" min="0" step="0.01" />
                      </div>
                    )}

                    <div className="field">
                      <label>Status</label>
                      <input value={status} onChange={(e) => setStatus(e.target.value)} type="text" placeholder="ONGOING / PAUSA / ..." />
                    </div>

                    <div className="field">
                      <label>Fecha Alta</label>
                      <input value={fechaAlta} onChange={(e) => setFechaAlta(e.target.value)} type="date" />
                    </div>

                    <div className="field">
                      <label>Cobro</label>
                      <input value={cobro} onChange={(e) => setCobro(e.target.value)} type="text" placeholder="Ej: Pendiente / Cobrado" />
                    </div>
                  </>
                )}

                {grupo === 'baja' && (
                  <>
                    <div className="field">
                      <label>Fecha Carga</label>
                      <input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" />
                    </div>
                    <div className="field">
                      <label>Status</label>
                      <input value={status} onChange={(e) => setStatus(e.target.value)} type="text" placeholder="Ej: Realizado" />
                    </div>
                    <div className="field">
                      <label>Fecha Realizado</label>
                      <input value={fechaRealizado} onChange={(e) => setFechaRealizado(e.target.value)} type="date" />
                    </div>
                    <div className="field">
                      <label>Verificado</label>
                      <input value={verificado} onChange={(e) => setVerificado(e.target.value)} type="text" placeholder="Sí / No" />
                    </div>
                  </>
                )}

                {grupo === 'charla' && (
                  <>
                    <div className="field">
                      <label>Fecha Charla</label>
                      <input value={fechaCharla} onChange={(e) => setFechaCharla(e.target.value)} type="date" />
                    </div>
                    <div className="field">
                      <label>Hora</label>
                      <input value={hora} onChange={(e) => setHora(e.target.value)} type="time" />
                    </div>
                    <div className="field">
                      <label>Lugar</label>
                      <input value={lugar} onChange={(e) => setLugar(e.target.value)} type="text" />
                    </div>
                    <div className="field">
                      <label>Status</label>
                      <input value={status} onChange={(e) => setStatus(e.target.value)} type="text" placeholder="Ej: Programada" />
                    </div>
                  </>
                )}

                <div className="field full">
                  <button type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button>
                </div>
              </form>
            </div>

            <div className="card">
              <h2 style={{ marginTop: 0, color: '#003366' }}>Registro en tiempo real</h2>
              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Tipo Acción</th>
                      <th>Cliente</th>
                      <th>Fecha Carga</th>
                      <th>Tiempo/Costo</th>
                      <th>Status</th>
                      <th>Fecha Alta</th>
                      <th>Cobro</th>
                      <th>Fecha Realizado</th>
                      <th>Verificado</th>
                      <th>Fecha Charla</th>
                      <th>Hora</th>
                      <th>Lugar</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.length === 0 ? (
                      <tr><td colSpan="12" className="muted">Sin datos aún.</td></tr>
                    ) : rows.map((r) => (
                      <tr key={r.id}>
                        <td>{r.tipoAccion || '-'}</td>
                        <td>{r.cliente || '-'}</td>
                        <td>{r.fechaCarga || '-'}</td>
                        <td>{r.tiempoInstalacion || r.costo || '-'}</td>
                        <td><span className={statusClass(r.status)}>{r.status || '-'}</span></td>
                        <td>{r.fechaAlta || '-'}</td>
                        <td>{r.cobro || '-'}</td>
                        <td>{r.fechaRealizado || '-'}</td>
                        <td>{r.verificado || '-'}</td>
                        <td>{r.fechaCharla || '-'}</td>
                        <td>{r.hora || '-'}</td>
                        <td>{r.lugar || '-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
