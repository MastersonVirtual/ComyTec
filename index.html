<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masterson Seguridad</title>
    <style>
      :root {
        --base: #084846;
        --base-900: #042f2c;
        --base-700: #09615b;
        --text: #eaf7f7;
        --muted: #b8d8d8;
        --border-glass: rgba(255, 255, 255, 0.28);
        --shadow-soft: 0 10px 24px rgba(3, 35, 35, 0.28);
        --shadow-deep: 0 18px 45px rgba(2, 25, 25, 0.45);
        --ok: #29c46a;
        --pause: #e85555;
        --chip: #6f8383;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; font-family: Inter, 'Segoe UI', Arial, sans-serif; }
      body {
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, rgba(15, 120, 121, 0.45) 0%, transparent 34%),
          radial-gradient(circle at 80% 10%, rgba(13, 124, 125, 0.40) 0%, transparent 30%),
          linear-gradient(135deg, var(--base-900) 0%, var(--base) 48%, var(--base-700) 100%);
      }

      .app-shell { min-height: 100vh; display: flex; }
      .sidebar {
        position: fixed; inset: 0 auto 0 0; width: 320px;
        background: linear-gradient(170deg, rgba(7, 78, 79, 0.95) 0%, rgba(5, 59, 60, 0.92) 100%);
        border-right: 1px solid var(--border-glass);
        backdrop-filter: blur(14px) saturate(130%);
        box-shadow: var(--shadow-deep);
        transform: translateX(-105%);
        transition: transform .42s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: 1000; overflow-y: auto;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-header { padding: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.06); }
      .menu { padding: 12px; }
      .menu-button, .submenu-button {
        width: 100%; text-align: left; cursor: pointer; color: var(--text);
        padding: 12px 13px; margin-bottom: 8px; border-radius: 12px;
        border: 1px solid rgba(255,255,255,.22); background: rgba(255,255,255,.08);
      }
      .menu-button:hover, .submenu-button:hover { transform: translateX(6px); background: rgba(255,255,255,.18); }
      .submenu { max-height: 0; overflow: hidden; padding-left: 10px; opacity: 0; transition: max-height .36s cubic-bezier(0.22, 1, 0.36, 1), opacity .3s ease; }
      .submenu.open { max-height: 420px; opacity: 1; }
      .submenu-button { font-size: 13px; }

      .overlay { position: fixed; inset: 0; z-index: 999; background: rgba(2, 17, 17, 0.48); opacity: 0; pointer-events: none; transition: opacity .3s ease; }
      .overlay.show { opacity: 1; pointer-events: auto; }
      .content { width: 100%; transition: transform .42s cubic-bezier(0.22, 1, 0.36, 1), filter .4s ease; }
      .content.shift { transform: translateX(320px); }

      .topbar {
        position: sticky; top: 0; z-index: 60; display: flex; align-items: center; gap: 12px;
        padding: 14px 18px; background: linear-gradient(90deg, rgba(7,78,79,.78), rgba(8,87,88,.72));
        border-bottom: 1px solid rgba(255,255,255,.22); backdrop-filter: blur(14px) saturate(125%);
      }
      .burger {
        width: 44px; height: 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,.4);
        background: rgba(255,255,255,.12); color: #fff; font-size: 24px; cursor: pointer;
      }
      .top-titles h1 { margin: 0; font-size: 1.28rem; }
      .top-titles p { margin: 4px 0 0; color: #caeeee; font-size: .9rem; }
      .top-search { margin-left: auto; min-width: 280px; max-width: 420px; width: 36%; }
      .top-search input { width: 100%; padding-left: 38px; }
      .search-wrap { position: relative; }
      .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .85; font-size: 14px; }
      .search-preview { position: absolute; top: calc(100% + 8px); left: 0; right: 0; z-index: 120; max-height: 52vh; overflow: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,.24); background: rgba(5, 53, 50, .95); backdrop-filter: blur(12px); box-shadow: var(--shadow-deep); }
      .search-item { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.12); cursor: pointer; }
      .search-item:hover { background: rgba(255,255,255,.08); }
      .search-item:last-child { border-bottom: 0; }
      .search-item strong { display:block; }
      .search-item small { color: #bfe2df; }
      .search-detail { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); }

      .main { max-width: 1280px; margin: 20px auto; padding: 0 16px 24px; }

      .hero {
        border-radius: 18px;
        padding: 52px 28px;
        text-align: center;
        background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
        border: 1px solid rgba(255,255,255,.28);
        box-shadow: var(--shadow-deep);
      }
      .hero h2 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4.2rem);
        letter-spacing: 0.5px;
      }
      .hero p {
        margin: 12px 0 0;
        font-size: clamp(1rem, 2.2vw, 1.5rem);
        color: #d7f4ef;
      }
      .panel {
        margin-bottom: 16px; border-radius: 18px; padding: 18px;
        background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
        border: 1px solid rgba(255,255,255,.26); backdrop-filter: blur(14px) saturate(120%);
        box-shadow: var(--shadow-soft);
      }
      .panel h2 { margin: 0 0 8px; }
      .hint { color: var(--muted); font-size: 13px; margin-bottom: 12px; }

      .service-layout { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 12px; }
      .service-card {
        grid-column: span 12;
        background: rgba(255,255,255,.09);
        border: 1px solid rgba(255,255,255,.2);
        border-radius: 14px;
        padding: 14px;
      }
      .service-card h3 { margin: 0 0 10px; font-size: 15px; color: #dbf6f6; }
      .card-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 10px; }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .span-2 { grid-column: span 2; }
      .span-3, .full { grid-column: 1 / -1; }
      label { font-size: 12.8px; font-weight: 650; color: #d8f1f1; }

      input, select, button, textarea {
        border-radius: 10px; border: 1px solid rgba(255,255,255,.28); padding: 10px 12px; font-size: 14px;
        color: #efffff; background: rgba(255,255,255,.10); outline: none;
      }
      textarea { min-height: 90px; resize: vertical; }
      input::placeholder, textarea::placeholder { color: #c5dede; }
      input:focus, select:focus, textarea:focus { border-color: rgba(255,255,255,.48); box-shadow: 0 0 0 3px rgba(255,255,255,.14); }
      option { color: #103233; background: #dff3f3; }

      .radio-row, .switch-row, .state-row { display: flex; gap: 12px; flex-wrap: wrap; }
      .radio-pill, .state-pill {
        border: 1px solid rgba(255,255,255,.28);
        border-radius: 999px;
        padding: 8px 10px;
        cursor: pointer;
        background: rgba(255,255,255,.08);
        font-size: 13px;
      }
      .radio-pill input, .state-pill input { display: none; }
      .radio-pill.active, .state-pill.active { background: rgba(255,255,255,.26); }

      .save-btn {
        width: 100%;
        background: linear-gradient(135deg, #0a6768, #074e4f);
        border-color: rgba(255,255,255,.34);
        font-weight: 700;
        cursor: pointer;
      }
      .compact-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 12px; }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; min-width: 950px; border-collapse: separate; border-spacing: 0; overflow: hidden; border-radius: 14px; }
      th, td { padding: 10px; text-align: left; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,.16); }
      tr.detail-row td { background: rgba(255,255,255,.06); }
      .detail-box { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: #d8efef; line-height: 1.45; }
      .link-btn { border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.12); color: #eaf7f7; border-radius: 8px; padding: 6px 8px; cursor: pointer; }
      th { position: sticky; top: 0; background: rgba(255,255,255,.18); }
      .chip { display: inline-block; padding: 4px 8px; border-radius: 999px; color: #fff; font-size: 12px; font-weight: 700; }
      .status-ongoing { background: var(--ok); }
      .status-pausa { background: var(--pause); }
      .status-default { background: var(--chip); }
      .muted { color: var(--muted); }

      .history-grid { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 12px; }
      .widget {
        background: linear-gradient(135deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.24);
        border-radius: 14px;
        padding: 12px;
        box-shadow: var(--shadow-soft);
      }
      .widget h4 { margin: 0 0 8px; font-size: 13px; color: #d7f4ef; }
      .kv { font-size: 12px; color: #bfe2df; margin: 4px 0; }
      .kv b { color: #ffffff; font-weight: 700; }
      .widget.full { grid-column: 1 / -1; }

      @media (max-width: 1080px) {
        .card-grid, .compact-grid, .history-grid { grid-template-columns: repeat(2, minmax(180px, 1fr)); }
      }
      @media (max-width: 980px) {
        .sidebar { width: 285px; }
        .content.shift { transform: translateX(285px); }
        .card-grid, .compact-grid, .history-grid { grid-template-columns: 1fr; }
        .top-search { width: 100%; min-width: 0; }
      }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const firebaseConfig = {
        apiKey: 'AIzaSyCXTX7h33uCXK4K8FSSnD7PcoayjAGV9x4',
        authDomain: 'mastersonvirtual-c0742.firebaseapp.com',
        projectId: 'mastersonvirtual-c0742',
        storageBucket: 'mastersonvirtual-c0742.firebasestorage.app',
        messagingSenderId: '465591582078',
        appId: '1:465591582078:web:0a8b71792c842a67e5872f',
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const ACCIONES = ['Nuevo Servicio', 'Novación', 'Obra', 'Agregado', 'Movimiento de Obra', 'Baja', 'Charla'];

      function generarClienteId() {
        return String(Math.floor(1000 + Math.random() * 9000));
      }

      const servicioInicial = {
        nombreServicio: '',
        tipoServicioBrindar: 'Portería Virtual',
        direccionServicio: '',
        cantidadUnidades: '',
        fechaIngresoDatos: '',

        razonSocial: '',
        rut: '',
        mailFacturacion: '',
        administracion: '',
        duracionContratoMeses: '',
        otroServicioGrupo: 'No tiene servicio del Grupo',

        representanteComercial: 'Gastón Silva',
        personaReferenteComision: '',
        condicionEquipamiento: 'Compra',
        condicionEquipamientoOtro: '',
        importeMensualServicioSinIva: '',
        costoInstalacionUsdSinIva: '',
        porQueNoSeCobraServicio: '',
        presupuestoProveedor: '',

        condicionControlAcceso: 'Control de acceso nuestro',
        tagsPorAptos: 'Sí (3 por unidad)',
        appAkuvox: 'Sí (con apertura)',
        llavesServicio: 'Pendientes',

        referenteInstalacion: '',
        telefonoReferenteInstalacion: '',
        bottiSeContactaCon: '',
        fechaEspecificaInicioActiva: false,
        fechaEspecificaInicio: '',
        cantidadJornalesEstimados: '',

        proyectoServicio: '',
        excepcionesAcordadas: '',
        observacionesComentarios: '',
      };

      function statusClass(value) {
        if (!value) return 'chip status-default';
        const v = value.toLowerCase();
        if (v.includes('ongoing')) return 'chip status-ongoing';
        if (v.includes('pausa')) return 'chip status-pausa';
        return 'chip status-default';
      }

      function App() {
        const [menuOpen, setMenuOpen] = useState(false);
        const [openMenus, setOpenMenus] = useState({ nuevo: true, fact: false });

        const [tipoAccion, setTipoAccion] = useState('');
        const [selectedForm, setSelectedForm] = useState('home');
        const [clienteId, setClienteId] = useState(generarClienteId());
        const [clienteIdAsociado, setClienteIdAsociado] = useState('');
        const [cliente, setCliente] = useState('');
        const [fechaCarga, setFechaCarga] = useState('');
        const [tiempoInstalacion, setTiempoInstalacion] = useState('');
        const [costo, setCosto] = useState('');
        const [status, setStatus] = useState('ONGOING');
        const [fechaAlta, setFechaAlta] = useState('');
        const [cobro, setCobro] = useState('');
        const [fechaRealizado, setFechaRealizado] = useState('');
        const [verificado, setVerificado] = useState('');
        const [fechaCharla, setFechaCharla] = useState('');
        const [hora, setHora] = useState('');
        const [lugar, setLugar] = useState('');
        const [servicioForm, setServicioForm] = useState(servicioInicial);

        const [rows, setRows] = useState([]);
        const [saving, setSaving] = useState(false);
        const [searchTerm, setSearchTerm] = useState('');
        const [expandedId, setExpandedId] = useState(null);
        const [selectedService, setSelectedService] = useState(null);

        const grupo = useMemo(() => {
          if (tipoAccion === 'Nuevo Servicio' && selectedForm === 'servicio') return 'servicio';
          if (tipoAccion === 'Baja') return 'baja';
          if (tipoAccion === 'Charla') return 'charla';
          if (tipoAccion === 'Movimiento de Obra') return 'movimiento';
          return 'base';
        }, [tipoAccion, selectedForm]);


        const AUTO_ID_ACTIONS = ['Nuevo Servicio', 'Obra'];
        const autoIdMode = AUTO_ID_ACTIONS.includes(tipoAccion);
        const effectiveClienteId = autoIdMode ? clienteId : clienteIdAsociado.trim();

        const filteredRows = useMemo(() => {
          const q = searchTerm.trim().toLowerCase();
          if (!q) return rows;
          return rows.filter((r) =>
            [r.clienteId, r.nombreServicio, r.cliente, r.representanteComercial, r.razonSocial, r.direccionServicio]
              .filter(Boolean)
              .some((v) => String(v).toLowerCase().includes(q))
          );
        }, [rows, searchTerm]);

        function buildServiceDetailText(r) {
          const lines = [
            `Cliente ID: ${r.clienteId || '-'}`,
            `Tipo Acción: ${r.tipoAccion || '-'}`,
            `Nombre Servicio: ${r.nombreServicio || '-'}`,
            `Tipo Servicio: ${r.tipoServicioBrindar || '-'}`,
            `Dirección: ${r.direccionServicio || '-'}`,
            `Unidades: ${r.cantidadUnidades || '-'}`,
            `Representante: ${r.representanteComercial || '-'}`,
            `Razón Social: ${r.razonSocial || '-'}`,
            `RUT: ${r.rut || '-'}`,
            `Mail Facturación: ${r.mailFacturacion || '-'}`,
            `Condición Equipamiento: ${r.condicionEquipamiento || '-'} ${r.condicionEquipamientoOtro ? '(' + r.condicionEquipamientoOtro + ')' : ''}`,
            `Importe Mensual ($): ${r.importeMensualServicioSinIva || '-'}`,
            `Costo Instalación (US$): ${r.costoInstalacionUsdSinIva || '-'}`,
            `Presupuesto Proveedor: ${r.presupuestoProveedor || '-'}`,
            `Control Acceso: ${r.condicionControlAcceso || '-'}`,
            `Tags por Aptos: ${r.tagsPorAptos || '-'}`,
            `App Akuvox: ${r.appAkuvox || '-'}`,
            `Llaves Servicio: ${r.llavesServicio || '-'}`,
            `Jornales: ${r.cantidadJornalesEstimados || '-'}`,
            `Fecha ingreso: ${r.fechaIngresoDatos || r.fechaCarga || r.fechaCharla || '-'}`,
            `Observaciones: ${r.observacionesComentarios || '-'}`,
            `Excepciones: ${r.excepcionesAcordadas || '-'}`,
          ];
          return lines.join('\n');
        }

        useEffect(() => {
          const unsub = db.collection('operaciones').orderBy('creadoEn', 'desc').onSnapshot(
            (snap) => setRows(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
            (err) => console.error('Error onSnapshot:', err)
          );
          return () => unsub();
        }, []);

        function resetFields() {
          setCliente(''); setFechaCarga(''); setTiempoInstalacion(''); setCosto(''); setStatus('ONGOING');
          setFechaAlta(''); setCobro(''); setFechaRealizado(''); setVerificado(''); setFechaCharla(''); setHora(''); setLugar('');
          setServicioForm(servicioInicial); setClienteId(generarClienteId()); setClienteIdAsociado('');
        }

        function setServicioField(key, value) {
          setServicioForm((prev) => ({ ...prev, [key]: value }));
        }

        function selectAction(action) {
          setTipoAccion(action);
          resetFields();
          if (['Nuevo Servicio', 'Obra'].includes(action)) {
            setClienteId(generarClienteId());
            setClienteIdAsociado('');
          } else {
            setClienteId('');
          }
          setSelectedForm(action === 'Nuevo Servicio' ? 'servicio' : 'other');
          setMenuOpen(false);
        }

        async function handleSubmit(e) {
          e.preventDefault();
          if (selectedForm === 'home') return;
          if (!effectiveClienteId) return alert('Debes indicar un Cliente ID asociado para esta acción.');
          const doc = { tipoAccion, clienteId: effectiveClienteId, status, creadoEn: firebase.firestore.FieldValue.serverTimestamp() };

          if (grupo === 'servicio') {
            if (!servicioForm.nombreServicio || !servicioForm.tipoServicioBrindar || !servicioForm.direccionServicio) {
              return alert('Completá al menos: Nombre del servicio, Tipo de servicio y Dirección.');
            }
            Object.assign(doc, { ...servicioForm, formulario: 'nuevo-servicio-optimizado' });
          }
          if (grupo === 'base') {
            if (!cliente || !fechaCarga) return alert('Completá Cliente y Fecha Carga.');
            Object.assign(doc, { cliente, fechaCarga, tiempoInstalacion, fechaAlta, cobro });
          }
          if (grupo === 'movimiento') {
            if (!cliente || !fechaCarga) return alert('Completá Cliente y Fecha Carga.');
            Object.assign(doc, { cliente, fechaCarga, costo, fechaAlta, cobro });
          }
          if (grupo === 'baja') {
            if (!fechaCarga) return alert('Completá Fecha Carga.');
            Object.assign(doc, { fechaCarga, fechaRealizado, verificado });
          }
          if (grupo === 'charla') {
            if (!fechaCharla || !hora || !lugar) return alert('Completá Fecha Charla, Hora y Lugar.');
            Object.assign(doc, { fechaCharla, hora, lugar });
          }

          try {
            setSaving(true);
            await db.collection('operaciones').add(doc);
            resetFields();
          } catch (error) {
            console.error('Error guardando:', error);
            alert('No se pudo guardar en operaciones.');
          } finally {
            setSaving(false);
          }
        }

        return (
          <div className="app-shell">
            <aside className={`sidebar ${menuOpen ? 'open' : ''}`}>
              <div className="sidebar-header">MENÚ OPERATIVO</div>
              <div className="menu">
                <button className="menu-button" onClick={() => setOpenMenus((p) => ({ ...p, nuevo: !p.nuevo }))}>Nuevo {openMenus.nuevo ? '▾' : '▸'}</button>
                <div className={`submenu ${openMenus.nuevo ? 'open' : ''}`}>
                  <button className="submenu-button" onClick={() => selectAction('Nuevo Servicio')}>Servicio</button>
                  <button className="submenu-button" onClick={() => selectAction('Obra')}>Obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Novación')}>Novaciones</button>
                  <button className="submenu-button" onClick={() => selectAction('Agregado')}>Agregados</button>
                  <button className="submenu-button" onClick={() => selectAction('Movimiento de Obra')}>Movimiento de obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Baja')}>Baja de Servicio</button>
                </div>
                <button className="menu-button" onClick={() => setOpenMenus((p) => ({ ...p, fact: !p.fact }))}>Facturación {openMenus.fact ? '▾' : '▸'}</button>
                <div className={`submenu ${openMenus.fact ? 'open' : ''}`}>
                  <button className="submenu-button" onClick={() => selectAction('Agregado')}>Equipos agregados</button>
                  <button className="submenu-button" onClick={() => selectAction('Nuevo Servicio')}>Nuevo servicio</button>
                  <button className="submenu-button" onClick={() => selectAction('Novación')}>Novaciones</button>
                  <button className="submenu-button" onClick={() => selectAction('Obra')}>Nueva Obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Movimiento de Obra')}>Movimiento de Obra</button>
                </div>
                <button className="menu-button" onClick={() => selectAction('Charla')}>Charlas informativas</button>
                <button className="menu-button" onClick={() => { setSelectedForm('historial'); setMenuOpen(false); }}>Historial de Servicios</button>
              </div>
            </aside>

            <div className={`overlay ${menuOpen ? 'show' : ''}`} onClick={() => setMenuOpen(false)} />

            <div className={`content ${menuOpen ? 'shift' : ''}`}>
              <header className="topbar">
                <button className="burger" onClick={() => setMenuOpen(!menuOpen)}>☰</button>
                <div className="top-titles">
                  <h1>Masterson Seguridad</h1>
                  <p>ÁREA TÉCNICA Y COMERCIAL</p>
                </div>
                <div className="top-search">
                  <div className="search-wrap">
                    <span className="search-icon">🔍</span>
                    <input
                      type="text"
                      placeholder="Buscar cliente, ID, razón social o dirección..."
                      value={searchTerm}
                      onChange={(e) => { setSearchTerm(e.target.value); setExpandedId(null); }}
                    />
                    {searchTerm.trim() !== '' && (
                      <div className="search-preview">
                        {filteredRows.length === 0 ? (
                          <div className="search-item"><small>Sin resultados.</small></div>
                        ) : (
                          filteredRows.slice(0, 8).map((r) => (
                            <div key={r.id}>
                              <div className="search-item" onClick={() => { setSelectedService(r); setSelectedForm('historial'); setExpandedId(null); setSearchTerm(''); }}>
                                <strong>{r.clienteId || '-'} · {r.nombreServicio || 'Servicio sin nombre'}</strong>
                                <small>Fecha de alta: {r.fechaAlta || '-'}</small>
                              </div>
                              {expandedId === r.id && (
                                <div className="search-detail">
                                  <div className="detail-box">{buildServiceDetailText(r)}</div>
                                </div>
                              )}
                            </div>
                          ))
                        )}
                      </div>
                    )}
                  </div>
                </div>
              </header>

              <main className="main">
                {selectedForm === 'home' ? (
                  <section className="hero">
                    <h2>Masterson Seguridad</h2>
                    <p>ÁREA TÉCNICA Y COMERCIAL</p>
                  </section>
                ) : selectedForm === 'historial' ? (
                  <section className="panel">
                    <h2>Historial de Servicios</h2>
                    <div className="hint">Vista completa del servicio seleccionado desde la vista previa de búsqueda.</div>
                    {!selectedService ? (
                      <div className="hero" style={{padding: '26px 18px'}}>
                        <h2 style={{fontSize:'1.4rem'}}>Selecciona un servicio desde la búsqueda</h2>
                        <p style={{fontSize:'1rem'}}>Usa la lupita arriba y toca una vista previa para ver el detalle completo.</p>
                      </div>
                    ) : (
                      <div className="history-grid">
                        <div className="widget"><h4>Identificación</h4><div className="kv"><b>ID:</b> {selectedService.clienteId || '-'}</div><div className="kv"><b>Nombre:</b> {selectedService.nombreServicio || '-'}</div><div className="kv"><b>Tipo:</b> {selectedService.tipoServicioBrindar || '-'}</div><div className="kv"><b>Dirección:</b> {selectedService.direccionServicio || '-'}</div><div className="kv"><b>Unidades:</b> {selectedService.cantidadUnidades || '-'}</div></div>
                        <div className="widget"><h4>Comercial / Facturación</h4><div className="kv"><b>Representante:</b> {selectedService.representanteComercial || '-'}</div><div className="kv"><b>Razón Social:</b> {selectedService.razonSocial || '-'}</div><div className="kv"><b>RUT:</b> {selectedService.rut || '-'}</div><div className="kv"><b>Mail:</b> {selectedService.mailFacturacion || '-'}</div><div className="kv"><b>Duración:</b> {selectedService.duracionContratoMeses || '-'}</div></div>
                        <div className="widget"><h4>Costos</h4><div className="kv"><b>Importe mensual:</b> {selectedService.importeMensualServicioSinIva || '-'}</div><div className="kv"><b>Costo instalación US$:</b> {selectedService.costoInstalacionUsdSinIva || '-'}</div><div className="kv"><b>Presupuesto proveedor:</b> {selectedService.presupuestoProveedor || '-'}</div><div className="kv"><b>Condición equipamiento:</b> {selectedService.condicionEquipamiento || '-'}</div></div>
                        <div className="widget"><h4>Técnica</h4><div className="kv"><b>Control acceso:</b> {selectedService.condicionControlAcceso || '-'}</div><div className="kv"><b>Tags:</b> {selectedService.tagsPorAptos || '-'}</div><div className="kv"><b>Akuvox:</b> {selectedService.appAkuvox || '-'}</div><div className="kv"><b>Llaves:</b> {selectedService.llavesServicio || '-'}</div></div>
                        <div className="widget"><h4>Instalación</h4><div className="kv"><b>Referente:</b> {selectedService.referenteInstalacion || '-'}</div><div className="kv"><b>Teléfono:</b> {selectedService.telefonoReferenteInstalacion || '-'}</div><div className="kv"><b>Botti contacto:</b> {selectedService.bottiSeContactaCon || '-'}</div><div className="kv"><b>Jornales:</b> {selectedService.cantidadJornalesEstimados || '-'}</div><div className="kv"><b>Fecha inicio:</b> {selectedService.fechaEspecificaInicio || '-'}</div></div>
                        <div className="widget"><h4>Seguimiento</h4><div className="kv"><b>Tipo acción:</b> {selectedService.tipoAccion || '-'}</div><div className="kv"><b>Status:</b> {selectedService.status || '-'}</div><div className="kv"><b>Fecha ingreso:</b> {selectedService.fechaIngresoDatos || selectedService.fechaCarga || selectedService.fechaCharla || '-'}</div><div className="kv"><b>Proyecto:</b> {selectedService.proyectoServicio || '-'}</div></div>
                        <div className="widget full"><h4>Observaciones y Excepciones</h4><div className="detail-box">Observaciones: {selectedService.observacionesComentarios || '-'}

Excepciones: {selectedService.excepcionesAcordadas || '-'}</div></div>
                      </div>
                    )}
                  </section>
                ) : (
                <section className="panel">
                  <h2>Formulario Operativo</h2>
                  <div className="hint">Propuesta de formulario optimizado en 5 bloques visuales + documentación y cierre.</div>

                  <form onSubmit={handleSubmit}>
                    {grupo === 'servicio' ? (
                      <div className="service-layout">
                        <div className="service-card">
                          <h3>Nuevo Servicio</h3>
                          <div className="card-grid">
                            <div className="field">
                              <label>Cliente ID (auto 4 dígitos)</label>
                              <input value={clienteId} readOnly type="text" />
                            </div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>Bloque 1: Definición del Servicio</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Nombre del Servicio</label><input value={servicioForm.nombreServicio} onChange={(e) => setServicioField('nombreServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Tipo de Servicio</label><select value={servicioForm.tipoServicioBrindar} onChange={(e) => setServicioField('tipoServicioBrindar', e.target.value)}><option>Portería Virtual</option><option>Monitoreo</option><option>Control de Acceso</option></select></div>
                            <div className="field span-2"><label>Dirección</label><input value={servicioForm.direccionServicio} onChange={(e) => setServicioField('direccionServicio', e.target.value)} type="text" /></div>
                            <div className="field"><label>Cantidad de apartamentos / unidades</label><input value={servicioForm.cantidadUnidades} onChange={(e) => setServicioField('cantidadUnidades', e.target.value)} type="number" min="0" /></div>
                            <div className="field"><label>Fecha de ingreso de datos</label><input value={servicioForm.fechaIngresoDatos} onChange={(e) => setServicioField('fechaIngresoDatos', e.target.value)} type="date" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>Bloque 2: Gestión Comercial</h3>
                          <div className="card-grid">
                            <div className="field"><label>Representante Comercial</label><select value={servicioForm.representanteComercial} onChange={(e) => setServicioField('representanteComercial', e.target.value)}><option>Gastón Silva</option><option>Gonzalo Claudio</option><option>Francisco Bartellone</option><option>Nicolás Leguizamón</option></select></div>
                            <div className="field"><label>Duración del Contrato (Meses)</label><input value={servicioForm.duracionContratoMeses} onChange={(e) => setServicioField('duracionContratoMeses', e.target.value)} type="number" min="0" /></div>
                            <div className="field"><label>¿Cuenta con otra empresa del grupo?</label><select value={servicioForm.otroServicioGrupo} onChange={(e) => setServicioField('otroServicioGrupo', e.target.value)}><option>Portería Física</option><option>Onesta</option><option>Tecnobombas</option><option>Alse</option><option>No tiene servicio del Grupo</option></select></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>Bloque 3: Finanzas y Condiciones</h3>
                          <div className="card-grid">
                            <div className="field span-3">
                              <label>Condiciones Comerciales del Equipamiento</label>
                              <div className="radio-row">
                                {['Compra', 'Arrendamiento', 'Otros (Especificar)'].map((opt) => (
                                  <label key={opt} className={`radio-pill ${servicioForm.condicionEquipamiento === opt ? 'active' : ''}`}>
                                    <input type="radio" name="condicion" checked={servicioForm.condicionEquipamiento === opt} onChange={() => setServicioField('condicionEquipamiento', opt)} />{opt}
                                  </label>
                                ))}
                              </div>
                            </div>
                            {servicioForm.condicionEquipamiento === 'Otros (Especificar)' && (
                              <div className="field span-3"><label>Detalle de condición</label><input value={servicioForm.condicionEquipamientoOtro} onChange={(e) => setServicioField('condicionEquipamientoOtro', e.target.value)} type="text" /></div>
                            )}
                            <div className="field"><label>Importe Mensual ($)</label><input value={servicioForm.importeMensualServicioSinIva} onChange={(e) => setServicioField('importeMensualServicioSinIva', e.target.value)} type="number" step="0.01" /></div>
                            <div className="field"><label>Costo Instalación (US$)</label><input value={servicioForm.costoInstalacionUsdSinIva} onChange={(e) => setServicioField('costoInstalacionUsdSinIva', e.target.value)} type="number" step="0.01" /></div>
                            <div className="field"><label>Presupuesto Proveedor</label><input value={servicioForm.presupuestoProveedor} onChange={(e) => setServicioField('presupuestoProveedor', e.target.value)} type="text" /></div>
                            {(Number(servicioForm.importeMensualServicioSinIva || 0) === 0) && (
                              <div className="field span-3"><label>¿Por qué NO se cobra?</label><textarea value={servicioForm.porQueNoSeCobraServicio} onChange={(e) => setServicioField('porQueNoSeCobraServicio', e.target.value)} /></div>
                            )}
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>Bloque 4: Configuración Técnica</h3>
                          <div className="card-grid">
                            <div className="field"><label>Condiciones Control de Acceso</label><select value={servicioForm.condicionControlAcceso} onChange={(e) => setServicioField('condicionControlAcceso', e.target.value)}><option>Control de acceso nuestro</option><option>Edificio mantiene su control</option><option>Mixto (detallar)</option><option>No corresponde</option></select></div>
                            <div className="field"><label>Tags por Aptos</label><select value={servicioForm.tagsPorAptos} onChange={(e) => setServicioField('tagsPorAptos', e.target.value)}><option>Sí (3 por unidad)</option><option>No</option></select></div>
                            <div className="field"><label>¿App de Akuvox?</label><select value={servicioForm.appAkuvox} onChange={(e) => setServicioField('appAkuvox', e.target.value)}><option>Sí (con apertura)</option><option>Sí (sin apertura)</option><option>No usará app</option></select></div>
                            <div className="field span-2">
                              <label>Llaves del Servicio</label>
                              <div className="state-row">
                                {['Entregadas', 'Pendientes', 'No corresponde'].map((opt) => (
                                  <label key={opt} className={`state-pill ${servicioForm.llavesServicio === opt ? 'active' : ''}`}>
                                    <input type="radio" name="llaves" checked={servicioForm.llavesServicio === opt} onChange={() => setServicioField('llavesServicio', opt)} />{opt}
                                  </label>
                                ))}
                              </div>
                            </div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>Bloque 5: Tiempos e Instalación</h3>
                          <div className="card-grid">
                            <div className="field">
                              <label>¿Fecha específica de inicio?</label>
                              <div className="switch-row">
                                {['Sí', 'No'].map((opt) => (
                                  <label key={opt} className={`radio-pill ${(servicioForm.fechaEspecificaInicioActiva ? 'Sí' : 'No') === opt ? 'active' : ''}`}>
                                    <input type="radio" name="switchInicio" checked={(servicioForm.fechaEspecificaInicioActiva ? 'Sí' : 'No') === opt} onChange={() => setServicioField('fechaEspecificaInicioActiva', opt === 'Sí')} />{opt}
                                  </label>
                                ))}
                              </div>
                            </div>
                            {servicioForm.fechaEspecificaInicioActiva && (
                              <div className="field"><label>Calendario</label><input value={servicioForm.fechaEspecificaInicio} onChange={(e) => setServicioField('fechaEspecificaInicio', e.target.value)} type="date" /></div>
                            )}
                            <div className="field"><label>Jornales estimados</label><input value={servicioForm.cantidadJornalesEstimados} onChange={(e) => setServicioField('cantidadJornalesEstimados', e.target.value)} type="number" min="0" /></div>
                            <div className="field"><label>Referente para la instalación</label><input value={servicioForm.referenteInstalacion} onChange={(e) => setServicioField('referenteInstalacion', e.target.value)} type="text" /></div>
                            <div className="field"><label>Teléfono del Referente</label><input value={servicioForm.telefonoReferenteInstalacion} onChange={(e) => setServicioField('telefonoReferenteInstalacion', e.target.value)} type="text" /></div>
                            <div className="field"><label>Botti se contacta con:</label><input value={servicioForm.bottiSeContactaCon} onChange={(e) => setServicioField('bottiSeContactaCon', e.target.value)} type="text" /></div>
                          </div>
                        </div>

                        <div className="service-card">
                          <h3>Documentación y Cierre</h3>
                          <div className="card-grid">
                            <div className="field span-2"><label>Adjuntar Proyecto del Servicio</label><input type="file" onChange={(e) => setServicioField('proyectoServicio', e.target.files?.[0]?.name || '')} /></div>
                            <div className="field span-3"><label>¿Hay excepciones acordadas con el cliente?</label><textarea value={servicioForm.excepcionesAcordadas} onChange={(e) => setServicioField('excepcionesAcordadas', e.target.value)} /></div>
                            <div className="field span-3"><label>Observaciones / Excepciones</label><textarea value={servicioForm.observacionesComentarios} onChange={(e) => setServicioField('observacionesComentarios', e.target.value)} /></div>
                          </div>
                        </div>

                        <div className="service-card"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    ) : (
                      <div className="compact-grid">
                        <div className="field"><label>Tipo de Acción</label><select value={tipoAccion} onChange={(e) => { setTipoAccion(e.target.value); resetFields(); }}>{ACCIONES.map((a) => <option key={a} value={a}>{a}</option>)}</select></div>
                        <div className="field"><label>{autoIdMode ? "Cliente ID (auto 4 dígitos)" : "Cliente ID asociado"}</label>{autoIdMode ? <input value={clienteId} readOnly type="text" /> : <input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" />}</div>
                        <div className="field"><label>Status</label><input value={status} onChange={(e) => setStatus(e.target.value)} type="text" /></div>

                        {grupo === 'base' && <><div className="field"><label>Cliente</label><input value={cliente} onChange={(e) => setCliente(e.target.value)} /></div><div className="field"><label>Fecha Carga</label><input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" /></div><div className="field"><label>Tiempo Instalación</label><input value={tiempoInstalacion} onChange={(e) => setTiempoInstalacion(e.target.value)} /></div><div className="field"><label>Fecha Alta</label><input value={fechaAlta} onChange={(e) => setFechaAlta(e.target.value)} type="date" /></div><div className="field"><label>Cobro</label><input value={cobro} onChange={(e) => setCobro(e.target.value)} /></div></>}
                        {grupo === 'movimiento' && <><div className="field"><label>Cliente</label><input value={cliente} onChange={(e) => setCliente(e.target.value)} /></div><div className="field"><label>Fecha Carga</label><input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" /></div><div className="field"><label>Costo</label><input value={costo} onChange={(e) => setCosto(e.target.value)} type="number" /></div><div className="field"><label>Fecha Alta</label><input value={fechaAlta} onChange={(e) => setFechaAlta(e.target.value)} type="date" /></div><div className="field"><label>Cobro</label><input value={cobro} onChange={(e) => setCobro(e.target.value)} /></div></>}
                        {grupo === 'baja' && <><div className="field"><label>Fecha Carga</label><input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" /></div><div className="field"><label>Fecha Realizado</label><input value={fechaRealizado} onChange={(e) => setFechaRealizado(e.target.value)} type="date" /></div><div className="field"><label>Verificado</label><input value={verificado} onChange={(e) => setVerificado(e.target.value)} /></div></>}
                        {grupo === 'charla' && <><div className="field"><label>Fecha Charla</label><input value={fechaCharla} onChange={(e) => setFechaCharla(e.target.value)} type="date" /></div><div className="field"><label>Hora</label><input value={hora} onChange={(e) => setHora(e.target.value)} type="time" /></div><div className="field"><label>Lugar</label><input value={lugar} onChange={(e) => setLugar(e.target.value)} /></div></>}
                        <div className="field full"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                      </div>
                    )}
                  </form>
                </section>
                )}
              </main>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
