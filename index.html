            batch.set(db.collection('solicitudes_credenciales').doc(item.id), { leidaPorAdmin: true }, { merge: true });
          });
          try {
            await batch.commit();
          } catch (error) {
            console.error('Error marcando notificaciones como leídas:', error);
          }
        }

        async function toggleDesktopNotifications() {
          if (!isAdminUser && internalNotifications.length === 0) return;
          setDesktopBellOpen((prev) => !prev);
          await Promise.all([markAdminNotificationsAsRead(), markInternalNotificationsAsRead()]);
        }

        async function deleteNotificationRequest(req) {
          if (!isAdminUser || !req?.id) return;
          try {
            await db.collection('solicitudes_credenciales').doc(req.id).delete();
          } catch (error) {
            console.error('Error eliminando notificación:', error);
          }
        }

        function requestStatusLabel(status) {
          if (status === 'aprobada') return 'Aprobada (esperando aceptación del usuario)';
          if (status === 'aplicada') return 'Aplicada';
          if (status === 'rechazada') return 'Rechazada';
          return 'Pendiente';
        }

        async function updateCredentialRequestStatus(req, nextStatus) {
          if (!isAdminUser || !req?.id) return;
          setUpdatingRequestId(req.id);
          try {
            const patch = {
              estado: nextStatus,
              leidaPorAdmin: true,
              actualizadaEn: firebase.firestore.FieldValue.serverTimestamp(),
              resueltaPorUid: user?.uid || '',
              resueltaPorEmail: user?.email || '',
            };
            if (nextStatus === 'aprobada') {
              patch.credencialesInformadas = {
                usuario: req?.nuevoUsuarioSolicitado || '',
                password: req?.nuevaPasswordSolicitada || '',
              };
              patch.aceptadoPorUsuario = false;
            }
            await db.collection('solicitudes_credenciales').doc(req.id).set(patch, { merge: true });
            setNotificacion({ mensaje: `✔ Solicitud marcada como ${nextStatus === 'aprobada' ? 'aprobada' : 'rechazada'}`, tipo: 'ok' });
          } catch (error) {
            console.error('Error actualizando estado de solicitud:', error);
            setNotificacion({ mensaje: '✖ No se pudo actualizar la solicitud', tipo: 'error' });
          } finally {
            setUpdatingRequestId('');
          }
        }

        async function handleUserAcceptCredentialChanges(req) {
          if (!req?.id || !user?.uid) return;
          setAcceptingRequestId(req.id);
          try {
            await db.collection('solicitudes_credenciales').doc(req.id).set({
              estado: 'aplicada',
              aceptadoPorUsuario: true,
              aceptadoEn: firebase.firestore.FieldValue.serverTimestamp(),
              actualizadaEn: firebase.firestore.FieldValue.serverTimestamp(),
            }, { merge: true });
            setNotificacion({ mensaje: '✔ Cambios aceptados. Se cerrará tu sesión para ingresar con las nuevas credenciales.', tipo: 'ok' });
            setTimeout(() => auth.signOut(), 900);
          } catch (error) {
            console.error('Error aceptando cambios de credenciales:', error);
            setNotificacion({ mensaje: '✖ No se pudieron aceptar los cambios', tipo: 'error' });
          } finally {
            setAcceptingRequestId('');
          }
        }

        async function handleProfileCredentialsRequest(e) {
          e.preventDefault();
          const nextUser = profileUserRequest.trim();
          const nextPass = profilePasswordRequest.trim();
          if (!nextUser || !nextPass) {
            setNotificacion({ mensaje: 'Ingresá usuario y contraseña para solicitar el cambio', tipo: 'error' });
            return;
          }
          try {
            await db.collection('solicitudes_credenciales').add({
              tipo: 'cambio_usuario_password',
              solicitanteUid: user?.uid || '',
              solicitanteEmail: user?.email || '',
              solicitanteNombre: currentUserName,
              nuevoUsuarioSolicitado: nextUser,
              nuevaPasswordSolicitada: nextPass,
              estado: 'pendiente',
              leidaPorAdmin: false,
              creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
            });
            setNotificacion({ mensaje: '✔ Solicitud enviada al administrador', tipo: 'ok' });
            setProfileUserRequest('');
            setProfilePasswordRequest('');
          } catch (error) {
            console.error('Error enviando solicitud de credenciales:', error);
            setNotificacion({ mensaje: '✖ No se pudo enviar la solicitud', tipo: 'error' });
          }
        }

        if (isTrackingRoute) {
          return <TrackingView />;
        }

        if (authLoading || roleLoading) {
          return <LoadingScreen />;
        }

        if (!user) {
          return <LoginScreen />;
        }

        return (
          <div className="app-shell">
            <aside className={`sidebar ${menuOpen ? 'open' : ''}`}>
              <div className="sidebar-header">
                <div className="sidebar-header-logo" aria-hidden="true" />
                <div className="sidebar-header-text">
                  <div className="sidebar-header-title">Masterson Seguridad</div>
                  <div className="sidebar-header-sub">Administrador</div>
                </div>
              </div>
              <div className="menu">
                <button className="menu-button" onClick={goToHomeView}><span className="menu-icon">🏠</span><span>Inicio</span></button>
                <button className="menu-button" onClick={() => { setSelectedForm('historial'); closeSidebar(); }}><span className="menu-icon">📌</span><span>Coordinación de servicios</span></button>
                {!isMobile && (
                  <>
                    <button className="menu-button" onClick={() => setOpenMenus((p) => ({ operaciones: !p.operaciones, nuevo: false, baseDatos: false }))}><span className="menu-icon">🗂️</span><span>Operaciones</span><span className="menu-arrow">{openMenus.operaciones ? '▾' : '▸'}</span></button>
                    <div className={`submenu ${openMenus.operaciones ? 'open' : ''}`}>
                      <button className="submenu-button" onClick={() => setOpenMenus((p) => ({ ...p, nuevo: !p.nuevo }))}><span>Nuevo</span><span className="menu-arrow">{openMenus.nuevo ? '▾' : '▸'}</span></button>
                      <div className={`submenu ${openMenus.nuevo ? 'open' : ''}`}>
                        <button className="submenu-button" onClick={() => { selectAction('Nuevo Servicio'); closeSidebar(); }}>Servicio</button>
                        <button className="submenu-button" onClick={() => { selectAction('Adicionales'); closeSidebar(); }}>Adicionales</button>
                        <button className="submenu-button" onClick={() => { selectAction('Solicitud de presupuesto'); closeSidebar(); }}>Solicitud de presupuesto</button>
                        <button className="submenu-button" onClick={() => { selectAction('Novación'); closeSidebar(); }}>Novación</button>
                        <button className="submenu-button" onClick={() => { selectAction('Movimiento de obra'); closeSidebar(); }}>Movimiento de obra</button>
                        <button className="submenu-button" onClick={() => { selectAction('Baja'); closeSidebar(); }}>Baja de servicio</button>
                        <button className="submenu-button" onClick={() => { selectAction('Charla informativa'); closeSidebar(); }}>Charla informativa</button>
                      </div>
                      <button className="submenu-button" onClick={() => { setSelectedForm('home'); closeSidebar(); }}>Instalaciones</button>
                      <button className="submenu-button" onClick={() => { setSelectedForm('historial'); closeSidebar(); }}>Gestión de servicios</button>
                    </div>
                    <div className="sidebar-divider" />
                    <button className="menu-button" onClick={() => setOpenMenus((p) => ({ operaciones: false, nuevo: false, baseDatos: !p.baseDatos }))}><span className="menu-icon">📚</span><span>Base de datos</span><span className="menu-arrow">{openMenus.baseDatos ? '▾' : '▸'}</span></button>
                    <div className={`submenu ${openMenus.baseDatos ? 'open' : ''}`}>
                      <button className="submenu-button" onClick={() => { setSelectedForm('historial'); closeSidebar(); }}>Historial de Servicios</button>
                      <button className="submenu-button" onClick={() => { setSelectedForm('historial-charlas'); closeSidebar(); }}>Historial de Charlas</button>
                    </div>
                    {ENABLE_CLIENT_TRACKING_VIEW && <button className="menu-button" onClick={() => { setShowClientViewModal(true); closeSidebar(); }}><span className="menu-icon">👥</span><span>Vista Clientes</span></button>}
                    <button className="menu-button" onClick={() => { setSelectedForm('dashboard-gerencia'); closeSidebar(); }}><span className="menu-icon">📊</span><span>Dashboard</span></button>
                  </>
                )}
                <div className="sidebar-divider" />
                <button className="menu-button" onClick={openFuncionariosView}><span className="menu-icon">🧑‍💼</span><span>Funcionarios</span></button>
                <button className="menu-button" onClick={openTicketsView}><span className="menu-icon">🎫</span><span>Tickets</span></button>
                <button className="logout-btn" type="button" onClick={() => auth.signOut()}>Cerrar Sesión</button>
                <div className="sidebar-signature" aria-label="signature" tabIndex={0}><strong>v1.2 | Powered by Alfonso Carballo</strong><div className="sidebar-signature-tooltip">Actualización 1.2: se agregó la gestión de Funcionarios con listado por áreas, búsqueda rápida y chats internos persistidos en Firebase para que todos vean el historial compartido.</div></div>
              </div>
            </aside>

            <div className={`overlay ${(menuOpen || fabOpen) ? 'show' : ''}`} onClick={() => { closeSidebar(); setFabOpen(false); }} />

            <div className={`content ${menuOpen ? 'shift' : ''}`}>
              <header className="topbar">
                {notificacion.mensaje && (
                  <div className={`toast ${notificacion.tipo === 'error' ? 'error' : ''}`}>{`${currentUserName || 'Usuario'}: ${notificacion.mensaje}`}</div>
                )}
                {!isMobile && <button className="burger" aria-label="Abrir menú" onClick={toggleSidebar}><span className="burger-icon" aria-hidden="true"><span></span><span></span><span></span></span></button>}
                {!isMobile && (effectiveSelectedForm !== 'home' || !!selectedService) && (
                  <div className="topbar-nav-controls">
                    <button
                      className="topbar-home-btn"
                      type="button"
                      aria-label="Inicio"
                      onClick={goToHomeView}
                    >
                      <i data-lucide="house" />
                    </button>
                    <button className="topbar-back-btn" type="button" aria-label="Volver" onClick={goBackOneStep}><i data-lucide="arrow-left" /></button>
                  </div>
                )}
                {isMobile && <div className="mobile-brand-icon" aria-hidden="true" />}
                <div className="top-titles">
                  <h1>Masterson Seguridad</h1>
                  <p className="subtitle-voga">{isMobile ? `${topbarSubtitle || 'Área Técnica'} ▾` : topbarSubtitle}</p>
                </div>
                {!isMobile && (
                  <div className="top-search">
                    <button className="topbar-action-btn top-search-toggle" type="button" aria-label="Buscar" onClick={() => setDesktopSearchOpen((prev) => !prev)}>
                      <span className="topbar-action-icon"><i data-lucide="search" /></span>
                    </button>
                    {(desktopSearchOpen || searchTerm.trim() !== '') && (
                      <div className="top-search-panel">
                        <div className="search-wrap">
                          <span className="search-icon"><i data-lucide="search" /></span>
                          <input
                            type="text"
                            placeholder="Buscar cliente, ID, razón social o dirección..."
                            value={searchTerm}
                            onChange={(e) => { setSearchTerm(e.target.value); setExpandedId(null); }}
                          />
                          {searchTerm.trim() !== '' && (
                            <div className="search-preview">
                              {filteredRows.length === 0 ? (
                                <div className="search-item"><small>Sin resultados.</small></div>
                              ) : (
                                filteredRows.slice(0, 8).map((r) => (
                                  <div key={r.id}>
                                    <div className="search-item" onClick={() => { setSelectedService(r); setSelectedForm('historial'); setExpandedId(null); setSearchTerm(''); setDesktopSearchOpen(false); }}>
                                      <strong>{r.clienteId || '-'} · {r.nombreServicio || 'Servicio sin nombre'}</strong>
                                      <small>Fecha de alta: {r.fechaAlta || '-'}</small>
                                    </div>
                                    {expandedId === r.id && (
                                      <div className="search-detail">
                                        <div className="detail-box">{buildServiceDetailText(r)}</div>
                                      </div>
                                    )}
                                  </div>
                                ))
                              )}
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                )}
                {isMobile && (
                  <>
                    <div className="mobile-topbar-actions">
                      <button
                        type="button"
                        className="mobile-icon-btn"
                        aria-label="Buscar servicios"
                        onClick={() => {
                          setMobileSearchOpen((prev) => !prev);
                          setMobileBellOpen(false);
                        }}
                      >
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="6.5" stroke="currentColor" strokeWidth="1.8"/><path d="M16 16l4.2 4.2" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                      </button>
                      <button
                        type="button"
                        className="mobile-icon-btn"
                        aria-label="Notificaciones"
                        onClick={() => {
                          setMobileBellOpen((prev) => !prev);
                          setMobileAlerts((prev) => prev.map((a) => ({ ...a, read: true })));
                          markInternalNotificationsAsRead();
                        }}
                      >
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 10a6 6 0 1 1 12 0v4l1.5 2h-15L6 14v-4Z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/><path d="M10 18a2 2 0 0 0 4 0" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                        {mobileUnreadAlerts > 0 && <span className="topbar-mini-badge">{mobileUnreadAlerts > 9 ? '9+' : mobileUnreadAlerts}</span>}
                      </button>
                    </div>
                  </>
                )}
                {!isMobile && (
                  <div className="topbar-actions">
                    <div className="topbar-notify-wrap" ref={desktopBellRef}>
                        <button className="topbar-action-btn" type="button" aria-label="Notificaciones" onClick={toggleDesktopNotifications}>
                          <span className="topbar-action-icon"><i data-lucide="bell" /></span>
                        </button>
                        {(adminUnreadCount + internalNotifications.filter((item) => !item?.leida).length) > 0 && <span className="notify-badge">{(adminUnreadCount + internalNotifications.filter((item) => !item?.leida).length) > 99 ? '99+' : (adminUnreadCount + internalNotifications.filter((item) => !item?.leida).length)}</span>}
                        {desktopBellOpen && (
                          <div className="topbar-notify-popover" role="dialog" aria-label="Panel de notificaciones">
                            <div className="topbar-notify-arrow" aria-hidden="true" />
                            <div className="topbar-notify-head">Notificaciones</div>
                            <div className="topbar-notify-list">
                              {allNotifications.length === 0 ? <div className="topbar-notify-empty">Sin notificaciones nuevas.</div> : allNotifications.slice(0, 8).map((item) => (
                                <article className="topbar-notify-item" key={`popover-${item.id}`} onClick={() => openNotificationsView(item)}>
                                  <strong>{item.title}</strong>
                                  <small>{item.status}</small>
                                  <small>{formatRequestDateTime(item.createdAt)}</small>
                                  <div className="topbar-notify-actions">
                                    {item.source === 'interna' && <button type="button" className="topbar-notify-action" aria-label="Abrir chat" onClick={(e) => { e.stopPropagation(); openNotificationsView(item); openChatFromNotification(item); }}><i data-lucide="messages-square" /></button>}
                                    {item.source === 'credencial' && <button type="button" className="topbar-notify-action" aria-label="Eliminar notificación" onClick={(e) => { e.stopPropagation(); deleteNotificationRequest(item.raw); }}><i data-lucide="trash-2" /></button>}
                                  </div>
                                </article>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    <button className="topbar-action-btn" type="button" aria-label="Perfil" onClick={openProfileView}>
                      <span className="topbar-action-icon"><i data-lucide="user-round" /></span>
                    </button>
                  </div>
                )}
              </header>

              {isMobile && mobileSearchOpen && (
                <>
                  <div className="mobile-alert-backdrop" onClick={() => setMobileSearchOpen(false)} />
                  <div className="mobile-search-panel" onClick={(e) => e.stopPropagation()}>
                    <input
                      autoFocus
                      className="mobile-search-input"
                      type="text"
                      placeholder="Buscar por nombre o ID del servicio..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                    <div className="mobile-search-results">
                      {searchTerm.trim() === '' ? (
                        <div className="mobile-search-item"><small>Escribí un nombre o ID para buscar.</small></div>
                      ) : filteredRows.length === 0 ? (
                        <div className="mobile-search-item"><small>Sin resultados.</small></div>
                      ) : filteredRows.slice(0, 10).map((r) => (
                        <div key={`mobile-search-${r.id}`} className="mobile-search-item" onClick={() => { setSelectedService(r); setSelectedForm('historial'); setMobileTab('servicios'); setSearchTerm(''); setMobileSearchOpen(false); }}>
                          <strong>{r.clienteId || '-'} · {r.nombreServicio || 'Servicio sin nombre'}</strong>
                          <small>{r.direccionServicio || r.cliente || 'Sin dirección'}</small>
                        </div>
                      ))}
                    </div>
                  </div>
                </>
              )}

              {isMobile && mobileBellOpen && (
                <>
                  <div className="mobile-alert-backdrop" onClick={() => setMobileBellOpen(false)} />
                  <div className="mobile-alert-panel" onClick={(e) => e.stopPropagation()}>
                    {mobileAlerts.length === 0 ? <div className="mobile-alert-item">Sin notificaciones nuevas.</div> : mobileAlerts.map((a) => {
                      const related = internalNotifications.find((item) => `internal-alert-${item.id}` === a.id);
                      return <div key={a.id} className="mobile-alert-item" onClick={() => related ? openNotificationsView(related) : null}>{a.message}</div>;
                    })}
                  </div>
                </>
              )}

              <main className={`main ${grupo === 'charla-detalle' ? 'charla-main-wide' : ''} ${effectiveSelectedForm === 'funcionarios' ? 'main-chat-expanded' : ''} ${effectiveSelectedForm === 'historial' ? 'main-ops-expanded' : ''}`}>
                {isMobile && mobileTab === 'home' && effectiveSelectedForm === 'home' ? renderMobileHome() : isMobile && mobileTab === 'acciones' && effectiveSelectedForm === 'home' ? renderMobileActions() : isMobile && mobileTab === 'servicios' ? renderMobileServices() : isMobile && mobileTab === 'actividad' ? (
                  <section className="mobile-section-stack">
                    <div className="mobile-section-card">
                      <h3 className="mobile-section-title">Actividad</h3>
                      <button type="button" className="mobile-list-button" onClick={() => { setSelectedForm('historial'); setSelectedService(null); }}>Ver historial de servicios</button>
                    </div>
                  </section>
                ) : effectiveSelectedForm === 'notificaciones' ? (
                  <section className="panel profile-view">
                    <h2>Notificaciones</h2>
                    <div className="hint">Mensajes internos y solicitudes recibidas dentro del sistema.</div>
                    <div className="request-status-row" style={{ marginBottom: 12 }}>
                      <button type="button" className="status-action-btn chat-action-btn" onClick={() => { setNotificationStaffFilter(''); }}>Todas</button>
                      {notificationStaffFilter && <button type="button" className="status-action-btn chat-action-btn" onClick={() => { setNotificationStaffFilter(''); }}>Quitar filtro</button>}
                    </div>
                    <div className="chat-search-wrap">
                      <span className="chat-search-icon">🔎</span>
                      <input type="text" placeholder="Buscar palabras en todos los chats" value={chatSearchTerm} onChange={(e) => setChatSearchTerm(e.target.value)} />
                    </div>
                    {chatSearchResults.length > 0 && (
                      <div className="chat-search-results">
                        {chatSearchResults.map((message) => {
                          const targetStaff = getStaffMemberFromMessage(message);
                          return (
                            <article key={`search-${message.id}`} className="chat-search-result">
                              <strong>{getChatTitleForMessage(message, staffMembers)}</strong>
                              <div className="kv"><b>Coincidencia:</b> {message.mensaje || '-'}</div>
                              <div className="kv"><b>Fecha:</b> {formatChatTimestamp(message.creadoEn)}</div>
                              {targetStaff && <button type="button" className="status-action-btn chat-action-btn" onClick={() => { setNotificationStaffFilter(String(targetStaff.email || '').trim().toLowerCase() || String(targetStaff.uid || '').trim()); openStaffChat(targetStaff); }}>Abrir resultado</button>}
                            </article>
                          );
                        })}
                      </div>
                    )}
                    {visibleNotifications.length === 0 ? (
                      <div className="profile-option">No hay notificaciones registradas.</div>
                    ) : (
                      visibleNotifications.map((item) => item.source === 'credencial' ? (
                        <article className="profile-option" key={item.id}>
                          <h3>
                            {item.raw.solicitanteNombre || item.raw.solicitanteEmail || 'Usuario'}
                            <span className={`status-chip-inline ${item.raw.estado === 'aprobada' || item.raw.estado === 'aplicada' ? 'resolved' : item.raw.estado === 'rechazada' ? 'rejected' : 'pending'}`} style={{ marginLeft: 8 }}>
                              {requestStatusLabel(item.raw.estado)}
                            </span>
                          </h3>
                          <div className="kv"><b>Email:</b> {item.raw.solicitanteEmail || '-'}</div>
                          <div className="kv"><b>Usuario solicitado:</b> {item.raw.nuevoUsuarioSolicitado || '-'}</div>
                          <div className="kv"><b>Contraseña solicitada:</b> {item.raw.nuevaPasswordSolicitada || '-'}</div>
                          <div className="kv"><b>Fecha y hora de solicitud:</b> {formatRequestDateTime(item.raw.creadoEn)}</div>
                          <div className="kv"><b>Última actualización:</b> {formatRequestDateTime(item.raw.actualizadaEn)}</div>
                          {isAdminUser && item.raw.estado === 'pendiente' && (
                            <div className="request-status-row">
                              <button type="button" className="status-action-btn resolve" disabled={updatingRequestId === item.raw.id} onClick={() => updateCredentialRequestStatus(item.raw, 'aprobada')}>
                                {updatingRequestId === item.raw.id ? 'Actualizando...' : 'Marcar aprobada'}
                              </button>
                              <button type="button" className="status-action-btn reject" disabled={updatingRequestId === item.raw.id} onClick={() => updateCredentialRequestStatus(item.raw, 'rechazada')}>
                                {updatingRequestId === item.raw.id ? 'Actualizando...' : 'Marcar rechazada'}
                              </button>
                            </div>
                          )}
                        </article>
                      ) : (
                        <article className="profile-option" key={item.id}>
                          <h3>{getChatTitleForMessage(item.raw, staffMembers)}</h3>
                          <div className="kv"><b>De:</b> {item.raw.remitenteNombre || item.raw.remitenteEmail || 'Usuario'}</div>
                          <div className="kv"><b>Mensaje:</b> {item.raw.mensaje || '-'}</div>
                          <div className="kv"><b>Recibido:</b> {formatRequestDateTime(item.raw.creadoEn)}</div>
                          {getStaffMemberFromMessage(item.raw) && (
                            <div className="request-status-row">
                              <button type="button" className="status-action-btn chat-action-btn" onClick={() => openChatFromNotification(item)}>Ver chat</button>
                            </div>
                          )}
                        </article>
                      ))
                    )}
                  </section>

                ) : effectiveSelectedForm === 'funcionarios' ? (
                  <section className="panel profile-view funcionarios-view">
                    <div className="funcionarios-header">
                      <div>
                        <h2>Funcionarios</h2>
                        <div className="hint">Chat interno en tiempo real, integrado al layout actual.</div>
                      </div>
                    </div>
                    <div className="staff-chat-workspace">
                      <aside className="staff-chat-list-pane">
                        <div className="staff-chat-list-head">
                          <h3>Conversaciones</h3>
                          <small>{staffChatList.length} chats disponibles</small>
                        </div>
                        <input
                          className="staff-chat-search"
                          type="text"
                          placeholder="Buscar funcionario..."
                          value={staffSearchTerm}
                          onChange={(e) => setStaffSearchTerm(e.target.value)}
                        />
                        <div className="staff-chat-list">
                          {staffChatList.length === 0 ? (
                            <article className="staff-chat-list-item"><div className="hint">Sin resultados.</div></article>
                          ) : (
                            staffChatList.map((chatItem) => {
                              const member = chatItem.member;
                              const avatar = PROFILE_AVATAR_OPTIONS.find((option) => option.id === member.avatarId) || PROFILE_AVATAR_OPTIONS[0];
                              return (
                                <article key={`chat-list-${member.id}`} className={`staff-chat-list-item ${activeChatMemberId === member.id ? 'active' : ''}`} onClick={() => openStaffChat(member)} onContextMenu={(event) => openChatContextMenu(member, event)}>
                                  <img src={avatar.src} alt={`Perfil de ${member.nombre || 'Funcionario'}`} />
                                  <div className="staff-chat-list-meta">
                                    <strong>{chatItem.pinned ? '📍 ' : ''}{member.nombre || 'Funcionario'}</strong>
                                    <small>{chatItem.lastMessage}</small>
                                  </div>

                        <div className="field"><label>Tipo de Acción</label><select value={tipoAccion} onChange={(e) => { setTipoAccion(e.target.value); resetFields(); }}>{ACCIONES.map((a) => <option key={a} value={a}>{ACTION_LABELS[a] || a}</option>)}</select></div>
                        <div className="field"><label>{autoIdMode ? "Cliente ID" : "Cliente ID asociado"}</label>{autoIdMode ? <input value={clienteId} readOnly type="text" /> : <input value={clienteIdAsociado} onChange={(e) => setClienteIdAsociado(e.target.value)} type="text" placeholder="ID del servicio existente" />}</div>
                        <div className="field"><label>Status</label><select value={status} onChange={(e) => setStatus(e.target.value)}>{STATUS_OPTIONS.map((st) => <option key={st} value={st}>{st}</option>)}</select></div>

                        {grupo === 'base' && <><div className="field"><label>Cliente</label><input value={cliente} onChange={(e) => setCliente(e.target.value)} /></div><div className="field"><label>Fecha Carga</label><input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" /></div><div className="field"><label>Tiempo Instalación</label><input value={tiempoInstalacion} onChange={(e) => setTiempoInstalacion(e.target.value)} /></div><div className="field"><label>Fecha Alta</label><input value={fechaAlta} onChange={(e) => setFechaAlta(e.target.value)} type="date" /></div><div className="field"><label>Cobro</label><input value={cobro} onChange={(e) => setCobro(e.target.value)} /></div></>}



                        <div className="field full"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : (editingServiceId ? 'Actualizar Operación' : 'Guardar Operación')}</button></div>
                      </div>
                    )}
                  </form>

                  <section className="form-history-shell">
                    <div className="form-history-head">
                      <div>
                        <h3>Historial operativo de esta sección</h3>
                        <p>Todo lo que se guarda queda visible acá para seguimiento y asignación por Comercial / Atención al cliente.</p>
                      </div>
                      <span className="form-history-count">{formHistoryRows.length} registro{formHistoryRows.length === 1 ? '' : 's'}</span>
                    </div>
                    <div className="form-history-table-wrap">
                      <table className="form-history-table">
                        <thead>
                          <tr>
                            <th>ID</th>
                            <th>Servicio</th>
                            <th>Estado</th>
                            <th>Comercial</th>
                            <th>Atención al cliente</th>
                            <th>Última actualización</th>
                          </tr>
                        </thead>
                        <tbody>
                          {formHistoryRows.length === 0 ? (
                            <tr><td colSpan={6} className="form-history-empty">Todavía no hay registros para esta sección.</td></tr>
                          ) : (
                            formHistoryRows.map((row) => (
                              <tr key={`form-history-${row.id}`}>
                                <td>{row.clienteId || '-'}</td>
                                <td>
                                  <strong>{row.nombreServicio || row.cliente || 'Servicio sin nombre'}</strong>
                                  <small>{row.direccionServicio || '-'}</small>
                                </td>
                                <td><span className={statusClass(getStatusLabel(row))}>{getStatusLabel(row)}</span></td>
                                <td>
                                  <select value={row.representanteComercial || ''} onChange={(e) => handleAssignServiceField(row, 'representanteComercial', e.target.value)}>
                                    <option value="">Sin asignar</option>
                                    {historyCommercialOptions.map((opt) => <option key={`assg-com-${row.id}-${opt}`} value={opt}>{opt}</option>)}
                                  </select>
                                </td>
                                <td>
                                  <select value={row.atencionCliente || ''} onChange={(e) => handleAssignServiceField(row, 'atencionCliente', e.target.value)}>
                                    <option value="">Sin asignar</option>
                                    {historyAtencionOptions.map((opt) => <option key={`assg-ate-${row.id}-${opt}`} value={opt}>{opt}</option>)}
                                  </select>
                                </td>
                                <td>{new Date((row.actualizadoEn?.seconds || row.creadoEn?.seconds || Date.now() / 1000) * 1000).toLocaleDateString('es-UY')}</td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </section>
                </section>
                )}
              </main>

              {profileAvatarModalOpen && (
                <div className="confirm-modal" onClick={closeProfileAvatarModal}>
                  <div className="confirm-modal-card profile-avatar-modal" onClick={(e) => e.stopPropagation()}>
                    <h3>Elegir ícono</h3>
                    <div className="profile-avatar-picker">
                      {PROFILE_AVATAR_OPTIONS.map((avatar) => (
                        <button
                          key={avatar.id}
                          type="button"
                          className={`profile-avatar-option ${pendingProfileAvatar.id === avatar.id ? 'active' : ''}`}
                          onClick={() => setPendingProfileAvatarId(avatar.id)}
                          aria-label={`Seleccionar ${avatar.label}`}
                        >
                          <img src={avatar.src} alt={avatar.label} />
                        </button>
                      ))}
                    </div>
                    <div className="profile-avatar-modal-actions">
                      <button type="button" className="edit-btn" onClick={closeProfileAvatarModal} disabled={savingProfileAvatar}>Cancelar</button>
                      <button type="button" className="save-btn" onClick={applyProfileAvatarSelection} disabled={savingProfileAvatar}>
                        {savingProfileAvatar ? 'Guardando...' : 'Aceptar'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {imageViewerSrc && (
                <div className="image-viewer-modal" onClick={() => setImageViewerSrc('')}>
                  <img src={imageViewerSrc} alt="Vista ampliada" onClick={(e) => e.stopPropagation()} />
                </div>
              )}

              {ENABLE_CLIENT_TRACKING_VIEW && showClientViewModal && isAdminUser && (
                <div className="confirm-modal" onClick={() => setShowClientViewModal(false)}>
                  <div className="client-view-modal" onClick={(e) => e.stopPropagation()}>
                    <h3>Vista Clientes</h3>
                    <div className="hint">Ingresá el Cliente ID (ej: CLI-949017) o el ID del documento de Firebase (ej: 2TC1hWWzANjGrC48HCzA).</div>
                    <div className="field">
                      <label>ID de Operación</label>
                      <input value={clientOperationId} onChange={(e) => setClientOperationId(e.target.value)} type="text" placeholder="Ej: 1024" />
                    </div>
                    <div className="client-view-actions">
                      <button type="button" className="edit-btn" onClick={() => setShowClientViewModal(false)}>Cancelar</button>
                      <button type="button" className="save-btn" onClick={openClientTrackingView}>Ingresar</button>
                    </div>
                  </div>
                </div>
              )}

              {activeChatMember && effectiveSelectedForm !== 'funcionarios' && (
                <div className="staff-chat-modal-overlay" onClick={closeStaffChatModal}>
                  <div className="staff-chat-modal" onClick={(e) => e.stopPropagation()}>
                    <div className="staff-chat-modal-head">
                      <img className="staff-chat-modal-avatar" src={(PROFILE_AVATAR_OPTIONS.find((option) => option.id === activeChatMember.avatarId) || PROFILE_AVATAR_OPTIONS[0]).src} alt={`Perfil de ${activeChatMember.nombre || 'Funcionario'}`} />
                      <div className="staff-chat-modal-meta">
                        <strong>{activeChatMember.nombre || 'Funcionario'}</strong>
                        <small>{getStaffPresenceLabel(activeChatMember)}</small>
                      </div>
                      <div className="staff-chat-head-actions" ref={chatMenuRef}>
                        <button type="button" className="staff-chat-tool-btn" onClick={() => setChatMenuOpen((prev) => !prev)} aria-label="Opciones del chat">⋮</button>
                        {chatMenuOpen && (
                          <div className="staff-chat-menu">
                            <button type="button" onClick={() => { updateChatPendingFlag(activeChatMember.id, true); setChatMenuOpen(false); }}>📌 Marcar como no leído</button>
                            <button type="button" onClick={() => { setReminderForChat(activeChatMember.id); setChatMenuOpen(false); }}>⏰ Recordar más tarde</button>
                            <button type="button" onClick={() => { togglePinChat(activeChatMember.id); setChatMenuOpen(false); }}>
                              {chatPinnedFlags[activeChatMember.id] ? '📍 Desfijar chat' : '📍 Fijar chat'}
                            </button>
                          </div>
                        )}
                        <button type="button" className="staff-chat-modal-close" onClick={closeStaffChatModal} aria-label="Cerrar chat">×</button>
                      </div>
                    </div>
                    <div className="staff-chat-modal-body">
                      {activeChatMessages.length === 0 ? (
                        <div className="staff-chat-empty">Todavía no hay mensajes en esta conversación.</div>
                      ) : (
                        activeChatMessages.map((message) => {
                          const isOutgoing = ((user?.uid && message?.remitenteUid === user.uid) || (user?.email && String(message?.remitenteEmail || '').trim().toLowerCase() === String(user.email).trim().toLowerCase()));
                          return (
                            <div key={message.id} className={`staff-chat-bubble ${isOutgoing ? 'outgoing' : 'incoming'}`}>
                              <div className="staff-chat-meta">
                                <span>{isOutgoing ? 'Vos' : (activeChatMember.nombre || 'Funcionario')}</span>
                                <span>{formatChatTimestamp(message.creadoEn)}</span>
                              </div>
                              <div>{message.mensaje || '-'}</div>
                              {Array.isArray(message.adjuntos) && message.adjuntos.map((adjunto) => {
                                const mime = String(adjunto?.mimeType || '');
                                if (mime.startsWith('image/')) return <img key={adjunto.id || adjunto.nombre} className="staff-chat-media" src={adjunto.dataUrl} alt={adjunto.nombre || 'Imagen adjunta'} onClick={() => openImageViewer(adjunto.dataUrl)} />;
                                if (mime.startsWith('video/')) return <video key={adjunto.id || adjunto.nombre} className="staff-chat-media" src={adjunto.dataUrl} controls />;
                                return <a key={adjunto.id || adjunto.nombre} className="staff-chat-file-link" href={adjunto.dataUrl} download={adjunto.nombre || 'archivo'}>📎 {adjunto.nombre || 'archivo adjunto'}</a>;
                              })}
                            </div>
                          );
                        })
                      )}
                    </div>
                    <div className="staff-chat-modal-compose">
                      {(chatAttachmentDraft[activeChatMember.id] || []).length > 0 && (
                        <div className="staff-chat-attachments">
                          {(chatAttachmentDraft[activeChatMember.id] || []).map((attachment) => (
                            <div key={attachment.id} className="staff-chat-attachment-chip">
                              <span>{attachment.mimeType.startsWith('image/') ? '🖼️' : attachment.mimeType.startsWith('video/') ? '🎬' : '📄'} {attachment.nombre}</span>
                              <button type="button" onClick={() => removeChatAttachment(activeChatMember.id, attachment.id)} aria-label="Quitar adjunto">✕</button>
                            </div>
                          ))}
                        </div>
                      )}
                      <div className="staff-chat-compose-row">
                        <div className="staff-chat-compose-tools">
                          <button type="button" className="staff-chat-tool-btn" onClick={() => chatFileInputsRef.current[activeChatMember.id]?.click()} aria-label="Adjuntar archivo">📎</button>
                          <input ref={(node) => { chatFileInputsRef.current[activeChatMember.id] = node; }} type="file" style={{ display: 'none' }} multiple onChange={(e) => handleChatFileInput(activeChatMember, e)} />
                          <div style={{ position: 'relative' }} ref={chatEmojiPickerRef}>
                            <button type="button" className="staff-chat-tool-btn" onClick={() => setChatEmojiPickerOpen((prev) => !prev)} aria-label="Abrir selector de emojis">
                              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <circle cx="12" cy="12" r="9" strokeWidth="2" />
                                <circle cx="9" cy="10" r="1" fill="currentColor" stroke="none" />
                                <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none" />
                                <path d="M8 14c1 1.2 2.2 1.8 4 1.8s3-.6 4-1.8" strokeWidth="2" strokeLinecap="round" />
                              </svg>
                            </button>
                            {chatEmojiPickerOpen && (
                              <div className="staff-chat-emoji-picker">
                                {CHAT_EMOJIS.map((emoji) => (
                                  <button key={`emoji-${emoji}`} type="button" onClick={() => { addEmojiToDraft(activeChatMember, emoji); setChatEmojiPickerOpen(false); }}>{emoji}</button>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                        <textarea className="staff-message-box" placeholder="Escribí tu mensaje..." value={staffMessageDraft[activeChatMember.id] || ''} onPaste={(e) => handleChatPaste(activeChatMember, e)} onChange={(e) => updateStaffMessageDraft(activeChatMember.id, e.target.value)} />
                        <button type="button" className="staff-chat-send-btn" disabled={sendingStaffMessageId === activeChatMember.id} onClick={() => handleSendStaffMessage(activeChatMember)} aria-label={sendingStaffMessageId === activeChatMember.id ? 'Enviando mensaje' : 'Enviar mensaje'} title={sendingStaffMessageId === activeChatMember.id ? 'Enviando...' : 'Enviar mensaje'}>
                          {sendingStaffMessageId === activeChatMember.id ? (
                            <span style={{ fontSize: 11, fontWeight: 800 }}>...</span>
                          ) : (
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                              <path d="M5 12h11" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                              <path d="m12 5 7 7-7 7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                            </svg>
                          )}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {deleteTargetService && isAdminUser && (
                <div className="confirm-modal" onClick={() => { if (!deletingService) setDeleteTargetService(null); }}>
                  <div className="confirm-modal-card" onClick={(e) => e.stopPropagation()}>
                    <h3 style={{ marginTop: 0 }}>Confirmar eliminación segura</h3>
                    <p style={{ margin: '6px 0 0', color: '#d7f4ef' }}>
                      ¿Estás seguro de eliminar este servicio? Se generará un registro de esta acción. El servicio permanecerá oculto pero recuperable por 24 horas antes de su eliminación definitiva.
                    </p>
                    <div className="confirm-modal-actions">
                      <button type="button" className="edit-btn" onClick={() => setDeleteTargetService(null)} disabled={deletingService}>Cancelar</button>
                      <button type="button" className="danger-btn" onClick={handleDeleteServiceConfirm} disabled={deletingService}>{deletingService ? 'Procesando...' : 'Confirmar eliminación'}</button>
                    </div>
                  </div>
                </div>
              )}

              {isMobile && (
                <>
                  <nav className="mobile-bottom-nav mobile-bottom-nav-simple">
                    <button
                      className={mobileTab === 'home' && effectiveSelectedForm === 'home' ? 'active' : ''}
                      type="button"
                      onClick={() => {
                        goToHomeView();
                        setMobileBellOpen(false);
                        setMobileSearchOpen(false);
                        setMobileQuickMenuOpen(false);
                      }}
                    >
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 10.5L12 3l9 7.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><path d="M5.5 9.5V20h13V9.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><path d="M10 20v-5h4v5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      <span className="mobile-nav-label">Inicio</span>
                    </button>
                    <button className={mobileTab === 'servicios' ? 'active' : ''} type="button" onClick={() => { setMobileTab('servicios'); setSelectedForm('home'); setSelectedService(null); setMobileBellOpen(false); setMobileSearchOpen(false); setMobileQuickMenuOpen(false); }}>
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 7.5h18" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><path d="M6 12h12" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><path d="M9 16.5h6" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                      <span className="mobile-nav-label">Servicios</span>
                    </button>
                    <button className={mobileTab === 'actividad' ? 'active' : ''} type="button" onClick={() => { setMobileTab('actividad'); setSelectedForm('home'); setSelectedService(null); setMobileBellOpen(false); setMobileSearchOpen(false); setMobileQuickMenuOpen(false); }}>
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="8" stroke="currentColor" strokeWidth="1.8"/><path d="M12 8v4l3 2" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      <span className="mobile-nav-label">Actividad</span>
                    </button>
                    <button className={effectiveSelectedForm === 'perfil' ? 'active' : ''} type="button" onClick={() => { setMobileBellOpen(false); setMobileSearchOpen(false); setMobileQuickMenuOpen(false); openProfileView(); }}>
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="8" r="4" stroke="currentColor" strokeWidth="1.8"/><path d="M4 20c1.8-3.4 5-5 8-5s6.2 1.6 8 5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                      <span className="mobile-nav-label">Perfil</span>
                    </button>
                  </nav>
                </>
              )}


            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
