<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masterson Seguridad</title>
    <style>
      :root {
        --base: #062f2d;
        --motion-fast: 160ms;
        --motion-mid: 240ms;
        --motion-slow: 320ms;
        --base-900: #041f1e;
        --base-700: #0b4e49;
        --text: #ebf6f5;
        --muted: #a9c8c6;
        --accent: #4ee3d1;
        --accent-soft: #97f3e7;
        --line: rgba(255, 255, 255, 0.18);
        --panel: rgba(8, 31, 30, 0.52);
        --panel-2: rgba(10, 44, 42, 0.56);
        --shadow-soft: 0 8px 22px rgba(0, 0, 0, 0.24);
        --shadow-deep: 0 18px 46px rgba(0, 0, 0, 0.34);
        --ok: #2ecc71;
        --pause: #ff6666;
        --chip: #7f8f9a;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; overflow-x: hidden; }
      body {
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(900px 500px at -10% -10%, rgba(78, 227, 209, 0.22), transparent 62%),
          radial-gradient(800px 420px at 115% -15%, rgba(25, 164, 151, 0.25), transparent 62%),
          radial-gradient(700px 500px at 50% 120%, rgba(9, 71, 67, 0.32), transparent 62%),
          linear-gradient(145deg, #011716 0%, var(--base-900) 28%, var(--base) 55%, var(--base-700) 100%);
      }

      .app-shell { min-height: 100vh; display: flex; }
      .sidebar {
        position: fixed; inset: 0 auto 0 0; width: 320px;
        background: linear-gradient(180deg, rgba(4, 25, 24, 0.95), rgba(10, 52, 49, 0.9));
        border-right: 1px solid var(--line);
        backdrop-filter: blur(8px) saturate(120%);
        box-shadow: var(--shadow-deep);
        transform: translateX(-105%);
        transition: transform var(--motion-slow) cubic-bezier(.2,.8,.2,1);
        z-index: 1000;
        overflow-y: auto;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-header {
        padding: 18px;
        font-weight: 800;
        letter-spacing: .5px;
        border-bottom: 1px solid var(--line);
        background: rgba(255,255,255,.06);
      }
      .menu { padding: 12px; }
      .menu-button, .submenu-button {
        width: 100%;
        text-align: left;
        cursor: pointer;
        color: var(--text);
        padding: 12px 13px;
        margin-bottom: 8px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 6px 14px rgba(0,0,0,.2);
        transition: transform var(--motion-fast) ease, background var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
      }
      .menu-button:hover, .submenu-button:hover {
        transform: translateX(5px);
        background: linear-gradient(180deg, rgba(255,255,255,.2), rgba(255,255,255,.08));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 10px 18px rgba(0,0,0,.25);
      }
      .submenu {
        max-height: 0;
        overflow: hidden;
        padding-left: 10px;
        opacity: 0;
        transition: max-height var(--motion-mid) ease, opacity var(--motion-fast) ease;
      }
      .submenu.open { max-height: 420px; opacity: 1; }
      .submenu-button { font-size: 13px; }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(2px);
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--motion-mid) ease;
      }
      .overlay.show { opacity: 1; pointer-events: auto; }
      .content { width: 100%; transition: filter var(--motion-mid) ease; }
      .content.shift { transform: none; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 60;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: linear-gradient(90deg, rgba(3,32,30,.8), rgba(8,66,62,.72));
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(10px) saturate(125%);
        box-shadow: 0 8px 22px rgba(0,0,0,.24);
      }
      .ops-alert-ping { animation: ops-ping 1.3s infinite; display: inline-flex; }
      @keyframes ops-ping {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.18); opacity: .55; }
      }
      .burger {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
        color: #fff;
        font-size: 24px;
        cursor: pointer;
      }
      .top-titles h1 {
        margin: 0;
        font-size: 1.42rem;
        font-weight: 800;
        letter-spacing: .4px;
        text-shadow: 0 4px 16px rgba(0,0,0,.4);
        color: #ff8a2a !important;
      }
      .top-titles p { margin: 4px 0 0; color: #caeeee; font-size: .9rem; }
      .subtitle-voga { font-family: 'Voga', 'VOGA', 'Didot', 'Bodoni MT', 'Times New Roman', serif; letter-spacing: .9px; }

      .top-search { margin-left: auto; position: relative; display: flex; justify-content: flex-end; }
      .top-search input { width: 100%; padding-left: 38px; }
      .top-search-toggle { margin-left: auto; }
      .top-search-panel { position: absolute; top: calc(100% + 10px); right: 0; width: min(430px, 52vw); z-index: 130; }
      .search-wrap { position: relative; }
      .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .95; font-size: 14px; color: #fb923c; display: inline-flex; align-items: center; }
      .search-icon i,
      .search-icon svg { width: 18px; height: 18px; stroke: currentColor; }
      .search-preview {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        z-index: 120;
        max-height: 52vh;
        overflow: auto;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(4, 30, 28, .95);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow-deep);
      }
      .search-item { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,.12); cursor: pointer; }
      .search-item:hover { background: rgba(255,255,255,.08); }
      .search-item:last-child { border-bottom: 0; }
      .search-item strong { display: block; }
      .search-item small { color: #bfe2df; }
      .search-detail { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }

      .main { max-width: 1320px; margin: 20px auto; padding: 0 16px 24px; }
      .main.main-chat-expanded {
        max-width: 100%;
        width: 100%;
        margin: 8px auto 0;
        padding: 0 8px 8px;
        height: calc(100vh - 74px);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .main.main-ops-expanded {
        max-width: 100%;
        width: 100%;
        margin: 8px auto 0;
        padding: 0 10px 14px;
      }
      .ops-main-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.6fr) minmax(430px, 1fr);
        gap: 14px;
        align-items: stretch;
        width: 100%;
      }
      .ops-side-panel {
        max-height: calc(100vh - 96px);
        overflow-y: auto;
        overflow-x: hidden;
      }
      .ops-comment-list {
        max-height: min(46vh, 520px);
        overflow-y: auto;
      }
      @media (max-width: 1460px) {
        .ops-main-layout { grid-template-columns: 1fr; }
        .ops-side-panel { position: relative !important; top: 0 !important; max-height: none; }
        .ops-comment-list { max-height: none; }
      }
      .hero {
        border-radius: 24px;
        padding: 60px 30px;
        text-align: center;
        background: linear-gradient(135deg, rgba(255,255,255,.20), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.28);
        box-shadow: var(--shadow-deep);
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: '';
        position: absolute;
        width: 480px;
        height: 480px;
        top: -260px;
        right: -120px;
        background: radial-gradient(circle, rgba(78,227,209,.35), transparent 60%);
      }
      .hero h2 { margin: 0; font-size: clamp(2rem, 6vw, 4.2rem); letter-spacing: 0.4px; }
      .hero p { margin: 12px 0 0; font-size: clamp(1rem, 2.2vw, 1.5rem); color: #d7f4ef; }

      .panel {
        margin-bottom: 18px;
        border-radius: 22px;
        padding: 20px;
        background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.30);
        backdrop-filter: blur(9px) saturate(120%);
        box-shadow: var(--shadow-soft);
      }
      .panel h2 { margin: 0 0 8px; font-size: 1.25rem; font-weight: 800; letter-spacing: .2px; }
      .hint { color: var(--muted); font-size: 13px; margin-bottom: 12px; }

      .service-layout { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 12px; }
      .service-card {
        grid-column: span 12;
        background: linear-gradient(135deg, rgba(255,255,255,.13), rgba(255,255,255,.04));
        border: 1px solid rgba(255,255,255,.24);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 20px rgba(0,0,0,.2);
        transition: transform var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
      }
      .service-card:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(0,0,0,.26); }
      .service-card h3 {
        margin: 0 0 12px;
        font-size: 15px;
        color: #e8fffb;
        font-weight: 800;
        letter-spacing: .25px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .service-card h3::before { content: '◆'; color: var(--accent); font-size: 12px; }
      .card-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 10px; }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .span-2 { grid-column: span 2; }
      .span-3, .full { grid-column: 1 / -1; }
      label { font-size: 12.8px; font-weight: 650; color: #d8f1f1; line-height: 1.25; word-break: break-word; }

      input, select, button, textarea {
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.30);
        padding: 10px 12px;
        font-size: 14px;
        color: #efffff;
        background: rgba(255,255,255,.10);
        outline: none;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      }
      textarea { min-height: 90px; resize: vertical; }
      input::placeholder, textarea::placeholder { color: #c5dede; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent-soft);
        box-shadow: 0 0 0 3px rgba(123,233,223,.22), 0 8px 18px rgba(0,0,0,.18);
      }
      option { color: #0f172a; background: #ffffff; }

      .radio-row, .switch-row, .state-row { display: flex; gap: 12px; flex-wrap: wrap; }
      .radio-pill, .state-pill {
        border: 1px solid rgba(255,255,255,.28);
        border-radius: 999px;
        padding: 8px 10px;
        cursor: pointer;
        background: rgba(255,255,255,.08);
        font-size: 13px;
      }
      .radio-pill input, .state-pill input { display: none; }
      .radio-pill.active, .state-pill.active { background: rgba(255,255,255,.26); }

      .save-btn {
        width: 100%;
        background: linear-gradient(135deg, #0e756f, #064745);
        border-color: rgba(255,255,255,.40);
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 12px 26px rgba(0,0,0,.28);
        transition: transform var(--motion-fast) ease, filter var(--motion-fast) ease;
      }
      .save-btn:hover { transform: translateY(-1px); filter: brightness(1.06); }

      .compact-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 12px; }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; min-width: 950px; border-collapse: separate; border-spacing: 0; overflow: hidden; border-radius: 14px; }
      th, td { padding: 10px; text-align: left; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,.16); }
      tr.detail-row td { background: rgba(255,255,255,.06); }
      .detail-box { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: #d8efef; line-height: 1.45; }
      .link-btn { border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.12); color: #eaf7f7; border-radius: 8px; padding: 6px 8px; cursor: pointer; }
      th { position: sticky; top: 0; background: rgba(255,255,255,.18); }
      .chip { display: inline-block; padding: 4px 8px; border-radius: 999px; color: #fff; font-size: 12px; font-weight: 700; }
      .status-ongoing { background: var(--ok); }
      .status-pausa { background: var(--pause); }
      .status-default { background: var(--chip); }
      .muted { color: var(--muted); }

      .history-grid { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 12px; }
      .widget {
        background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.28);
        border-radius: 16px;
        padding: 13px;
        box-shadow: var(--shadow-soft);
        position: relative;
      }
      .widget::after {
        content: '';
        position: absolute;
        inset: 0 auto 0 0;
        width: 3px;
        border-radius: 16px 0 0 16px;
        background: linear-gradient(var(--accent), transparent 70%);
        opacity: .9;
      }
      .widget h4 { margin: 0 0 8px; font-size: 13px; color: #d7f4ef; }
      .kv { font-size: 12px; color: #bfe2df; margin: 4px 0; }
      .kv b { color: #ffffff; font-weight: 700; }
      .widget.full { grid-column: 1 / -1; }



      /* Dashboard ERP corporativo SaaS */
      :root {
        --base: #005255;
        --base-900: #003f41;
        --base-700: #0a6666;
        --highlight: #e6fffd;
        --bg-main: #0f172a;
        --bg-surface: #1f2937;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #005255;
        --accent-soft: rgba(0, 100, 101, 0.18);
        --line: #d8e1ea;
        --panel: #ffffff;
        --panel-2: #f8fbfb;
        --shadow-soft: 0 10px 20px rgba(0,0,0,0.08);
        --shadow-deep: 0 20px 40px rgba(0,0,0,0.12);
        --ok: #10b981;
        --pause: #ef4444;
        --chip: #94a3b8;
      }

      * {
        transition: all 0.2s cubic-bezier(.4,0,.2,1);
      }

      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-thumb {
        background: var(--base);
        border-radius: 10px;
      }
      *::-webkit-scrollbar-track {
        background: rgba(230,255,253,.14);
      }

      body {
        color: var(--text);
        background:
          radial-gradient(860px 420px at -12% -10%, rgba(0, 100, 101, .23), transparent 60%),
          radial-gradient(740px 360px at 112% -12%, rgba(11, 123, 123, .18), transparent 60%),
          linear-gradient(180deg, #1f2937 0%, #111827 50%, #0b1220 100%);
      }

      .sidebar {
        width: 286px;
        background: linear-gradient(180deg, var(--base) 0%, var(--base-900) 100%);
        border-right: 1px solid rgba(230,255,253,.16);
        box-shadow: var(--shadow-deep);
      }
      .sidebar-header {
        background: rgba(230,255,253,.08);
        color: #e6fffd;
        border-bottom-color: rgba(230,255,253,.16);
      }
      .menu {
        padding: 14px;
      }
      .menu-button, .submenu-button {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #e6fffd;
        border: 1px solid rgba(230,255,253,.18);
        background: rgba(230,255,253,.08);
        border-radius: 12px;
        padding: 12px 14px;
      }
      .menu-button:hover, .submenu-button:hover {
        transform: translateX(4px);
        background: rgba(230,255,253,.18);
        box-shadow: 0 10px 20px rgba(0,0,0,.2);
      }

      .topbar {
        background: var(--base);
        border-bottom: 1px solid var(--base-700);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 24px rgba(0,0,0,.18);
      }
      .burger {
        color: transparent;
        border-color: rgba(230,255,253,.45);
        border-radius: 14px;
        padding: 0;
        overflow: hidden;
        background-color: rgba(255,255,255,.08);
        background-image: url('https://i.postimg.cc/0jMF5Jpk/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        box-shadow: 0 8px 16px rgba(0,0,0,.18);
      }
      .top-titles h1 {
        color: #ff8a2a !important;
        letter-spacing: .2px;
        text-shadow: none;
      }
      .top-titles p {
        color: #d8fbf8;
        letter-spacing: .07em;
      }

      .topbar .top-titles h1 {
        color: #ff8a2a !important;
      }

      .subtitle-voga {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-weight: 700;
      }

      .top-search {
        max-width: 460px;
      }
      .top-search-panel .search-wrap {
        border-radius: 12px;
        border: 1px solid rgba(251,146,60,.65);
        background: rgba(3, 8, 8, .96);
        padding: 0;
        box-shadow: 0 10px 26px rgba(0,0,0,.35);
      }
      .top-search input {
        border-radius: 12px;
        border: 1px solid transparent;
        background: transparent;
        color: #fff3e8;
      }
      .search-preview {
        background: var(--base);
        border: 1px solid rgba(230,255,253,.3);
        box-shadow: var(--shadow-deep);
      }
      .search-item { border-bottom: 1px solid rgba(230,255,253,.2); color: #ffffff; }
      .search-item:hover { background: var(--base-700); }
      .search-item small { color: #e6fffd; }
      .search-detail {
        color: #e6fffd;
        border-top-color: rgba(230,255,253,.3);
        background: rgba(0, 78, 80, .86);
      }

      .main {
        max-width: 1360px;
        margin: 26px auto;
      }
      .hero,
      .panel,
      .service-card,
      .widget,
      .kpi-card {
        background: #006465;
        border: 1px solid rgba(230,255,253,.25);
        box-shadow: var(--shadow-soft);
      }
      .hero {
        border-radius: 18px;
        padding: 64px 34px;
        background: linear-gradient(140deg, #004c4d 0%, #006465 58%, #0b7b7b 100%);
      }
      .hero::before {
        background: radial-gradient(circle, rgba(230,255,253,.28), transparent 62%);
      }
      .hero h2, .hero p { color: #e6fffd; }

      .panel {
        border-radius: 14px;
        padding: 24px;
      }
      .panel h2, .service-card h3, .widget h4 {
        color: #e6fffd;
      }
      .hint, .kv {
        color: #d1faf5;
      }

      .service-layout { gap: 18px; }
      .service-card {
        border-radius: 14px;
        padding: 22px;
      }
      .service-card h3,
      .service-card label,
      .service-card .hint,
      .service-card .muted,
      .service-card .kv,
      .service-card .detail-box {
        color: #e6fffd;
      }
      .service-card h3::before {
        color: var(--base);
      }
      .service-card:hover,
      .widget:hover,
      .kpi-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 26px rgba(0,0,0,0.12);
      }
      .card-grid, .compact-grid, .history-grid { gap: 16px; }

      .hero {
        width: min(100%, 1180px);
        margin: 14px auto 16px;
      }

      .welcome-card {
        width: min(100%, 1180px);
        margin: 0 auto 16px;
        border: 1px solid rgba(11, 78, 73, .16);
        border-radius: 18px;
        background: linear-gradient(180deg, #f8fbfb 0%, #edf3f3 100%);
        box-shadow: 0 12px 24px rgba(9, 47, 46, .10);
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        justify-items: center;
      }
      .welcome-profile {
        display: flex;
        gap: 14px;
        align-items: center;
      }
      .welcome-avatar {
        width: 98px;
        height: 98px;
        border-radius: 999px;
        object-fit: cover;
        border: 3px solid rgba(0, 100, 101, .24);
        box-shadow: 0 8px 14px rgba(11,78,73,.16);
        background: #dce8e8;
      }
      .welcome-title {
        margin: 0;
        color: #0b4e49;
        font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      }
      .welcome-title b { color: #ff8c00; }
      .welcome-meta {
        margin-top: 8px;
        color: #34575c;
        font-size: 1rem;
      }
      .welcome-meta.secondary {
        margin-top: 5px;
        color: #587478;
      }
      @media (max-width: 980px) {
        .welcome-card { grid-template-columns: 1fr; }
        .dashboard-info-grid { grid-template-columns: 1fr; }
      }


      .dashboard-info-grid {
        width: min(100%, 1180px);
        margin: 0 auto 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .dashboard-info-card {
        border: 1px solid rgba(11, 78, 73, .16);
        border-radius: 16px;
        background: linear-gradient(180deg, #f9fcfc 0%, #eef4f4 100%);
        box-shadow: 0 10px 20px rgba(9, 47, 46, .09);
        padding: 14px;
      }
      .dashboard-info-card h3 {
        margin: 0 0 10px;
        color: #0b4e49;
        font-size: 1.08rem;
      }
      .dashboard-info-list {
        display: grid;
        gap: 8px;
        max-height: 220px;
        overflow: auto;

      function normalizeCatalogNumero(value) {
        const digits = String(value || '').replace(/\D/g, '');

      function parseExtraPreloadedServices(raw) {
        return String(raw || '')
          .split('\n')
          .map((line) => line.trim())
          .filter(Boolean)
          .filter((line, idx) => idx > 0)
          .map((line) => {
            const parts = line.split('\t');
            if (parts.length < 6) return null;
            return {
              numero: normalizeCatalogNumero(parts[0]),
              nombreServicio: String(parts[1] || '').trim(),
              direccionServicio: String(parts[2] || '').trim(),
              tipoServicioBrindar: String(parts[3] || '').trim(),
              representanteComercial: String(parts[4] || '').trim(),
              atencionCliente: String(parts[5] || '').trim(),
            };
          })
          .filter((item) => item && item.numero && item.nombreServicio);
      }

      function mergePreloadedServices(primary, secondary) {
        const merged = [];

        [...primary, ...secondary].forEach((item) => {

          if (!numero || seen.has(numero)) return;
          seen.add(numero);
          merged.push({
            numero,
            nombreServicio: String(item?.nombreServicio || '').trim(),
            direccionServicio: String(item?.direccionServicio || '').trim(),
            tipoServicioBrindar: String(item?.tipoServicioBrindar || '').trim(),
            representanteComercial: String(item?.representanteComercial || '').trim(),
            atencionCliente: String(item?.atencionCliente || '').trim(),
          });
        });
        return merged;

      function normalizeProvidedDate(value) {
        const raw = String(value || '').trim();
        if (!raw || raw === '-' || raw.toLowerCase() === 'pi') return '';
        if (/^\d{4}$/.test(raw)) return `${raw}-01-01`;
        const parts = raw.split('/').map((p) => p.trim());
        if (parts.length !== 3) return '';
        const [d, m, y] = parts;
        const dd = String(Number(d) || '').padStart(2, '0');
        const mm = String(Number(m) || '').padStart(2, '0');
        const yyyy = String(Number(y) || '');
        if (!dd || !mm || yyyy.length !== 4) return '';
        return `${yyyy}-${mm}-${dd}`;
      }

      function parseServiceDates(raw) {
        const map = new Map();
        String(raw || '').split('\n').forEach((line) => {
          const [idRaw, dateRaw = ''] = line.split('-').map((v) => String(v || '').trim());
          const id = normalizeCatalogNumero(idRaw);
          if (!id) return;
          map.set(id, normalizeProvidedDate(dateRaw));
        });
        return map;
      }

      const SERVICE_DATE_OVERRIDES = parseServiceDates(SERVICE_DATES_RAW);

      function normalizeLegacyStatusName(value) {
        const raw = String(value || '').trim();
        return /^completado$/i.test(raw) ? 'Finalizado' : raw;
      }

      function applyServiceCatalogOverrides(row) {
        const normalizedId = normalizeCatalogNumero(row?.clienteId);
        if (!normalizedId) return row;
        const mappedDate = SERVICE_DATE_OVERRIDES.get(normalizedId) || '';
        const normalizedStatus = normalizeLegacyStatusName(row?.status || row?.estado);
        return {
          ...row,
          clienteId: normalizedId,
          fechaAltaServicio: mappedDate || row?.fechaAltaServicio || row?.fechaAlta || row?.fechaEspecificaInicio || '',
          status: normalizedStatus || 'Finalizado',

      function PieChartWidget({ chartId, title, items, size = 'normal' }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          if (!canvasRef.current || !window.Chart) return () => {};
          const filtered = items.filter((i) => i.value > 0);
          const palette = ['#34d399', '#60a5fa', '#f59e0b', '#a78bfa', '#f472b6', '#22d3ee', '#f87171', '#84cc16'];
          const dataItems = filtered.length > 0 ? filtered : [{ name: 'Sin datos', value: 1 }];
          const chart = new window.Chart(canvasRef.current, {
            type: 'pie',
            data: {
              labels: dataItems.map((i) => i.name),
              datasets: [{
                data: dataItems.map((i) => i.value),
                backgroundColor: dataItems.map((_, idx) => palette[idx % palette.length]),
                borderWidth: 1,
                borderColor: 'rgba(255,255,255,.16)',
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              aspectRatio: 1,
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: {
                    color: '#000000',
                    usePointStyle: true,
                    pointStyle: 'circle',
                    boxWidth: 10,
                    boxHeight: 10,
                    padding: 14,
                  },
                },
              },
            },
          });
          return () => chart.destroy();
        }, [items]);

        return (
          <div>
            <h3>{title}</h3>
            <div className={`gerencia-chart-shell ${size === 'large' ? 'large' : ''}`}>
              <canvas ref={canvasRef} className="gerencia-chart-canvas" aria-label={`${title}-${chartId}`} />

            </div>
          </div>
        );
      }

      function MiniBarChart({ chartId, labels, values, color = '#006465' }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          if (!canvasRef.current || !window.Chart) return () => {};
          const chart = new window.Chart(canvasRef.current, {
            type: 'bar',
            data: {
              labels,
              datasets: [{
                data: values,
                borderRadius: 8,
                backgroundColor: color,
                borderWidth: 0,
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: { grid: { display: false }, ticks: { color: '#4f6f6f' } },
                y: { beginAtZero: true, ticks: { display: false }, grid: { color: 'rgba(0,100,101,.09)' } },
              },
            },
          });
          return () => chart.destroy();
        }, [labels.join('|'), values.join('|'), color]);

        return <div className="executive-chart-shell"><canvas ref={canvasRef} aria-label={chartId} /></div>;
      }

      function DonutChartWidget({ chartId, items }) {

      function DashboardGerencia({ rows, recentActivity = [] }) {
        const [realtimeServices, setRealtimeServices] = useState([]);
        const [sellerModal, setSellerModal] = useState(null);

        useEffect(() => {
          if (!rtdb) {
            setRealtimeServices([]);
            return () => {};
          }
          const refs = [
            rtdb.ref('dashboard/ultimasAltasServicio').limitToLast(20),
            rtdb.ref('ultimasAltasServicio').limitToLast(20),
            rtdb.ref('dashboard/serviciosRecientes').limitToLast(20),
          ];
          const localStore = {};
          const listeners = refs.map((sourceRef, idx) => {
            const handler = (snap) => {
              const val = snap.val() || {};
              localStore[idx] = Object.entries(val).map(([id, item]) => {
                const row = item || {};
                const rawDate = row.fechaAlta || row.fecha || row.createdAt || row.timestamp || row.creadoEn || null;
                const timestamp = typeof rawDate === 'number' ? rawDate : (new Date(rawDate).getTime() || 0);
                return {
                  id,
                  nombre: row.nombreEdificio || row.edificio || row.nombreServicio || row.razonSocial || row.nombre || 'Servicio sin nombre',
                  fecha: row.fechaAlta || row.fecha || (timestamp ? new Date(timestamp).toLocaleDateString('es-UY', { day: '2-digit', month: 'long' }) : '-'),
                  timestamp,
                };
              });
              const merged = Object.values(localStore).flat();
              const dedup = [];
              const seen = new Set();
              merged.sort((a, b) => b.timestamp - a.timestamp).forEach((item) => {
                const sig = `${item.nombre}-${item.fecha}`;
                if (seen.has(sig)) return;
                seen.add(sig);
                dedup.push(item);
              });
              setRealtimeServices(dedup.slice(0, 6));
            };
            sourceRef.on('value', handler);
            return { sourceRef, handler };
          });
          return () => listeners.forEach(({ sourceRef, handler }) => sourceRef.off('value', handler));
        }, []);

        const monthLabels = ['Ago', 'Sep', 'Oct', 'Nov', 'Dic', 'Ene'];
        const activeServices = rows.filter((r) => {
          const label = String(r.status || r.estado || '').toLowerCase();
          return !(label.includes('baja') || label.includes('cancel') || label.includes('finaliz') || label.includes('complet'));
        });
        const completedServices = rows.filter((r) => {
          const label = String(r.status || r.estado || '').toLowerCase();
          return label.includes('finaliz') || label.includes('complet');
        });
        const pendingServices = rows.filter((r) => {
          const label = String(r.status || r.estado || '').toLowerCase();
          return label.includes('pend') || label === '' || label.includes('proceso');
        });
        const delayedServices = rows.filter((r) => {
          const label = String(r.status || r.estado || '').toLowerCase();
          return label.includes('atras');
        });

        const ingresosEstimados = rows.reduce((acc, r) => acc + (Number(r.importeMensualServicioSinIva) || 0) + (Number(r.importeMensualArrendamiento) || 0) + (Number(r.importeCompraEquipamiento) || 0), 0);
        const costosOperativos = rows.reduce((acc, r) => acc + (Number(r.costoInstalacionUsdSinIva) || 0) + (Number(r.presupuestoProveedor) || 0), 0);
        const rentabilidad = ingresosEstimados > 0 ? Math.round(((ingresosEstimados - costosOperativos) / ingresosEstimados) * 100) : 0;

        const ingresosTrend = monthLabels.map((_, idx) => Math.max(0, Math.round((ingresosEstimados / 6) * (0.55 + idx * 0.16))));
        const costosTrend = monthLabels.map((_, idx) => Math.max(0, Math.round((costosOperativos / 6) * (0.48 + idx * 0.18))));

        const serviciosSinTecnico = rows.filter((r) => !String(r.tecnico || r.tecnicoAsignado || r.asignadoA || '').trim());
        const presupuestosPendientes = rows.filter((r) => (Number(r.presupuestoProveedor) || 0) <= 0);

        const topVendedoresServicios = Object.entries(rows.reduce((acc, r) => {
          const seller = (r.representanteComercial || r.vendedor || r.usuarioComercial || 'Sin asignar').trim();
          acc[seller] = (acc[seller] || 0) + 1;
          return acc;
        }, {})).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);

        const topVendedoresIngresos = Object.entries(rows.reduce((acc, r) => {
          const seller = (r.representanteComercial || r.vendedor || r.usuarioComercial || 'Sin asignar').trim();
          const income = (Number(r.importeMensualServicioSinIva) || 0) + (Number(r.importeMensualArrendamiento) || 0) + (Number(r.importeCompraEquipamiento) || 0);
          acc[seller] = (acc[seller] || 0) + income;
          return acc;
        }, {})).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);

        function openSellerModal(type) {
          const isMoney = type === 'ingresos';
          setSellerModal({
            type,
            title: isMoney ? 'Top vendedores por ingresos' : 'Top vendedores por servicios',
            items: isMoney ? topVendedoresIngresos : topVendedoresServicios,
          });
        }

        function exportExecutivePdf(kind) {
          if (!window.jspdf?.jsPDF) {
            alert('No se pudo cargar el generador de PDF.');
            return;
          }
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: 'mm', format: 'a4' });
          const fecha = new Date().toLocaleString('es-UY');
          const title = kind === 'ingresos' ? 'Reporte ejecutivo - Ingresos estimados' : 'Reporte ejecutivo - Costos operativos';
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(16);
          doc.text('Masterson Seguridad', 14, 18);
          doc.setFontSize(13);
          doc.text(title, 14, 28);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10);
          doc.text(`Generado: ${fecha}`, 14, 34);

          let y = 44;
          const writeLine = (label, value) => {
            doc.setFont('helvetica', 'bold');
            doc.text(`${label}:`, 14, y);
            doc.setFont('helvetica', 'normal');
            doc.text(String(value), 72, y);
            y += 7;
          };

          if (kind === 'ingresos') {
            writeLine('Ingresos estimados', `US$ ${ingresosEstimados.toLocaleString('es-UY')}`);
            writeLine('Rentabilidad actual', `${rentabilidad}%`);
            writeLine('Servicios activos', activeServices.length);
            writeLine('Servicios finalizados', completedServices.length);
            y += 3;
            doc.setFont('helvetica', 'bold');
            doc.text('Tendencia mensual de ingresos (referencial):', 14, y);
            y += 7;
            monthLabels.forEach((month, idx) => {
              writeLine(month, `US$ ${(ingresosTrend[idx] || 0).toLocaleString('es-UY')}`);
            });
          } else {
            const totalInstalaciones = rows.reduce((acc, r) => acc + (Number(r.costoInstalacionUsdSinIva) || 0), 0);
            const totalProveedores = rows.reduce((acc, r) => acc + (Number(r.presupuestoProveedor) || 0), 0);
            writeLine('Costos operativos', `US$ ${costosOperativos.toLocaleString('es-UY')}`);
            writeLine('Instalaciones', `US$ ${totalInstalaciones.toLocaleString('es-UY')}`);
            writeLine('Proveedores', `US$ ${totalProveedores.toLocaleString('es-UY')}`);
            writeLine('Presupuestos pendientes', presupuestosPendientes.length);
            y += 3;
            doc.setFont('helvetica', 'bold');
            doc.text('Tendencia mensual de costos (referencial):', 14, y);
            y += 7;
            monthLabels.forEach((month, idx) => {
              writeLine(month, `US$ ${(costosTrend[idx] || 0).toLocaleString('es-UY')}`);
            });
          }

          const fileName = kind === 'ingresos' ? 'reporte_ingresos_dashboard.pdf' : 'reporte_costos_dashboard.pdf';
          doc.save(fileName);
        }

        const latestRowsFallback = rows
          .map((r) => ({
            id: r.id,
            nombre: r.nombreEdificio || r.nombreServicio || r.razonSocial || 'Servicio sin nombre',
            fecha: r.fechaAltaServicio || r.fechaAlta || r.fechaIngresoDatos || '-',
            timestamp: r.creadoEn?.seconds ? r.creadoEn.seconds * 1000 : 0,
          }))
          .sort((a, b) => b.timestamp - a.timestamp)
          .slice(0, 6);
        const latestServices = realtimeServices.length ? realtimeServices : latestRowsFallback;

        const activityFeed = recentActivity.slice(0, 6);


        const rentabilityBreakdown = [
          { name: 'Pendientes', value: pendingServices.length },
          { name: 'Finalizados', value: completedServices.length },
          { name: 'Atrasados', value: delayedServices.length },
        ];

        return (
          <section className="panel dashboard-gerencia-panel executive-dashboard">
            <article className="executive-hero">
              <h2>Dashboard Ejecutivo</h2>
              <p>Resumen general de la operación</p>
              <div className="executive-kpi-grid">
                {[
                  { icon: 'briefcase-business', label: 'Servicios activos', value: activeServices.length },
                  { icon: 'badge-check', label: 'Finalizados', value: completedServices.length },
                  { icon: 'clock-3', label: 'Pendientes', value: pendingServices.length },
                  { icon: 'triangle-alert', label: 'Atrasados', value: delayedServices.length, warn: true },
                ].map((item) => (
                  <article key={item.label} className="executive-kpi-card">
                    <span className={`executive-kpi-icon ${item.warn ? 'warn' : ''}`}><i data-lucide={item.icon} /></span>
                    <div>
                      <div className="executive-kpi-value">{item.value}</div>
                      <div className="executive-kpi-label">{item.label}</div>
                    </div>
                  </article>
                ))}
              </div>
            </article>

            <section className="executive-finance-grid">
              <article className="executive-card">
                <h3>Ingresos estimados</h3>
                <div className="executive-value">US$ {ingresosEstimados.toLocaleString('es-UY')}</div>
                <MiniBarChart chartId="ingresos-estimados" labels={monthLabels} values={ingresosTrend} color="#168f90" />
                <button type="button" className="executive-btn" onClick={() => exportExecutivePdf('ingresos')}>Ver reportes</button>
              </article>

              <article className="executive-card">
                <h3>Costos operativos</h3>
                <div className="executive-value">US$ {costosOperativos.toLocaleString('es-UY')}</div>
                <MiniBarChart chartId="costos-operativos" labels={monthLabels} values={costosTrend} color="#f39a3d" />
                <button type="button" className="executive-btn accent" onClick={() => exportExecutivePdf('costos')}>Exportar datos</button>
              </article>

              <article className="executive-card">
                <h3>Rentabilidad actual</h3>
                <div className="executive-value">{rentabilidad}%</div>
                <DonutChartWidget chartId="rentabilidad" items={rentabilityBreakdown} />

            </section>

                  <div className="executive-item executive-alert-item"><span className="executive-alert-icon"><i data-lucide="triangle-alert" /></span><span>{delayedServices.length} servicios atrasados</span></div>
                  <div className="executive-item executive-alert-item"><span className="executive-alert-icon"><i data-lucide="user-x" /></span><span>{serviciosSinTecnico.length} servicios sin técnico asignado</span></div>
                  <div className="executive-item executive-alert-item"><span className="executive-alert-icon"><i data-lucide="file-warning" /></span><span>{presupuestosPendientes.length} presupuestos pendientes</span></div>

      function DashboardTecnica({ rows, onGoToDetalle }) {
        const now = new Date();
        const weekStart = new Date(now);
        weekStart.setDate(now.getDate() - 7);
        const monthStart = new Date(now);
        monthStart.setMonth(now.getMonth() - 1);

        const normalizeStatus = (row) => normalizeLegacyStatusName(row?.status || row?.estado || 'pendiente').toLowerCase();
        const isTrabajoNuevo = (row) => {
          const statusRaw = normalizeStatus(row);
          return statusRaw === 'pendiente' || statusRaw.includes('nuevo') || statusRaw.includes('ingres');
        };
        const isTrabajoFinalizado = (row) => {
          const statusRaw = normalizeStatus(row);
          return statusRaw.includes('final') || statusRaw.includes('complet') || statusRaw.includes('realiz') || statusRaw.includes('dado de alta');
        };

        const nuevos = rows.filter((r) => isTrabajoNuevo(r)).length;
        const finalizados = rows.filter((r) => isTrabajoFinalizado(r)).length;
        const enProceso = rows.length - nuevos - finalizados;

        const thisWeek = rows.filter((r) => {
          const ts = r.creadoEn?.seconds ? new Date(r.creadoEn.seconds * 1000) : null;
          return ts && ts >= weekStart;
        }).length;

        const thisMonth = rows.filter((r) => {
          const ts = r.creadoEn?.seconds ? new Date(r.creadoEn.seconds * 1000) : null;
          return ts && ts >= monthStart;
        }).length;

        return (
          <section className="panel">
            <h2>Dashboard Área Técnica</h2>
            <div className="hint">Vista solo lectura con resumen de ESTADO DE TRABAJOS y seguimiento operativo semanal/mensual.</div>
            <div className="compact-grid" style={{ marginBottom: 12 }}>
              <article className="widget"><h4>Trabajos nuevos cargados</h4><div className="gerencia-value">{nuevos}</div></article>
              <article className="widget"><h4>Trabajos en proceso</h4><div className="gerencia-value">{Math.max(0, enProceso)}</div></article>
              <article className="widget"><h4>Trabajos finalizados</h4><div className="gerencia-value">{finalizados}</div></article>
            </div>
            <h3 style={{ marginTop: 0 }}>Indicadores del Área Técnica</h3>
            <div className="gerencia-status-list">
              <div className="gerencia-item"><span>Trabajos nuevos (últimos 7 días)</span><b>{thisWeek}</b></div>
              <div className="gerencia-item"><span>Trabajos nuevos (últimos 30 días)</span><b>{thisMonth}</b></div>
              <div className="gerencia-item"><span>Total de trabajos registrados</span><b>{rows.length}</b></div>
            </div>
            <div style={{ marginTop: 14 }}>
              <button type="button" className="save-btn" onClick={onGoToDetalle}>Ver detalle de trabajos</button>
            </div>
          </section>
        );
      }


      function TrackingView() {
        const [trackingData, setTrackingData] = useState(null);
        const [trackingLoading, setTrackingLoading] = useState(true);
        const [trackingError, setTrackingError] = useState('');
        const [trackingBlocked, setTrackingBlocked] = useState(false);

        const operationId = useMemo(() => {
          const params = new URLSearchParams(window.location.search || '');
          return String(params.get('id') || '').trim();
        }, []);

        useEffect(() => {
          if (!operationId) {
            setTrackingError('Debes ingresar un ID de operación válido.');
            setTrackingLoading(false);
            return () => {};
          }

          const normalize = (v) => String(v || '').trim().toUpperCase();
          const compact = (v) => normalize(v).replace(/[^A-Z0-9]/g, '');
          const stripCli = (v) => compact(v).replace(/^CLI/, '');
          const inputVariants = new Set([normalize(operationId), compact(operationId), stripCli(operationId)].filter(Boolean));

          let unsub = () => {};
          let cancelled = false;
          let authIssue = '';

          const applyDoc = (doc) => {
            if (!doc || !doc.exists || cancelled) {
              setTrackingData(null);
              setTrackingError('No encontramos una operación asociada al Cliente ID ingresado.');
              setTrackingLoading(false);
              return;
            }
            const data = { id: doc.id, ...doc.data() };
            const estadoActual = String(data?.estado || data?.status || '').trim().toLowerCase();
            const finalizado = estadoActual === 'finalizado' || estadoActual.includes('alta finalizada') || estadoActual.includes('completado') || estadoActual.includes('dado de alta');
            setTrackingBlocked(finalizado);
            setTrackingData(data);
            setTrackingError('');
            setTrackingLoading(false);
          };

          (async () => {
            try {
              // Permite acceso desde links públicos en móviles sin login previo
              if (!auth.currentUser) {
                try {
                  await auth.signInAnonymously();
                  authIssue = '';
                } catch (authErr) {
                  const authCode = String(authErr?.code || '');
                  console.warn('No se pudo iniciar sesión anónima para tracking:', authErr);
                  if (authCode.includes('operation-not-allowed')) {
                    authIssue = 'auth/operation-not-allowed';
                  } else if (authCode.includes('unauthorized-domain')) {
                    authIssue = 'auth/unauthorized-domain';
                  } else {
                    authIssue = 'auth/error';
                  }
                }
              }

              const exact = await db.collection('operaciones').where('clienteId', '==', operationId).limit(1).get();
              if (!exact.empty) {
                unsub = db.collection('operaciones').doc(exact.docs[0].id).onSnapshot(applyDoc, (err) => {
                  if (cancelled) return;
                  console.error('Error leyendo operación exacta:', err);
                  setTrackingError('No se pudo consultar la operación.');
                  setTrackingLoading(false);
                });
                return;
              }

              // Fallback robusto por formato de ID (CLI-5404 vs 5404, guiones/espacios/case)
              const scan = await db.collection('operaciones').limit(1000).get();
              const match = scan.docs.find((d) => {
                const data = d.data() || {};
                const candidates = [
                  data.clienteId,
                  data.clienteID,
                  data.idCliente,
                ];
                const variants = new Set();
                candidates.forEach((c) => {
                  variants.add(normalize(c));
                  variants.add(compact(c));
                  variants.add(stripCli(c));
                });
                return [...variants].some((v) => v && inputVariants.has(v));
              });

              if (match) {
                unsub = db.collection('operaciones').doc(match.id).onSnapshot(applyDoc, (err) => {
                  if (cancelled) return;
                  console.error('Error leyendo operación normalizada:', err);
                  setTrackingError('No se pudo consultar la operación.');
                  setTrackingLoading(false);
                });
                return;
              }

              setTrackingData(null);
              setTrackingError('No encontramos una operación asociada al Cliente ID ingresado.');
              setTrackingLoading(false);
            } catch (err) {
              if (cancelled) return;
              console.error('Error leyendo operación de seguimiento:', err);
              const msg = String(err?.message || '').toLowerCase();
              const denied = msg.includes('permission') || msg.includes('missing or insufficient permissions');
              const basePermissionMsg = 'No se pudo consultar la operación por permisos de seguridad.';
              if (!denied) {
                setTrackingError('No se pudo consultar la operación.');
              } else if (authIssue === 'auth/operation-not-allowed') {
                setTrackingError(`${basePermissionMsg} Debes habilitar Anonymous en Firebase Auth para links públicos.`);
              } else if (authIssue === 'auth/unauthorized-domain') {
                setTrackingError(`${basePermissionMsg} Agregá el dominio mastersonvirtual.github.io en Authorized domains de Firebase Auth.`);
              } else {
                setTrackingError(`${basePermissionMsg} Verificá reglas de Firestore para permitir lectura de seguimiento sin login manual.`);
              }
              setTrackingLoading(false);
            }
          })();

          return () => {
            cancelled = true;
            unsub();
          };
        }, [operationId]);

        const nombreServicio = trackingData?.nombreServicio || 'Servicio';
        const estadoVisible = trackingData?.estado || trackingData?.status || '-';

        return (
          <div className="tracking-shell">
            <header className="tracking-header">
              <h1 className="tracking-title" style={{ margin: 0 }}>Seguimiento de Servicio: {nombreServicio}</h1>
              <p className="hint" style={{ marginTop: 6 }}>Cliente ID consultado: {operationId || '-'}</p>
              <div className="tracking-logo" aria-hidden="true" />
            </header>

            {trackingLoading ? (
              <section className="panel"><h2 className="tracking-title">Cargando seguimiento...</h2></section>
            ) : trackingError ? (
              <section className="panel"><h2 className="tracking-title">Error</h2><div className="hint">{trackingError}</div><div className="tracking-data" style={{ marginTop: 8 }}>Este enlace está diseñado para abrir sin login manual.</div></section>
            ) : trackingBlocked ? (
              <section className="panel"><h2 className="tracking-title">Acceso bloqueado</h2><div className="hint">Este edificio ya fue dado de alta. Gracias por confiar en Masterson Seguridad. Por razones de seguridad, este enlace ya no está activo.</div></section>
            ) : (
              <section className="tracking-grid">
                <article className="tracking-card wide">
                  <h3 style={{ marginTop: 0 }}>Detalle de Seguimiento</h3>
                  <div className="tracking-data"><b>Vendedor:</b> {trackingData?.representanteComercial || '-'}</div>
                  <div className="tracking-data"><b>Fecha de Alta:</b> {trackingData?.fechaEspecificaInicio || trackingData?.fechaAltaServicio || '-'}</div>
                  <div className="tracking-data"><b>Jornales:</b> {trackingData?.cantidadJornalesEstimados || '-'}</div>
                  <div className="tracking-data"><b>Estado:</b> {estadoVisible}</div>
                </article>
              </section>
            )}

            <div className="app-footer" aria-label="signature"><strong>v1.2 | Powered by Alfonso Carballo</strong></div>
          </div>
        );
      }

        function parseServiceDate(value) {
          if (!value) return null;
          if (typeof value?.toDate === 'function') return value.toDate();
          if (typeof value?.seconds === 'number') return new Date(value.seconds * 1000);
          if (value instanceof Date) return Number.isNaN(value.getTime()) ? null : value;
          const str = String(value).trim();
          if (!str) return null;
          const iso = new Date(str);
          if (!Number.isNaN(iso.getTime())) return iso;
          const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
          if (m) {
            const d = Number(m[1]);
            const mm = Number(m[2]);
            const y = Number(m[3]);
            const dt = new Date(y, mm - 1, d);
            return Number.isNaN(dt.getTime()) ? null : dt;
          }
          return null;

          const activeKeys = Object.entries(filters.statuses || {}).filter(([,v]) => !!v).map(([k]) => k);
          let out = list.filter((service) => activeKeys.length === 0 ? true : activeKeys.includes(resolveSellerStatusKey(service)));

          const fromDate = parseServiceDate(filters.dateFrom);
          if (fromDate) {
            fromDate.setHours(0,0,0,0);
            out = out.filter((service) => {
              const d = parseServiceDate(service.fechaAltaServicio || service.fechaAlta || service.fechaEspecificaInicio);
              if (!d) return false;
              d.setHours(0,0,0,0);
              return d >= fromDate;
            });
          }

          const toDate = parseServiceDate(filters.dateTo);
          if (toDate) {
            toDate.setHours(23,59,59,999);
            out = out.filter((service) => {
              const d = parseServiceDate(service.fechaAltaServicio || service.fechaAlta || service.fechaEspecificaInicio);
              if (!d) return false;
              return d <= toDate;
            });

          const gainOf = (service) => Number(String(service.importeMensualServicioSinIva || service.costoInstalacionUsdSinIva || service.costo || 0).replace(/[^\d.-]/g, '')) || 0;

          out = out.slice().sort((a, b) => {
            const ad = parseServiceDate(a.fechaAltaServicio || a.fechaAlta || a.fechaEspecificaInicio)?.getTime() || 0;
            const bd = parseServiceDate(b.fechaAltaServicio || b.fechaAlta || b.fechaEspecificaInicio)?.getTime() || 0;
            const ag = gainOf(a);
            const bg = gainOf(b);
            switch (filters.sortBy) {
              case 'date_asc': return ad - bd;
              case 'gain_desc': return bg - ag;
              case 'gain_asc': return ag - bg;
              case 'date_desc':
              default:

          });

        async function handleSyncBulkCatalogRawToFirebase() {
          if (!isAdminUser) {
            setNotificacion({ mensaje: 'Solo administradores pueden sincronizar listados masivos.', tipo: 'warn' });
            return;
          }
          const parsed = parseExtraPreloadedServices(bulkCatalogRawInput);
          if (parsed.length === 0) {
            setNotificacion({ mensaje: 'No se encontraron filas válidas en el listado pegado.', tipo: 'warn' });
            return;
          }
          try {
            setBulkCatalogSyncing(true);
            const existingIds = new Set(visibleRows.map((r) => normalizeServiceId(r?.clienteId)).filter(Boolean));
            const uniqueMap = new Map();
            parsed.forEach((item) => {
              const id = normalizeServiceId(item.numero);
              if (!id || uniqueMap.has(id) || existingIds.has(id)) return;
              uniqueMap.set(id, item);
            });
            const pending = Array.from(uniqueMap.values());
            if (pending.length === 0) {
              setNotificacion({ mensaje: 'Todas las filas del listado ya existen en operaciones.', tipo: 'ok' });
              return;
            }
            const chunkSize = 450;
            for (let i = 0; i < pending.length; i += chunkSize) {
              const chunk = pending.slice(i, i + chunkSize);
              const batch = db.batch();
              chunk.forEach((service) => {
                const normalizedId = normalizeServiceId(service.numero);
                const docRef = db.collection('operaciones').doc(`catalogo_massivo_${normalizedId}`);
                batch.set(docRef, {
                  tipoAccion: 'Nuevo Servicio',
                  clienteId: normalizedId,
                  nombreServicio: service.nombreServicio || '',
                  direccionServicio: service.direccionServicio || '',
                  tipoServicioBrindar: normalizeServiceType(service.tipoServicioBrindar) || '',
                  representanteComercial: service.representanteComercial || '',
                  atencionCliente: service.atencionCliente || '',
                  status: 'Precargado',
                  estado: 'Precargado',
                  origenCatalogo: true,
                  origenCatalogoMasivo: true,
                  creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
                  creadoPor: currentUserName,
                  logs_cambios: [{
                    fecha: formatNow(),
                    usuario: currentUserName,
                    accion: 'Sincronización masiva desde listado pegado',
                  }],
                }, { merge: true });
              });
              await batch.commit();
            }
            setNotificacion({ mensaje: `Se sincronizaron ${pending.length} servicios del listado masivo a operaciones.`, tipo: 'ok' });
          } catch (error) {
            console.error('Error en sincronización masiva de catálogo:', error);
            setNotificacion({ mensaje: 'Falló la sincronización masiva del listado.', tipo: 'error' });
          } finally {
            setBulkCatalogSyncing(false);
          }
        }

        async function handleDownloadPdf(service) {
          if (!service || !window.jspdf?.jsPDF) {
            alert('No se pudo cargar el generador de PDF.');
            return;
          }

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: 'mm', format: 'a4' });
          const pageWidth = doc.internal.pageSize.getWidth();
          const pageHeight = doc.internal.pageSize.getHeight();
          const margin = 16;
          const topBarHeight = 28;
          const lineColor = [0, 100, 101];
          const logoUrl = 'https://i.postimg.cc/0jMF5Jpk/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png';

          function drawHeader() {
            doc.setFillColor(0, 0, 0);
            doc.rect(0, 0, pageWidth, topBarHeight, 'F');
          }

          function ensureSpace(y, needed = 12) {
            if (y + needed <= pageHeight - margin - 18) return y;
            doc.addPage();
            drawHeader();
            return margin + 8;
          }

          drawHeader();

          try {
            const imgData = await fetch(logoUrl)
              .then((r) => r.blob())
              .then((blob) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
              }));
            const logoHeight = topBarHeight - 2;
            const logoWidth = 26;
            doc.addImage(imgData, 'PNG', pageWidth - logoWidth - 2, 1, logoWidth, logoHeight, undefined, 'FAST');
          } catch (err) {
            console.warn('No se pudo cargar el logo para PDF', err);
          }

          doc.setTextColor(0, 100, 101);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(12);
          doc.text('Masterson Seguridad – Área de Coordinación Técnica y Comercial', margin, (topBarHeight / 2) + 2);

          let y = topBarHeight + 16;

          function drawSection(title, fields) {
            y = ensureSpace(y, 18 + fields.length * 7);
            const boxX = margin;
            const boxW = pageWidth - margin * 2;
            const startY = y;

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(10.5);
            doc.setTextColor(0, 100, 101);
            doc.text(title, boxX + 2, y + 5);
            y += 9;

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(20, 23, 28);

            fields.forEach(([k, v]) => {
              y = ensureSpace(y, 7);
              const line = `${k}: ${v || '-'}`;
              const wrapped = doc.splitTextToSize(line, boxW - 6);
              doc.text(wrapped, boxX + 3, y);
              y += wrapped.length * 4.6 + 1;
            });

            doc.setDrawColor(...lineColor);
            doc.setLineWidth(0.18);
            doc.rect(boxX, startY, boxW, y - startY + 2);
            y += 7;
          }

          drawSection('Resumen del Servicio', [
            ['Servicio', service.nombreServicio],
            ['Cliente ID', service.clienteId],
            ['Tipo de Acción', service.tipoAccion],
            ['Status', service.status],
            ['Fecha de descarga', formatNow()],
          ]);

          drawSection('Cliente y Facturación', [
            ['Representante Comercial', service.representanteComercial],
            ['Razón Social', service.razonSocial],
            ['RUT', service.rut],
            ['Mail Facturación', service.mailFacturacion],
            ['Duración Contrato', service.duracionContratoMeses],
          ]);

          drawSection('Operación Técnica y Económica', [
            ['Tipo Servicio', service.tipoServicioBrindar],
            ['Dirección', service.direccionServicio],
            ['Importe Mensual sin IVA', service.importeMensualServicioSinIva],
            ['Costo Instalación US$', service.costoInstalacionUsdSinIva],
            ['Presupuesto Proveedor', service.presupuestoProveedor],
            ['Fecha Ingreso', service.fechaIngresoDatos || service.fechaCarga || service.fechaCharla],
          ]);

          drawSection('Observaciones', [
            ['Proyecto', service.proyectoServicio],
            ['Observaciones', service.observacionesComentarios],
            ['Excepciones', service.excepcionesAcordadas],
          ]);

          // Firma automática al final de la última página
          if (y > pageHeight - 30) {
            doc.addPage();
            drawHeader();
            y = margin + 8;
          }
          const signatureY = pageHeight - 18;
          doc.setDrawColor(...lineColor);
          doc.setLineWidth(0.18);
          doc.line(margin, signatureY - 3, pageWidth - margin, signatureY - 3);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10);
          doc.setTextColor(20, 23, 28);
          doc.text(`Emitido por: ${currentUserName || 'Usuario'}`, margin, signatureY + 2);

          const safeId = String(service.clienteId || 'servicio').replace(/[^a-z0-9_-]/gi, '_');
          const safeName = String(service.nombreServicio || 'detalle').replace(/[^a-z0-9_-]/gi, '_');
          doc.save(`Masterson_${safeId}_${safeName}.pdf`);
        }

        async function handleTechnicalDocumentUpload(file, service) {
          if (!file || !service?.id || !isTechnicalOnly) return;
          if (!String(file.type || '').includes('pdf')) {
            setNotificacion({ mensaje: 'Solo se permiten archivos PDF para documentos técnicos.', tipo: 'error' });
            return;
          }
          if (file.size > 10 * 1024 * 1024) {
            setNotificacion({ mensaje: 'El PDF supera el límite de 10MB.', tipo: 'error' });
            return;
          }
          setUploadingTechnicalDoc(true);
          try {
            const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve(String(reader.result || ''));
              reader.onerror = () => reject(new Error('No se pudo leer el archivo PDF.'));
              reader.readAsDataURL(file);
            });
            const nuevoAdjunto = {
              id: `doc-${Date.now()}`,
              name: file.name || 'documento.pdf',
              mimeType: file.type || 'application/pdf',
              url: dataUrl,
              uploadedAt: new Date().toISOString(),
              uploadedBy: currentUserName || 'Área Técnica',
            };
            const prevAdjuntos = Array.isArray(service.documentosAdjuntos) ? service.documentosAdjuntos : [];
            const nextAdjuntos = [...prevAdjuntos, nuevoAdjunto].slice(-20);
            await db.collection('operaciones').doc(service.id).set({ documentosAdjuntos: nextAdjuntos }, { merge: true });
            setSelectedService((prev) => (prev?.id === service.id ? { ...prev, documentosAdjuntos: nextAdjuntos } : prev));
            setRows((prev) => prev.map((row) => (row.id === service.id ? { ...row, documentosAdjuntos: nextAdjuntos } : row)));
            setNotificacion({ mensaje: 'Documento PDF adjuntado correctamente.', tipo: 'ok' });
          } catch (error) {
            console.error('Error cargando documento técnico:', error);
            setNotificacion({ mensaje: 'No se pudo adjuntar el documento PDF.', tipo: 'error' });
          } finally {
            setUploadingTechnicalDoc(false);
            setTechnicalDocDragOver(false);
          }

        async function handleSubmit(e) {
          e.preventDefault();
          if (selectedForm === 'home') return;
          if (!effectiveClienteId) return alert('Debes indicar un Cliente ID asociado para esta acción.');

          const normalizedStatusToSave = normalizeLegacyStatusName(status);
          const normalizedClientId = normalizeServiceId(effectiveClienteId) || String(effectiveClienteId || '').trim();
          const actionNeedsExistingService = ['Baja', 'Novación', 'Obra', 'Movimiento de obra', 'Charla informativa', 'Adicionales', 'Solicitud de presupuesto'].includes(tipoAccion);

          const doc = { tipoAccion, clienteId: normalizedClientId, status: normalizedStatusToSave, estado: normalizedStatusToSave };

          if (grupo === 'servicio') {
            if (servicioForm.tipoAltaServicio === 'Obra') {
              if (!servicioForm.nombreServicio || !servicioForm.direccionServicio || !servicioForm.tipoServicioBrindar) {
                return alert('Completá al menos: Nombre del servicio, Dirección y Tipo de servicio.');
              }
              if (servicioForm.fechaAltaNegociadaEstado !== 'No se negoció' && !servicioForm.fechaAltaServicio) {
                return alert('Indicá la fecha de alta negociada o marcá "No se negoció".');
              }
              if (servicioForm.llavesServicio !== 'Entregadas a Operaciones') {
                return alert('No se puede dar de alta el servicio si las llaves no están marcadas como "Entregadas a Operaciones".');
              }
            } else if (!servicioForm.nombreServicio || !servicioForm.direccionServicio || !servicioForm.tipoServicioBrindar) {
              return alert('Completá al menos: Nombre del servicio, Dirección y Tipo de servicio.');
            }
            Object.assign(doc, { ...servicioForm, formulario: 'nuevo-servicio-optimizado', creadoPor: servicioForm.creadoPor || currentUserName, auditoriaApertura: formOpenAudit });
          }
          if (grupo === 'obra') {
            if (!obraForm.razonSocial || !obraForm.rut || !obraForm.mailFacturacion || !obraForm.nombreServicio || !obraForm.fechaAlta) {
              return alert('Completá al menos: Razón social, RUT, Mail, Nombre de servicio y Fecha de alta.');
            }
            Object.assign(doc, { ...obraForm, formulario: 'servicio-obra', creadoPor: obraForm.creadoPor || currentUserName, auditoriaApertura: formOpenAudit });
          }
          if (grupo === 'novacion') {
            if (!novacionForm.nombreServicio || !novacionForm.duracionNuevoContratoMeses) {
              return alert('Completá al menos: Nombre del servicio y Duración del nuevo contrato.');
            }
            if (novacionForm.representanteComercial === 'Otro' && (!novacionForm.comercialOtroNombre || !novacionForm.motivoCambioComercial)) {
              return alert('Si seleccionás representante comercial "Otro", completá quién es y el motivo del cambio.');
            }
            Object.assign(doc, { ...novacionForm, formulario: 'novacion', creadoPor: novacionForm.creadoPor || currentUserName, auditoriaApertura: formOpenAudit });
          }
          if (grupo === 'agregado') {
            if (!agregadoForm.nombreServicio || !agregadoForm.fechaAltaAdicional) {
              return alert('Completá al menos: Nombre del servicio y Fecha de alta de los adicionales.');
            }
            Object.assign(doc, { ...agregadoForm, formulario: 'agregado' });
          }
          if (grupo === 'solicitud-presupuesto') {
            if (!normalizedClientId || !solicitudPresupuestoForm.ejecutivoCuenta) {
              return alert('Completá al menos: ID del servicio y Ejecutivo de cuenta.');
            }
            Object.assign(doc, { ...solicitudPresupuestoForm, formulario: 'solicitud-presupuesto' });
          }
          if (grupo === 'base') {
            if (!cliente || !fechaCarga) return alert('Completá Cliente y Fecha Carga.');
            Object.assign(doc, { cliente, fechaCarga, tiempoInstalacion, fechaAlta, cobro });
          }
          if (grupo === 'movimiento-detalle') {
            if (!movimientoForm.nombreServicio || !normalizedClientId) {
              return alert('Seleccioná un servicio existente (ID) y verificá el nombre del servicio.');
            }
            if (!movimientoForm.nombreSolicitante || !movimientoForm.solicitanteNombreCliente || !movimientoForm.solicitanteTelefono) {
              return alert('Completá: Quién lo solicita, Nombre del cliente y Teléfono.');
            }
            const costoNum = Number(movimientoForm.costoUsd || 0);
            if (costoNum === 0 && (!movimientoForm.motivoNoCobro || !movimientoForm.autorizaNoCobro)) {
              return alert('Si el costo es 0, debés completar Motivo por el cual no se cobra y Quién autoriza.');
            }
            Object.assign(doc, { ...movimientoForm, formulario: 'movimiento-obra' });
          }
          if (grupo === 'baja-detalle') {
            if (!bajaForm.nombreServicio || !normalizedClientId) {
              return alert('Seleccioná un servicio existente y verificá el nombre del servicio.');
            }
            if (!bajaForm.motivoBajaCategoria) {
              return alert('Seleccioná un motivo principal de baja.');
            }
            Object.assign(doc, { ...bajaForm, formulario: 'baja-servicio', status: 'Baja', estado: 'Baja' });
          }
          if (grupo === 'charla-detalle') {
            if (!charlaForm.responsableCharla || !charlaForm.fecha || !charlaForm.horario || !charlaForm.direccion) {
              return alert('Completá al menos: Responsable, Fecha, Hora y Dirección.');
            }
            Object.assign(doc, { ...charlaForm, formulario: 'charla-informativa' });
          }

          setSaving(true);

          try {
            const byRows = rows.find((r) => normalizeServiceId(r?.clienteId) === normalizeServiceId(normalizedClientId) && !r?.estado_borrado);
            let existingDocIdByClient = byRows?.id || null;

            if (!existingDocIdByClient && normalizedClientId) {
              const exact = await db.collection('operaciones').where('clienteId', '==', normalizedClientId).limit(1).get();
              if (!exact.empty) existingDocIdByClient = exact.docs[0].id;
            }

            if (!existingDocIdByClient && actionNeedsExistingService && !editingServiceId) {
              setNotificacion({ mensaje: '✖ El servicio no existe. Primero debés crearlo para registrar esta operación.', tipo: 'error' });
              return;
            }

            const targetDocId = editingServiceId || existingDocIdByClient || null;
            const nextLog = {
              fecha: new Date().toISOString(),
              usuario: currentUserName,
              accion: editingServiceId || existingDocIdByClient ? 'Actualización de datos' : 'Alta de servicio',
            };

            const targetSource = rows.find((r) => r.id === targetDocId) || selectedService;
            const existingLogs = Array.isArray(targetSource?.logs_cambios) ? targetSource.logs_cambios : [];

            if (targetDocId) {
              if (grupo === 'baja-detalle') {
                const bajaPayload = {
                  ...doc,
                  servicioPadreId: targetDocId,
                  creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
                  creadoPor: currentUserName,
                };
                await db.collection('operaciones').doc(targetDocId).collection('bajasServicio').add(bajaPayload);
                await db.collection('operaciones').doc(targetDocId).set({
                  status: 'Baja',
                  estado: 'Baja',
                  actualizadoEn: firebase.firestore.FieldValue.serverTimestamp(),
                  editadoPor: currentUserName,
                }, { merge: true });
                resetFields();
                setNotificacion({ mensaje: '✔ Baja registrada (Servicios 1 → Bajas N)', tipo: 'ok' });
                void logRealtimeActivityEvent({ usuario: currentUserName, accion: 'registró baja del servicio', clienteId: normalizedClientId });
                return;
              }
              const payload = {
                ...doc,
                actualizadoEn: firebase.firestore.FieldValue.serverTimestamp(),
                editadoPor: currentUserName,
                logs_cambios: [...existingLogs, nextLog],
              };
              await db.collection('operaciones').doc(targetDocId).set(payload, { merge: true });
              resetFields();
              if (!editingServiceId && existingDocIdByClient && ['Nuevo Servicio'].includes(tipoAccion)) {
                setNotificacion({ mensaje: '✔ Servicio existente actualizado (sin duplicar ID).', tipo: 'ok' });
              } else {
                setNotificacion({ mensaje: '✔ Servicio actualizado correctamente', tipo: 'ok' });
              }
              void logRealtimeActivityEvent({
                usuario: currentUserName,
                accion: tipoAccion === 'Baja' ? 'registró baja del servicio' : tipoAccion === 'Novación' ? 'registró novación del servicio' : tipoAccion === 'Obra' ? 'registró obra' : tipoAccion === 'Movimiento de obra' ? 'registró movimiento de obra' : tipoAccion === 'Charla informativa' ? 'registró charla informativa' : tipoAccion === 'Adicionales' ? 'registró adicionales' : tipoAccion === 'Solicitud de presupuesto' ? 'registró solicitud de presupuesto' : 'modificó servicio',
                clienteId: normalizedClientId,
              });
              return;
            }

            const createPayload = {
              ...doc,
              creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
              creadoPor: doc.creadoPor || currentUserName,
              logs_cambios: [],
            };
            await db.collection('operaciones').add(createPayload);
            resetFields();
            setNotificacion({ mensaje: '✔ Datos guardados correctamente', tipo: 'ok' });
            void logRealtimeActivityEvent({

            reader.onload = () => resolve({
              id: `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
              nombre: file.name || 'archivo',
              mimeType: file.type || 'application/octet-stream',
              dataUrl: String(reader.result || ''),
            });
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(file);
          })));
          return mapped.filter(Boolean);
        }

        function parseTicketDate(value, fallbackText = '') {
          if (value && typeof value?.toDate === 'function') return value.toDate();
          if (typeof value?.seconds === 'number') return new Date(value.seconds * 1000);
          const fallback = String(fallbackText || '').trim();
          if (!fallback) return null;
          const parsed = new Date(fallback);
          return Number.isNaN(parsed.getTime()) ? null : parsed;
        }

        const groupedManagerTickets = useMemo(() => {
          if (!isTicketManager) return [];
          const groups = ticketsHistorial.reduce((acc, ticket) => {
            const dt = parseTicketDate(ticket?.creadoEn, ticket?.fechaHoraLocal);
            const label = dt ? dt.toLocaleDateString('es-UY', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' }) : 'Sin fecha';
            if (!acc[label]) acc[label] = [];
            acc[label].push(ticket);
            return acc;
          }, {});
          return Object.entries(groups).map(([dateLabel, items]) => ({ dateLabel, items }));
        }, [ticketsHistorial, isTicketManager]);

        function formatRequestDateTime(value) {
          if (!value) return '-';
          const date = typeof value?.toDate === 'function'
            ? value.toDate()
            : (typeof value?.seconds === 'number' ? new Date(value.seconds * 1000) : new Date(value));
          if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '-';
          return date.toLocaleString('es-AR', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        }
