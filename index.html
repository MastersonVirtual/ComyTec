<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masterson Seguridad</title>
    <style>
      :root {
        --primary: #006465;
        --primary-dark: #004f50;
        --primary-light: #0b7f81;
        --bg: #eef6f6;
        --card: #ffffff;
        --border: #d2e5e5;
        --text: #1f2e2e;
        --muted: #5e7676;
        --success: #1f9d4d;
        --danger: #d84444;
        --neutral: #6f7d8c;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }

      .app-shell { min-height: 100vh; display: flex; }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 320px;
        height: 100vh;
        background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: #fff;
        transform: translateX(-100%);
        transition: transform 0.35s ease;
        z-index: 1000;
        box-shadow: var(--shadow);
        overflow-y: auto;
      }

      .sidebar.open { transform: translateX(0); }

      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.22);
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      .menu { padding: 10px; }

      .menu-button, .submenu-button {
        width: 100%;
        background: rgba(255, 255, 255, 0.09);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
        cursor: pointer;
        text-align: left;
        margin-bottom: 8px;
        transition: all 0.25s ease;
      }

      .menu-button:hover, .submenu-button:hover {
        background: rgba(255, 255, 255, 0.22);
        transform: translateX(4px);
      }

      .submenu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        margin: 0 0 6px 0;
        padding-left: 10px;
      }

      .submenu.open { max-height: 420px; }

      .submenu-button {
        font-size: 13px;
        background: rgba(255, 255, 255, 0.05);
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.28);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        z-index: 999;
      }

      .overlay.show { opacity: 1; pointer-events: auto; }

      .content {
        width: 100%;
        transition: transform 0.35s ease;
      }

      .content.shift { transform: translateX(320px); }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: var(--primary);
        color: #fff;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 6px 20px rgba(0, 68, 69, 0.26);
      }

      .burger {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      .burger:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

      .top-titles h1 { margin: 0; font-size: 1.25rem; }
      .top-titles p { margin: 4px 0 0; color: #cbeaea; font-size: 0.88rem; }

      .main {
        max-width: 1200px;
        margin: 18px auto;
        padding: 0 16px 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      }

      .card h2 { margin-top: 0; color: var(--primary); }
      .hint { color: var(--muted); font-size: 13px; margin-bottom: 10px; }

      .grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 12px; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field.full { grid-column: 1 / -1; }

      label { font-size: 13px; font-weight: 700; color: #2d5354; }

      input, select, button {
        border: 1px solid #c9dede;
        border-radius: 9px;
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
      }

      input:focus, select:focus {
        border-color: var(--primary-light);
        box-shadow: 0 0 0 3px rgba(11, 127, 129, 0.16);
      }

      .save-btn {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
        cursor: pointer;
        font-weight: 700;
        transition: all 0.2s ease;
      }

      .save-btn:hover { background: var(--primary-dark); }
      .save-btn:disabled { opacity: 0.75; cursor: not-allowed; }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 1080px; }
      th, td { border-bottom: 1px solid #e3efef; padding: 10px; text-align: left; font-size: 13px; vertical-align: top; }
      th { background: #edf8f8; color: var(--primary); }

      .chip {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }

      .status-ongoing { background: var(--success); }
      .status-pausa { background: var(--danger); }
      .status-default { background: var(--neutral); }

      .muted { color: var(--muted); }

      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr; }
        .content.shift { transform: translateX(280px); }
        .sidebar { width: 280px; }
      }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const firebaseConfig = {
        apiKey: 'AIzaSyCXTX7h33uCXK4K8FSSnD7PcoayjAGV9x4',
        authDomain: 'mastersonvirtual-c0742.firebaseapp.com',
        projectId: 'mastersonvirtual-c0742',
        storageBucket: 'mastersonvirtual-c0742.firebasestorage.app',
        messagingSenderId: '465591582078',
        appId: '1:465591582078:web:0a8b71792c842a67e5872f',
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const ACCIONES = ['Nuevo Servicio', 'Novación', 'Obra', 'Agregado', 'Movimiento de Obra', 'Baja', 'Charla'];

      function statusClass(value) {
        if (!value) return 'chip status-default';
        const v = value.toLowerCase();
        if (v.includes('ongoing')) return 'chip status-ongoing';
        if (v.includes('pausa')) return 'chip status-pausa';
        return 'chip status-default';
      }

      function App() {
        const [menuOpen, setMenuOpen] = useState(false);
        const [openMenus, setOpenMenus] = useState({ nuevo: true, fact: false });

        const [tipoAccion, setTipoAccion] = useState(ACCIONES[0]);
        const [cliente, setCliente] = useState('');
        const [fechaCarga, setFechaCarga] = useState('');
        const [tiempoInstalacion, setTiempoInstalacion] = useState('');
        const [costo, setCosto] = useState('');
        const [status, setStatus] = useState('ONGOING');
        const [fechaAlta, setFechaAlta] = useState('');
        const [cobro, setCobro] = useState('');
        const [fechaRealizado, setFechaRealizado] = useState('');
        const [verificado, setVerificado] = useState('');
        const [fechaCharla, setFechaCharla] = useState('');
        const [hora, setHora] = useState('');
        const [lugar, setLugar] = useState('');

        const [rows, setRows] = useState([]);
        const [saving, setSaving] = useState(false);

        const grupo = useMemo(() => {
          if (tipoAccion === 'Baja') return 'baja';
          if (tipoAccion === 'Charla') return 'charla';
          if (tipoAccion === 'Movimiento de Obra') return 'movimiento';
          return 'base';
        }, [tipoAccion]);

        useEffect(() => {
          const unsub = db.collection('operaciones').orderBy('creadoEn', 'desc').onSnapshot((snap) => {
            setRows(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
          }, (err) => console.error('Error onSnapshot:', err));
          return () => unsub();
        }, []);

        function resetFields() {
          setCliente('');
          setFechaCarga('');
          setTiempoInstalacion('');
          setCosto('');
          setStatus('ONGOING');
          setFechaAlta('');
          setCobro('');
          setFechaRealizado('');
          setVerificado('');
          setFechaCharla('');
          setHora('');
          setLugar('');
        }

        function selectAction(action) {
          setTipoAccion(action);
          resetFields();
          setMenuOpen(false);
        }

        function toggleGroup(key) {
          setOpenMenus((prev) => ({ ...prev, [key]: !prev[key] }));
        }

        async function handleSubmit(e) {
          e.preventDefault();
          const doc = { tipoAccion, status, creadoEn: firebase.firestore.FieldValue.serverTimestamp() };

          if (grupo === 'base') {
            if (!cliente || !fechaCarga) return alert('Completá Cliente y Fecha Carga.');
            Object.assign(doc, { cliente, fechaCarga, tiempoInstalacion, fechaAlta, cobro });
          }
          if (grupo === 'movimiento') {
            if (!cliente || !fechaCarga) return alert('Completá Cliente y Fecha Carga.');
            Object.assign(doc, { cliente, fechaCarga, costo, fechaAlta, cobro });
          }
          if (grupo === 'baja') {
            if (!fechaCarga) return alert('Completá Fecha Carga.');
            Object.assign(doc, { fechaCarga, fechaRealizado, verificado });
          }
          if (grupo === 'charla') {
            if (!fechaCharla || !hora || !lugar) return alert('Completá Fecha Charla, Hora y Lugar.');
            Object.assign(doc, { fechaCharla, hora, lugar });
          }

          try {
            setSaving(true);
            await db.collection('operaciones').add(doc);
            resetFields();
          } catch (error) {
            console.error('Error guardando:', error);
            alert('No se pudo guardar en operaciones.');
          } finally {
            setSaving(false);
          }
        }

        return (
          <div className="app-shell">
            <aside className={`sidebar ${menuOpen ? 'open' : ''}`}>
              <div className="sidebar-header">MENÚ OPERATIVO</div>
              <div className="menu">
                <button className="menu-button" onClick={() => toggleGroup('nuevo')}>
                  Nuevo {openMenus.nuevo ? '▾' : '▸'}
                </button>
                <div className={`submenu ${openMenus.nuevo ? 'open' : ''}`}>
                  <button className="submenu-button" onClick={() => selectAction('Nuevo Servicio')}>Servicio</button>
                  <button className="submenu-button" onClick={() => selectAction('Obra')}>Obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Novación')}>Novaciones</button>
                  <button className="submenu-button" onClick={() => selectAction('Agregado')}>Agregados</button>
                  <button className="submenu-button" onClick={() => selectAction('Movimiento de Obra')}>Movimiento de obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Baja')}>Baja de Servicio</button>
                </div>

                <button className="menu-button" onClick={() => toggleGroup('fact')}>
                  Facturación {openMenus.fact ? '▾' : '▸'}
                </button>
                <div className={`submenu ${openMenus.fact ? 'open' : ''}`}>
                  <button className="submenu-button" onClick={() => selectAction('Agregado')}>Equipos agregados</button>
                  <button className="submenu-button" onClick={() => selectAction('Nuevo Servicio')}>Nuevo servicio</button>
                  <button className="submenu-button" onClick={() => selectAction('Novación')}>Novaciones</button>
                  <button className="submenu-button" onClick={() => selectAction('Obra')}>Nueva Obra</button>
                  <button className="submenu-button" onClick={() => selectAction('Movimiento de Obra')}>Movimiento de Obra</button>
                </div>

                <button className="menu-button" onClick={() => selectAction('Charla')}>Charlas informativas</button>
              </div>
            </aside>

            <div className={`overlay ${menuOpen ? 'show' : ''}`} onClick={() => setMenuOpen(false)}></div>

            <div className={`content ${menuOpen ? 'shift' : ''}`}>
              <header className="topbar">
                <button className="burger" onClick={() => setMenuOpen(!menuOpen)}>☰</button>
                <div className="top-titles">
                  <h1>Masterson Seguridad</h1>
                  <p>Coordinación técnica y Área comercial</p>
                </div>
              </header>

              <main className="main">
                <section className="card">
                  <h2>Carga de Operación</h2>
                  <div className="hint">Tipo seleccionado: <b>{tipoAccion}</b></div>
                  <form onSubmit={handleSubmit} className="grid">
                    <div className="field">
                      <label>Tipo de Acción</label>
                      <select value={tipoAccion} onChange={(e) => { setTipoAccion(e.target.value); resetFields(); }}>
                        {ACCIONES.map((a) => <option key={a} value={a}>{a}</option>)}
                      </select>
                    </div>

                    {(grupo === 'base' || grupo === 'movimiento') && (
                      <>
                        <div className="field"><label>Cliente</label><input value={cliente} onChange={(e) => setCliente(e.target.value)} type="text" /></div>
                        <div className="field"><label>Fecha Carga</label><input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" /></div>
                        {grupo === 'base'
                          ? <div className="field"><label>Tiempo Instalación</label><input value={tiempoInstalacion} onChange={(e) => setTiempoInstalacion(e.target.value)} type="text" placeholder="Ej: 3 días" /></div>
                          : <div className="field"><label>Costo</label><input value={costo} onChange={(e) => setCosto(e.target.value)} type="number" min="0" step="0.01" /></div>}
                        <div className="field"><label>Status</label><input value={status} onChange={(e) => setStatus(e.target.value)} type="text" placeholder="ONGOING / PAUSA / ..." /></div>
                        <div className="field"><label>Fecha Alta</label><input value={fechaAlta} onChange={(e) => setFechaAlta(e.target.value)} type="date" /></div>
                        <div className="field"><label>Cobro</label><input value={cobro} onChange={(e) => setCobro(e.target.value)} type="text" placeholder="Pendiente / Cobrado" /></div>
                      </>
                    )}

                    {grupo === 'baja' && (
                      <>
                        <div className="field"><label>Fecha Carga</label><input value={fechaCarga} onChange={(e) => setFechaCarga(e.target.value)} type="date" /></div>
                        <div className="field"><label>Status</label><input value={status} onChange={(e) => setStatus(e.target.value)} type="text" /></div>
                        <div className="field"><label>Fecha Realizado</label><input value={fechaRealizado} onChange={(e) => setFechaRealizado(e.target.value)} type="date" /></div>
                        <div className="field"><label>Verificado</label><input value={verificado} onChange={(e) => setVerificado(e.target.value)} type="text" placeholder="Sí / No" /></div>
                      </>
                    )}

                    {grupo === 'charla' && (
                      <>
                        <div className="field"><label>Fecha Charla</label><input value={fechaCharla} onChange={(e) => setFechaCharla(e.target.value)} type="date" /></div>
                        <div className="field"><label>Hora</label><input value={hora} onChange={(e) => setHora(e.target.value)} type="time" /></div>
                        <div className="field"><label>Lugar</label><input value={lugar} onChange={(e) => setLugar(e.target.value)} type="text" /></div>
                        <div className="field"><label>Status</label><input value={status} onChange={(e) => setStatus(e.target.value)} type="text" /></div>
                      </>
                    )}

                    <div className="field full"><button className="save-btn" type="submit" disabled={saving}>{saving ? 'Guardando...' : 'Guardar Operación'}</button></div>
                  </form>
                </section>

                <section className="card">
                  <h2>Registro en tiempo real</h2>
                  <div className="table-wrap">
                    <table>
                      <thead>
                        <tr>
                          <th>Tipo Acción</th><th>Cliente</th><th>Fecha Carga</th><th>Tiempo/Costo</th><th>Status</th><th>Fecha Alta</th><th>Cobro</th><th>Fecha Realizado</th><th>Verificado</th><th>Fecha Charla</th><th>Hora</th><th>Lugar</th>
                        </tr>
                      </thead>
                      <tbody>
                        {rows.length === 0 ? <tr><td colSpan="12" className="muted">Sin datos aún.</td></tr> : rows.map((r) => (
                          <tr key={r.id}>
                            <td>{r.tipoAccion || '-'}</td><td>{r.cliente || '-'}</td><td>{r.fechaCarga || '-'}</td><td>{r.tiempoInstalacion || r.costo || '-'}</td>
                            <td><span className={statusClass(r.status)}>{r.status || '-'}</span></td><td>{r.fechaAlta || '-'}</td><td>{r.cobro || '-'}</td><td>{r.fechaRealizado || '-'}</td><td>{r.verificado || '-'}</td><td>{r.fechaCharla || '-'}</td><td>{r.hora || '-'}</td><td>{r.lugar || '-'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </section>
              </main>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
