<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masterson Seguridad</title>
    <style>
      :root {
        --base: #062f2d;
        --motion-fast: 160ms;
        --motion-mid: 240ms;
        --motion-slow: 320ms;
        --base-900: #041f1e;
        --base-700: #0b4e49;
        --text: #ebf6f5;
        --muted: #a9c8c6;
        --accent: #4ee3d1;
        --accent-soft: #97f3e7;
        --line: rgba(255, 255, 255, 0.18);
        --panel: rgba(8, 31, 30, 0.52);
        --panel-2: rgba(10, 44, 42, 0.56);
        --shadow-soft: 0 8px 22px rgba(0, 0, 0, 0.24);
        --shadow-deep: 0 18px 46px rgba(0, 0, 0, 0.34);
        --ok: #2ecc71;
        --pause: #ff6666;
        --chip: #7f8f9a;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; overflow-x: hidden; }
      body {
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(900px 500px at -10% -10%, rgba(78, 227, 209, 0.22), transparent 62%),
          radial-gradient(800px 420px at 115% -15%, rgba(25, 164, 151, 0.25), transparent 62%),
          radial-gradient(700px 500px at 50% 120%, rgba(9, 71, 67, 0.32), transparent 62%),
          linear-gradient(145deg, #011716 0%, var(--base-900) 28%, var(--base) 55%, var(--base-700) 100%);
      }

      .app-shell { min-height: 100vh; display: flex; }
      .sidebar {
        position: fixed; inset: 0 auto 0 0; width: 320px;
        background: linear-gradient(180deg, rgba(4, 25, 24, 0.95), rgba(10, 52, 49, 0.9));
        border-right: 1px solid var(--line);
        backdrop-filter: blur(8px) saturate(120%);
        box-shadow: var(--shadow-deep);
        transform: translateX(-105%);
        transition: transform var(--motion-slow) cubic-bezier(.2,.8,.2,1);
        z-index: 1000;
        overflow-y: auto;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-header {
        padding: 18px;
        font-weight: 800;
        letter-spacing: .5px;
        border-bottom: 1px solid var(--line);
        background: rgba(255,255,255,.06);
      }
      .menu { padding: 12px; }
      .menu-button, .submenu-button {
        width: 100%;
        text-align: left;
        cursor: pointer;
        color: var(--text);
        padding: 12px 13px;
        margin-bottom: 8px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 6px 14px rgba(0,0,0,.2);
        transition: transform var(--motion-fast) ease, background var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
      }
      .menu-button:hover, .submenu-button:hover {
        transform: translateX(5px);
        background: linear-gradient(180deg, rgba(255,255,255,.2), rgba(255,255,255,.08));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 10px 18px rgba(0,0,0,.25);
      }
      .submenu {
        max-height: 0;
        overflow: hidden;
        padding-left: 10px;
        opacity: 0;
        transition: max-height var(--motion-mid) ease, opacity var(--motion-fast) ease;
      }
      .submenu.open { max-height: 420px; opacity: 1; }
      .submenu-button { font-size: 13px; }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(2px);
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--motion-mid) ease;
      }
      .overlay.show { opacity: 1; pointer-events: auto; }
      .content { width: 100%; transition: filter var(--motion-mid) ease; }
      .content.shift { transform: none; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 60;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: linear-gradient(90deg, rgba(3,32,30,.8), rgba(8,66,62,.72));
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(10px) saturate(125%);
        box-shadow: 0 8px 22px rgba(0,0,0,.24);
      }
      .burger {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
        color: #fff;
        font-size: 24px;
        cursor: pointer;
      }
      .top-titles h1 {
        margin: 0;
        font-size: 1.42rem;
        font-weight: 800;
        letter-spacing: .4px;
        text-shadow: 0 4px 16px rgba(0,0,0,.4);
      }
      .top-titles p { margin: 4px 0 0; color: #caeeee; font-size: .9rem; }
      .subtitle-voga { font-family: 'Voga', 'VOGA', 'Didot', 'Bodoni MT', 'Times New Roman', serif; letter-spacing: .9px; }

      .top-search { margin-left: auto; min-width: 220px; max-width: 430px; width: 38%; }
      .top-search input { width: 100%; padding-left: 38px; }
      .search-wrap { position: relative; }
      .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .85; font-size: 14px; }
      .search-preview {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        z-index: 120;
        max-height: 52vh;
        overflow: auto;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(4, 30, 28, .95);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow-deep);
      }
      .search-item { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,.12); cursor: pointer; }
      .search-item:hover { background: rgba(255,255,255,.08); }
      .search-item:last-child { border-bottom: 0; }
      .search-item strong { display: block; }
      .search-item small { color: #bfe2df; }
      .search-detail { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }

      .main { max-width: 1320px; margin: 20px auto; padding: 0 16px 24px; }
      .hero {
        border-radius: 24px;
        padding: 60px 30px;
        text-align: center;
        background: linear-gradient(135deg, rgba(255,255,255,.20), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.28);
        box-shadow: var(--shadow-deep);
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: '';
        position: absolute;
        width: 480px;
        height: 480px;
        top: -260px;
        right: -120px;
        background: radial-gradient(circle, rgba(78,227,209,.35), transparent 60%);
      }
      .hero h2 { margin: 0; font-size: clamp(2rem, 6vw, 4.2rem); letter-spacing: 0.4px; }
      .hero p { margin: 12px 0 0; font-size: clamp(1rem, 2.2vw, 1.5rem); color: #d7f4ef; }

      .panel {
        margin-bottom: 18px;
        border-radius: 22px;
        padding: 20px;
        background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.30);
        backdrop-filter: blur(9px) saturate(120%);
        box-shadow: var(--shadow-soft);
      }
      .panel h2 { margin: 0 0 8px; font-size: 1.25rem; font-weight: 800; letter-spacing: .2px; }
      .hint { color: var(--muted); font-size: 13px; margin-bottom: 12px; }

      .service-layout { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 12px; }
      .service-card {
        grid-column: span 12;
        background: linear-gradient(135deg, rgba(255,255,255,.13), rgba(255,255,255,.04));
        border: 1px solid rgba(255,255,255,.24);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 20px rgba(0,0,0,.2);
        transition: transform var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
      }
      .service-card:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(0,0,0,.26); }
      .service-card h3 {
        margin: 0 0 12px;
        font-size: 15px;
        color: #e8fffb;
        font-weight: 800;
        letter-spacing: .25px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .service-card h3::before { content: '◆'; color: var(--accent); font-size: 12px; }
      .card-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 10px; }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .span-2 { grid-column: span 2; }
      .span-3, .full { grid-column: 1 / -1; }
      label { font-size: 12.8px; font-weight: 650; color: #d8f1f1; line-height: 1.25; word-break: break-word; }

      input, select, button, textarea {
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.30);
        padding: 10px 12px;
        font-size: 14px;
        color: #efffff;
        background: rgba(255,255,255,.10);
        outline: none;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      }
      textarea { min-height: 90px; resize: vertical; }
      input::placeholder, textarea::placeholder { color: #c5dede; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent-soft);
        box-shadow: 0 0 0 3px rgba(123,233,223,.22), 0 8px 18px rgba(0,0,0,.18);
      }
      option { color: #103233; background: #dff3f3; }

      .radio-row, .switch-row, .state-row { display: flex; gap: 12px; flex-wrap: wrap; }
      .radio-pill, .state-pill {
        border: 1px solid rgba(255,255,255,.28);
        border-radius: 999px;
        padding: 8px 10px;
        cursor: pointer;
        background: rgba(255,255,255,.08);
        font-size: 13px;
      }
      .radio-pill input, .state-pill input { display: none; }
      .radio-pill.active, .state-pill.active { background: rgba(255,255,255,.26); }

      .save-btn {
        width: 100%;
        background: linear-gradient(135deg, #0e756f, #064745);
        border-color: rgba(255,255,255,.40);
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 12px 26px rgba(0,0,0,.28);
        transition: transform var(--motion-fast) ease, filter var(--motion-fast) ease;
      }
      .save-btn:hover { transform: translateY(-1px); filter: brightness(1.06); }

      .compact-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 12px; }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; min-width: 950px; border-collapse: separate; border-spacing: 0; overflow: hidden; border-radius: 14px; }
      th, td { padding: 10px; text-align: left; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,.16); }
      tr.detail-row td { background: rgba(255,255,255,.06); }
      .detail-box { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: #d8efef; line-height: 1.45; }
      .link-btn { border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.12); color: #eaf7f7; border-radius: 8px; padding: 6px 8px; cursor: pointer; }
      th { position: sticky; top: 0; background: rgba(255,255,255,.18); }
      .chip { display: inline-block; padding: 4px 8px; border-radius: 999px; color: #fff; font-size: 12px; font-weight: 700; }
      .status-ongoing { background: var(--ok); }
      .status-pausa { background: var(--pause); }
      .status-default { background: var(--chip); }
      .muted { color: var(--muted); }

      .history-grid { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 12px; }
      .widget {
        background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
        border: 1px solid rgba(255,255,255,.28);
        border-radius: 16px;
        padding: 13px;
        box-shadow: var(--shadow-soft);
        position: relative;
      }
      .widget::after {
        content: '';
        position: absolute;
        inset: 0 auto 0 0;
        width: 3px;
        border-radius: 16px 0 0 16px;
        background: linear-gradient(var(--accent), transparent 70%);
        opacity: .9;
      }
      .widget h4 { margin: 0 0 8px; font-size: 13px; color: #d7f4ef; }
      .kv { font-size: 12px; color: #bfe2df; margin: 4px 0; }
      .kv b { color: #ffffff; font-weight: 700; }
      .widget.full { grid-column: 1 / -1; }



      /* Dashboard ERP corporativo SaaS */
      :root {
        --base: #005255;
        --base-900: #003f41;
        --base-700: #0a6666;
        --highlight: #e6fffd;
        --bg-main: #0f172a;
        --bg-surface: #1f2937;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #005255;
        --accent-soft: rgba(0, 100, 101, 0.18);
        --line: #d8e1ea;
        --panel: #ffffff;
        --panel-2: #f8fbfb;
        --shadow-soft: 0 10px 20px rgba(0,0,0,0.08);
        --shadow-deep: 0 20px 40px rgba(0,0,0,0.12);
        --ok: #10b981;
        --pause: #ef4444;
        --chip: #94a3b8;
      }

      * {
        transition: all 0.2s cubic-bezier(.4,0,.2,1);
      }

      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-thumb {
        background: var(--base);
        border-radius: 10px;
      }
      *::-webkit-scrollbar-track {
        background: rgba(230,255,253,.14);
      }

      body {
        color: var(--text);
        background:
          radial-gradient(860px 420px at -12% -10%, rgba(0, 100, 101, .23), transparent 60%),
          radial-gradient(740px 360px at 112% -12%, rgba(11, 123, 123, .18), transparent 60%),
          linear-gradient(180deg, #1f2937 0%, #111827 50%, #0b1220 100%);
      }

      .sidebar {
        width: 286px;
        background: linear-gradient(180deg, var(--base) 0%, var(--base-900) 100%);
        border-right: 1px solid rgba(230,255,253,.16);
        box-shadow: var(--shadow-deep);
      }
      .sidebar-header {
        background: rgba(230,255,253,.08);
        color: #e6fffd;
        border-bottom-color: rgba(230,255,253,.16);
      }
      .menu {
        padding: 14px;
      }
      .menu-button, .submenu-button {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #e6fffd;
        border: 1px solid rgba(230,255,253,.18);
        background: rgba(230,255,253,.08);
        border-radius: 12px;
        padding: 12px 14px;
      }
      .menu-button:hover, .submenu-button:hover {
        transform: translateX(4px);
        background: rgba(230,255,253,.18);
        box-shadow: 0 10px 20px rgba(0,0,0,.2);
      }

      .topbar {
        background: var(--base);
        border-bottom: 1px solid var(--base-700);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 24px rgba(0,0,0,.18);
      }
      .burger {
        color: transparent;
        border-color: rgba(230,255,253,.45);
        border-radius: 14px;
        padding: 0;
        overflow: hidden;
        background-color: rgba(255,255,255,.08);
        background-image: url('https://i.postimg.cc/0jMF5Jpk/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        box-shadow: 0 8px 16px rgba(0,0,0,.18);
      }
      .top-titles h1 {
        color: #e6fffd;
        letter-spacing: .2px;
        text-shadow: none;
      }
      .top-titles p {
        color: #d8fbf8;
        letter-spacing: .07em;
      }
      .subtitle-voga {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-weight: 700;
      }

      .top-search {
        max-width: 460px;
      }
      .search-icon { color: #64748b; opacity: 1; }
      .top-search input {
        border-radius: 12px;
        border: 1px solid #d6dee8;
        background: #ffffff;
        box-shadow: 0 4px 10px rgba(15, 23, 42, .05);
      }
      .search-preview {
        background: var(--base);
        border: 1px solid rgba(230,255,253,.3);
        box-shadow: var(--shadow-deep);
      }
      .search-item { border-bottom: 1px solid rgba(230,255,253,.2); color: #ffffff; }
      .search-item:hover { background: var(--base-700); }
      .search-item small { color: #e6fffd; }
      .search-detail {
        color: #e6fffd;
        border-top-color: rgba(230,255,253,.3);
        background: rgba(0, 78, 80, .86);
      }

      .main {
        max-width: 1360px;
        margin: 26px auto;
      }
      .hero,
      .panel,
      .service-card,
      .widget,
      .kpi-card {
        background: #006465;
        border: 1px solid rgba(230,255,253,.25);
        box-shadow: var(--shadow-soft);
      }
      .hero {
        border-radius: 18px;
        padding: 64px 34px;
        background: linear-gradient(140deg, #004c4d 0%, #006465 58%, #0b7b7b 100%);
      }
      .hero::before {
        background: radial-gradient(circle, rgba(230,255,253,.28), transparent 62%);
      }
      .hero h2, .hero p { color: #e6fffd; }

      .panel {
        border-radius: 14px;
        padding: 24px;
      }
      .panel h2, .service-card h3, .widget h4 {
        color: #e6fffd;
      }
      .hint, .kv {
        color: #d1faf5;
      }

      .service-layout { gap: 18px; }
      .service-card {
        border-radius: 14px;
        padding: 22px;
      }
      .service-card h3,
      .service-card label,
      .service-card .hint,
      .service-card .muted,
      .service-card .kv,
      .service-card .detail-box {
        color: #e6fffd;
      }
      .service-card h3::before {
        color: var(--base);
      }
      .service-card:hover,
      .widget:hover,
      .kpi-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 26px rgba(0,0,0,0.12);
      }
      .card-grid, .compact-grid, .history-grid { gap: 16px; }

      .kpi-grid {
        margin-top: 24px;
        display: grid;
        grid-template-columns: repeat(4, minmax(160px, 1fr));
        gap: 18px;
        align-items: start;
      }
      .kpi-card-wrap {
        position: relative;
      }
      .kpi-card {
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        background: #0a1515;
        border: 1px solid var(--line);
        color: var(--text);
      }
      .kpi-card.active {
        border-color: #006465;
        box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      }
      .kpi-value {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        color: #e6fffd;
      }
      .kpi-label {
        margin-top: 8px;
        color: #d1faf5;
        font-size: .8rem;
        text-transform: uppercase;
        letter-spacing: .08em;
      }
      .kpi-breakdown {
        margin-top: 10px;
        border-radius: 14px;
        padding: 14px;
        background: #006465;
        border: 1px solid rgba(230,255,253,.25);
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        color: #e6fffd;
      }
      .kpi-breakdown h3 {
        margin: 0 0 12px;
        font-size: 0.95rem;
        color: #e6fffd;
      }
      .kpi-breakdown-list {
        display: grid;
        gap: 8px;
      }
      .kpi-breakdown-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(230,255,253,.1);
      }
      .kpi-breakdown-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .kpi-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--dot-color, #22c55e);
        box-shadow: 0 0 0 2px rgba(255,255,255,.18);
      }
      .kpi-breakdown-count {
        font-weight: 700;
        background: transparent;
        border: 0;
        color: #e6fffd;
        cursor: pointer;
        padding: 0;
      }
      .kpi-breakdown-services {
        width: 100%;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed rgba(230,255,253,.4);
        display: grid;
        gap: 6px;
      }
      .kpi-service-link {
        text-align: left;
        border: 0;
        border-radius: 8px;
        background: rgba(230,255,253,.16);
        color: #e6fffd;
        font-size: 12px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .kpi-service-link:hover {
        background: rgba(230,255,253,.28);
      }

      .ranking-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin: 8px 0 14px;
      }
      .ranking-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(260px, 1fr));
        gap: 14px;
      }
      .ranking-section {
        background: #006465;
        border: 1px solid rgba(230,255,253,.25);
        border-radius: 14px;
        padding: 14px;
      }
      .ranking-section h3 {
        margin: 0 0 8px;
        color: #e6fffd;
        font-size: 1rem;
      }
      .ranking-services {
        display: grid;
        gap: 8px;
      }
      .ranking-service-btn {
        text-align: left;
        border: 1px solid rgba(230,255,253,.2);
        border-radius: 10px;
        background: rgba(230,255,253,.12);
        color: #e6fffd;
        padding: 9px 10px;
        cursor: pointer;
      }
      .ranking-service-btn:hover {
        background: rgba(230,255,253,.22);
      }
      .ranking-service-row {
        display: grid;
        gap: 6px;
      }
      .ranking-service-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .history-toolbar {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 10px;
        margin: 12px 0;
      }

      function PieChartWidget({ chartId, title, items }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          if (!canvasRef.current || !window.Chart) return () => {};
          const filtered = items.filter((i) => i.value > 0);
          const palette = ['#34d399', '#60a5fa', '#f59e0b', '#a78bfa', '#f472b6', '#22d3ee', '#f87171', '#84cc16'];
          const dataItems = filtered.length > 0 ? filtered : [{ name: 'Sin datos', value: 1 }];
          const chart = new window.Chart(canvasRef.current, {
            type: 'pie',
            data: {
              labels: dataItems.map((i) => i.name),
              datasets: [{
                data: dataItems.map((i) => i.value),
                backgroundColor: dataItems.map((_, idx) => palette[idx % palette.length]),
                borderWidth: 1,
                borderColor: 'rgba(255,255,255,.16)',
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              aspectRatio: 1,
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: {
                    color: '#000000',
                    usePointStyle: true,
                    pointStyle: 'circle',
                    boxWidth: 10,
                    boxHeight: 10,
                    padding: 14,
                  },
                },
              },
            },
          });
          return () => chart.destroy();
        }, [items]);

        return (

            <div className="gerencia-chart-shell">
              <canvas ref={canvasRef} className="gerencia-chart-canvas" aria-label={`${title}-${chartId}`} />

          </div>
        );

      function TrackingView() {
        const [trackingData, setTrackingData] = useState(null);
        const [trackingLoading, setTrackingLoading] = useState(true);
        const [trackingError, setTrackingError] = useState('');
        const [trackingBlocked, setTrackingBlocked] = useState(false);

        const operationId = useMemo(() => {
          const params = new URLSearchParams(window.location.search || '');
          return String(params.get('id') || '').trim();
        }, []);

        useEffect(() => {
          if (!operationId) {
            setTrackingError('Debes ingresar un ID de operación válido.');
            setTrackingLoading(false);
            return () => {};
          }

          const normalize = (v) => String(v || '').trim().toUpperCase();
          const compact = (v) => normalize(v).replace(/[^A-Z0-9]/g, '');
          const stripCli = (v) => compact(v).replace(/^CLI/, '');
          const inputVariants = new Set([normalize(operationId), compact(operationId), stripCli(operationId)].filter(Boolean));

          let unsub = () => {};
          let cancelled = false;
          let authIssue = '';

          const applyDoc = (doc) => {
            if (!doc || !doc.exists || cancelled) {
              setTrackingData(null);
              setTrackingError('No encontramos una operación asociada al Cliente ID ingresado.');
              setTrackingLoading(false);
              return;
            }
            const data = { id: doc.id, ...doc.data() };
            const estadoActual = String(data?.estado || data?.status || '').trim().toLowerCase();
            const finalizado = estadoActual === 'finalizado' || estadoActual.includes('alta finalizada') || estadoActual.includes('completado') || estadoActual.includes('dado de alta');
            setTrackingBlocked(finalizado);
            setTrackingData(data);
            setTrackingError('');
            setTrackingLoading(false);
          };

          (async () => {
            try {
              // Permite acceso desde links públicos en móviles sin login previo
              if (!auth.currentUser) {
                try {
                  await auth.signInAnonymously();
                  authIssue = '';
                } catch (authErr) {
                  const authCode = String(authErr?.code || '');
                  console.warn('No se pudo iniciar sesión anónima para tracking:', authErr);
                  if (authCode.includes('operation-not-allowed')) {
                    authIssue = 'auth/operation-not-allowed';
                  } else if (authCode.includes('unauthorized-domain')) {
                    authIssue = 'auth/unauthorized-domain';
                  } else {
                    authIssue = 'auth/error';
                  }
                }
              }

              const exact = await db.collection('operaciones').where('clienteId', '==', operationId).limit(1).get();
              if (!exact.empty) {
                unsub = db.collection('operaciones').doc(exact.docs[0].id).onSnapshot(applyDoc, (err) => {
                  if (cancelled) return;
                  console.error('Error leyendo operación exacta:', err);
                  setTrackingError('No se pudo consultar la operación.');
                  setTrackingLoading(false);
                });
                return;
              }

              // Fallback robusto por formato de ID (CLI-5404 vs 5404, guiones/espacios/case)
              const scan = await db.collection('operaciones').limit(1000).get();
              const match = scan.docs.find((d) => {
                const data = d.data() || {};
                const candidates = [
                  data.clienteId,
                  data.clienteID,
                  data.idCliente,
                ];
                const variants = new Set();
                candidates.forEach((c) => {
                  variants.add(normalize(c));
                  variants.add(compact(c));
                  variants.add(stripCli(c));
                });
                return [...variants].some((v) => v && inputVariants.has(v));
              });

              if (match) {
                unsub = db.collection('operaciones').doc(match.id).onSnapshot(applyDoc, (err) => {
                  if (cancelled) return;
                  console.error('Error leyendo operación normalizada:', err);
                  setTrackingError('No se pudo consultar la operación.');
                  setTrackingLoading(false);
                });
                return;
              }

              setTrackingData(null);
              setTrackingError('No encontramos una operación asociada al Cliente ID ingresado.');
              setTrackingLoading(false);
            } catch (err) {
              if (cancelled) return;
              console.error('Error leyendo operación de seguimiento:', err);
              const msg = String(err?.message || '').toLowerCase();
              const denied = msg.includes('permission') || msg.includes('missing or insufficient permissions');
              const basePermissionMsg = 'No se pudo consultar la operación por permisos de seguridad.';
              if (!denied) {
                setTrackingError('No se pudo consultar la operación.');
              } else if (authIssue === 'auth/operation-not-allowed') {
                setTrackingError(`${basePermissionMsg} Debes habilitar Anonymous en Firebase Auth para links públicos.`);
              } else if (authIssue === 'auth/unauthorized-domain') {
                setTrackingError(`${basePermissionMsg} Agregá el dominio mastersonvirtual.github.io en Authorized domains de Firebase Auth.`);
              } else {
                setTrackingError(`${basePermissionMsg} Verificá reglas de Firestore para permitir lectura de seguimiento sin login manual.`);
              }
              setTrackingLoading(false);
            }
          })();

          return () => {
            cancelled = true;
            unsub();
          };
        }, [operationId]);

        const nombreServicio = trackingData?.nombreServicio || 'Servicio';
        const estadoVisible = trackingData?.estado || trackingData?.status || '-';

        return (
          <div className="tracking-shell">
            <header className="tracking-header">
              <h1 className="tracking-title" style={{ margin: 0 }}>Seguimiento de Servicio: {nombreServicio}</h1>
              <p className="hint" style={{ marginTop: 6 }}>Cliente ID consultado: {operationId || '-'}</p>
              <div className="tracking-logo" aria-hidden="true" />
            </header>

            {trackingLoading ? (
              <section className="panel"><h2 className="tracking-title">Cargando seguimiento...</h2></section>
            ) : trackingError ? (
              <section className="panel"><h2 className="tracking-title">Error</h2><div className="hint">{trackingError}</div><div className="tracking-data" style={{ marginTop: 8 }}>Este enlace está diseñado para abrir sin login manual.</div></section>
            ) : trackingBlocked ? (
              <section className="panel"><h2 className="tracking-title">Acceso bloqueado</h2><div className="hint">Este edificio ya fue dado de alta. Gracias por confiar en Masterson Seguridad. Por razones de seguridad, este enlace ya no está activo.</div></section>
            ) : (
              <section className="tracking-grid">
                <article className="tracking-card wide">
                  <h3 style={{ marginTop: 0 }}>Detalle de Seguimiento</h3>
                  <div className="tracking-data"><b>Vendedor:</b> {trackingData?.representanteComercial || '-'}</div>
                  <div className="tracking-data"><b>Fecha de Alta:</b> {trackingData?.fechaEspecificaInicio || trackingData?.fechaAltaServicio || '-'}</div>
                  <div className="tracking-data"><b>Jornales:</b> {trackingData?.cantidadJornalesEstimados || '-'}</div>
                  <div className="tracking-data"><b>Estado:</b> {estadoVisible}</div>
                </article>
              </section>
            )}

            <div className="app-footer" aria-label="signature"><strong>v1.0 | Powered by Alfonso Carballo</strong></div>
          </div>
        );
      }

        const [historyPage, setHistoryPage] = useState(1);

        function getStatusLabel(row) {
          return String(row?.status || row?.estado || '').trim().toLowerCase();
        }

        function isPendingStatus(label) {
          return label.includes('pend') || label.includes('espera') || label.includes('paus');
        }

        function isInProgressStatus(label) {
          return label.includes('curso') || label.includes('proceso') || label.includes('instal') || label.includes('verific');
        }

        function isCompletedStatus(label) {
          return label.includes('complet') || label.includes('finaliz') || label.includes('alta');
        }

        function getKpiRows(type) {
          if (type === 'total') return visibleRows;
          if (type === 'pending') return visibleRows.filter((r) => isPendingStatus(getStatusLabel(r)));
          if (type === 'inprogress') return visibleRows.filter((r) => isInProgressStatus(getStatusLabel(r)));
          if (type === 'completed') return visibleRows.filter((r) => isCompletedStatus(getStatusLabel(r)));
          return [];
        }

        function getCommercialBreakdown(type) {
          const pool = getKpiRows(type);
          const counts = pool.reduce((acc, row) => {
            const rep = (row.representanteComercial || 'Sin asignar').trim();
            acc[rep] = (acc[rep] || 0) + 1;
            return acc;
          }, {});

          return Object.entries(counts)
            .map(([name, value]) => ({ name, value }))
            .sort((a, b) => b.value - a.value);
        }

        function getRankColor(index, total) {
          if (total <= 1) return 'hsl(120 70% 45%)';
          const ratio = index / (total - 1);
          const hue = Math.round(120 - ratio * 120);
          return `hsl(${hue} 70% 45%)`;
        }

        function getServicesByCommercial(type, commercial) {
          return getKpiRows(type)
            .filter((r) => ((r.representanteComercial || 'Sin asignar').trim() === commercial))
            .sort((a, b) => String(a.nombreServicio || '').localeCompare(String(b.nombreServicio || '')));
        }

        const kpiStats = useMemo(() => ({
          total: visibleRows.length,
          pending: visibleRows.filter((r) => isPendingStatus(getStatusLabel(r))).length,
          inprogress: visibleRows.filter((r) => isInProgressStatus(getStatusLabel(r))).length,
          completed: visibleRows.filter((r) => isCompletedStatus(getStatusLabel(r))).length,
        }), [visibleRows]);

        const historyStatusOptions = useMemo(() => {
          const set = new Set();
          visibleRows.forEach((r) => {
            const value = String(r.status || r.estado || '').trim();
            if (value) set.add(value);
          });
          return Array.from(set).sort((a, b) => a.localeCompare(b, 'es', { sensitivity: 'base' }));
        }, [visibleRows]);

        const historyCommercialOptions = useMemo(() => {
          const set = new Set();
          visibleRows.forEach((r) => {
            const value = String(r.representanteComercial || '').trim();
            if (value) set.add(value);
          });
          return Array.from(set).sort((a, b) => a.localeCompare(b, 'es', { sensitivity: 'base' }));
        }, [visibleRows]);

        const historyFilteredRows = useMemo(() => {
          const query = historySearchTerm.trim().toLowerCase();
          const filtered = visibleRows.filter((r) => {
            const statusValue = String(r.status || r.estado || '').trim();
            const commercialValue = String(r.representanteComercial || '').trim();
            const matchStatus = historyStatusFilter === 'todos' || statusValue === historyStatusFilter;
            const matchCommercial = historyCommercialFilter === 'todos' || commercialValue === historyCommercialFilter;
            const matchQuery = !query || [
              r.nombreServicio,
              r.cliente,
              r.clienteId,
              r.razonSocial,
              r.rut,
              r.direccionServicio,
            ].filter(Boolean).some((v) => String(v).toLowerCase().includes(query));
            return matchStatus && matchCommercial && matchQuery;
          });

          return filtered.sort((a, b) => {
            const aTs = a.actualizadoEn?.seconds || a.creadoEn?.seconds || 0;
            const bTs = b.actualizadoEn?.seconds || b.creadoEn?.seconds || 0;
            return bTs - aTs;
          });
        }, [visibleRows, historySearchTerm, historyStatusFilter, historyCommercialFilter]);

        const HISTORY_PAGE_SIZE = 18;
        const totalHistoryPages = Math.max(1, Math.ceil(historyFilteredRows.length / HISTORY_PAGE_SIZE));
        const safeHistoryPage = Math.min(historyPage, totalHistoryPages);
        const historyRowsPage = useMemo(() => {
          const start = (safeHistoryPage - 1) * HISTORY_PAGE_SIZE;
          return historyFilteredRows.slice(start, start + HISTORY_PAGE_SIZE);

        async function handleDownloadPdf(service) {
          if (!service || !window.jspdf?.jsPDF) {
            alert('No se pudo cargar el generador de PDF.');
            return;
          }

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: 'mm', format: 'a4' });
          const pageWidth = doc.internal.pageSize.getWidth();
          const pageHeight = doc.internal.pageSize.getHeight();
          const margin = 16;
          const topBarHeight = 28;
          const lineColor = [0, 100, 101];
          const logoUrl = 'https://i.postimg.cc/0jMF5Jpk/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png';

          function drawHeader() {
            doc.setFillColor(0, 0, 0);
            doc.rect(0, 0, pageWidth, topBarHeight, 'F');
          }

          function ensureSpace(y, needed = 12) {
            if (y + needed <= pageHeight - margin - 18) return y;
            doc.addPage();
            drawHeader();
            return margin + 8;
          }

          drawHeader();

          try {
            const imgData = await fetch(logoUrl)
              .then((r) => r.blob())
              .then((blob) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
              }));
            const logoHeight = topBarHeight - 2;
            const logoWidth = 26;
            doc.addImage(imgData, 'PNG', pageWidth - logoWidth - 2, 1, logoWidth, logoHeight, undefined, 'FAST');
          } catch (err) {
            console.warn('No se pudo cargar el logo para PDF', err);
          }

          doc.setTextColor(0, 100, 101);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(12);
          doc.text('Masterson Seguridad – Área de Coordinación Técnica y Comercial', margin, (topBarHeight / 2) + 2);

          let y = topBarHeight + 16;

          function drawSection(title, fields) {
            y = ensureSpace(y, 18 + fields.length * 7);
            const boxX = margin;
            const boxW = pageWidth - margin * 2;
            const startY = y;

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(10.5);
            doc.setTextColor(0, 100, 101);
            doc.text(title, boxX + 2, y + 5);
            y += 9;

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(20, 23, 28);

            fields.forEach(([k, v]) => {
              y = ensureSpace(y, 7);
              const line = `${k}: ${v || '-'}`;
              const wrapped = doc.splitTextToSize(line, boxW - 6);
              doc.text(wrapped, boxX + 3, y);
              y += wrapped.length * 4.6 + 1;
            });

            doc.setDrawColor(...lineColor);
            doc.setLineWidth(0.18);
            doc.rect(boxX, startY, boxW, y - startY + 2);
            y += 7;
          }

          drawSection('Resumen del Servicio', [
            ['Servicio', service.nombreServicio],
            ['Cliente ID', service.clienteId],
            ['Tipo de Acción', service.tipoAccion],
            ['Status', service.status],
            ['Fecha de descarga', formatNow()],
          ]);

          drawSection('Cliente y Facturación', [
            ['Representante Comercial', service.representanteComercial],
            ['Razón Social', service.razonSocial],
            ['RUT', service.rut],
            ['Mail Facturación', service.mailFacturacion],
            ['Duración Contrato', service.duracionContratoMeses],
          ]);

          drawSection('Operación Técnica y Económica', [
            ['Tipo Servicio', service.tipoServicioBrindar],
            ['Dirección', service.direccionServicio],
            ['Importe Mensual sin IVA', service.importeMensualServicioSinIva],
            ['Costo Instalación US$', service.costoInstalacionUsdSinIva],
            ['Presupuesto Proveedor', service.presupuestoProveedor],
            ['Fecha Ingreso', service.fechaIngresoDatos || service.fechaCarga || service.fechaCharla],
          ]);

          drawSection('Observaciones', [
            ['Proyecto', service.proyectoServicio],
            ['Observaciones', service.observacionesComentarios],
            ['Excepciones', service.excepcionesAcordadas],
          ]);

          // Firma automática al final de la última página
          if (y > pageHeight - 30) {
            doc.addPage();
            drawHeader();
            y = margin + 8;
          }
          const signatureY = pageHeight - 18;
          doc.setDrawColor(...lineColor);
          doc.setLineWidth(0.18);
          doc.line(margin, signatureY - 3, pageWidth - margin, signatureY - 3);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10);
          doc.setTextColor(20, 23, 28);
          doc.text(`Emitido por: ${currentUserName || 'Usuario'}`, margin, signatureY + 2);

          const safeId = String(service.clienteId || 'servicio').replace(/[^a-z0-9_-]/gi, '_');
          const safeName = String(service.nombreServicio || 'detalle').replace(/[^a-z0-9_-]/gi, '_');
          doc.save(`Masterson_${safeId}_${safeName}.pdf`);
        }

          if (grupo === 'baja-detalle') {
            if (!bajaForm.nombreServicio || !bajaForm.direccionServicio || !bajaForm.fechaIngreso) {
              return alert('Completá al menos: Nombre del servicio, Dirección y Fecha de ingreso.');
            }
            Object.assign(doc, { ...bajaForm, formulario: 'baja-servicio' });
          }
          if (grupo === 'charla-detalle') {
            if (!charlaForm.responsableCharla || !charlaForm.fecha || !charlaForm.horario || !charlaForm.direccion) {
              return alert('Completá al menos: Responsable, Fecha, Hora y Dirección.');
            }
            Object.assign(doc, { ...charlaForm, formulario: 'charla-informativa' });
          }

          doc.status = status;
          doc.estado = status;

          setSaving(true);
          const nextLog = {
            fecha: new Date().toISOString(),
            usuario: currentUserName,
            accion: 'Actualización de datos',
          };
          const existingLogs = Array.isArray(selectedService?.logs_cambios) ? selectedService.logs_cambios : [];

          const payload = editingServiceId
            ? { ...doc, actualizadoEn: firebase.firestore.FieldValue.serverTimestamp(), editadoPor: currentUserName, logs_cambios: [...existingLogs, nextLog] }
            : { ...doc, logs_cambios: [] };

          const writeOp = editingServiceId
            ? db.collection('operaciones').doc(editingServiceId).set(payload, { merge: true })
            : db.collection('operaciones').add(payload);

          writeOp
            .then(() => {
              resetFields();
              setNotificacion({ mensaje: editingServiceId ? '✔ Servicio actualizado correctamente' : '✔ Datos guardados correctamente', tipo: 'ok' });
            })
            .catch((error) => {
              console.error('Error guardando:', error);
              setNotificacion({ mensaje: '✖ Error al guardar datos', tipo: 'error' });
            })
            .finally(() => {
              setSaving(false);
            });
        }

        function renderMobileHome() {
          return (
            <section className="panel" style={{ background: 'transparent', border: 0, padding: 0, boxShadow: 'none' }}>
              <div className="mobile-bento">
                <article className="mobile-capsule"><div className="title">Servicios</div><div className="value">{visibleRows.length}</div></article>
                <article className="mobile-capsule"><div className="title">Pendientes</div><div className="value">{kpiStats.pending}</div></article>
                <article className="mobile-capsule"><div className="title">En curso</div><div className="value">{kpiStats.inprogress}</div></article>
                <article className="mobile-capsule"><div className="title">Completados</div><div className="value">{kpiStats.completed}</div></article>
              </div>
            </section>
          );
        }

        function renderMobileServices() {
          return (
            <section className="panel" style={{ background: 'transparent', border: 0, padding: 0, boxShadow: 'none' }}>
              <div className="mobile-service-stack">
                {visibleRows.slice(0, 30).map((r) => (
                  <article key={r.id} className="mobile-service-card" onClick={() => { setSelectedService(r); setSelectedForm('historial'); }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, alignItems: 'center' }}>
                      <strong>{r.nombreServicio || r.cliente || 'Servicio sin nombre'}</strong>
                      <span className="status-badge">{r.status || r.estado || 'Pendiente'}</span>
                    </div>
                    <div className="mobile-rep">{r.representanteComercial || 'Sin representante'}</div>
                  </article>
                ))}
              </div>
            </section>
          );
        }
        const isTrackingRoute = ENABLE_CLIENT_TRACKING_VIEW && typeof window !== 'undefined' && (window.location.pathname === '/seguimiento' || new URLSearchParams(window.location.search || '').get('view') === 'seguimiento');

        function openClientTrackingView() {
          const cleanId = String(clientOperationId || '').trim();
          if (!cleanId) return;
          const target = `${window.location.origin}${window.location.pathname}?view=seguimiento&id=${encodeURIComponent(cleanId)}`;
          window.open(target, '_blank', 'noopener,noreferrer');
          setShowClientViewModal(false);
          setClientOperationId('');
        }

        function openProfileView() {
          setSelectedForm('perfil');
          setMobileTab('perfil');
          closeSidebar();
        }

        function formatRequestDateTime(value) {
          if (!value) return '-';
          const date = typeof value?.toDate === 'function'
            ? value.toDate()
            : (typeof value?.seconds === 'number' ? new Date(value.seconds * 1000) : new Date(value));
          if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '-';
          return date.toLocaleString('es-AR', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        }

        async function openNotificationsView() {
          if (!isAdminUser) return;
          setSelectedForm('notificaciones');
          setMobileTab('perfil');
          closeSidebar();
          const unread = adminPendingRequests.filter((item) => !item?.leidaPorAdmin);
          if (unread.length === 0) return;
          const batch = db.batch();
          unread.forEach((item) => {
            batch.set(db.collection('solicitudes_credenciales').doc(item.id), { leidaPorAdmin: true }, { merge: true });
          });
          try {
            await batch.commit();
          } catch (error) {
            console.error('Error marcando notificaciones como leídas:', error);
          }
        }

        function requestStatusLabel(status) {
          if (status === 'aprobada') return 'Aprobada (esperando aceptación del usuario)';
          if (status === 'aplicada') return 'Aplicada';
          if (status === 'rechazada') return 'Rechazada';
          return 'Pendiente';
        }

        async function updateCredentialRequestStatus(req, nextStatus) {
          if (!isAdminUser || !req?.id) return;
          setUpdatingRequestId(req.id);
          try {
            const patch = {
              estado: nextStatus,
              leidaPorAdmin: true,
              actualizadaEn: firebase.firestore.FieldValue.serverTimestamp(),
              resueltaPorUid: user?.uid || '',
              resueltaPorEmail: user?.email || '',
            };
            if (nextStatus === 'aprobada') {
              patch.credencialesInformadas = {
                usuario: req?.nuevoUsuarioSolicitado || '',
                password: req?.nuevaPasswordSolicitada || '',
              };
              patch.aceptadoPorUsuario = false;
            }
            await db.collection('solicitudes_credenciales').doc(req.id).set(patch, { merge: true });
            setNotificacion({ mensaje: `✔ Solicitud marcada como ${nextStatus === 'aprobada' ? 'aprobada' : 'rechazada'}`, tipo: 'ok' });
          } catch (error) {
            console.error('Error actualizando estado de solicitud:', error);
            setNotificacion({ mensaje: '✖ No se pudo actualizar la solicitud', tipo: 'error' });
          } finally {
            setUpdatingRequestId('');
          }
        }

        async function handleUserAcceptCredentialChanges(req) {
          if (!req?.id || !user?.uid) return;
          setAcceptingRequestId(req.id);
          try {
            await db.collection('solicitudes_credenciales').doc(req.id).set({
              estado: 'aplicada',
              aceptadoPorUsuario: true,
              aceptadoEn: firebase.firestore.FieldValue.serverTimestamp(),
              actualizadaEn: firebase.firestore.FieldValue.serverTimestamp(),
            }, { merge: true });
            setNotificacion({ mensaje: '✔ Cambios aceptados. Se cerrará tu sesión para ingresar con las nuevas credenciales.', tipo: 'ok' });
            setTimeout(() => auth.signOut(), 900);
          } catch (error) {
            console.error('Error aceptando cambios de credenciales:', error);
            setNotificacion({ mensaje: '✖ No se pudieron aceptar los cambios', tipo: 'error' });
          } finally {
            setAcceptingRequestId('');
          }
        }

        async function handleProfileCredentialsRequest(e) {
          e.preventDefault();
          const nextUser = profileUserRequest.trim();
          const nextPass = profilePasswordRequest.trim();
          if (!nextUser || !nextPass) {
            setNotificacion({ mensaje: 'Ingresá usuario y contraseña para solicitar el cambio', tipo: 'error' });
            return;
          }
          try {
            await db.collection('solicitudes_credenciales').add({
              tipo: 'cambio_usuario_password',
              solicitanteUid: user?.uid || '',
              solicitanteEmail: user?.email || '',
              solicitanteNombre: currentUserName,
              nuevoUsuarioSolicitado: nextUser,
              nuevaPasswordSolicitada: nextPass,
              estado: 'pendiente',
              leidaPorAdmin: false,
              creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
            });
            setNotificacion({ mensaje: '✔ Solicitud enviada al administrador', tipo: 'ok' });
            setProfileUserRequest('');
            setProfilePasswordRequest('');
          } catch (error) {
            console.error('Error enviando solicitud de credenciales:', error);
            setNotificacion({ mensaje: '✖ No se pudo enviar la solicitud', tipo: 'error' });
          }
        }

        if (isTrackingRoute) {
          return <TrackingView />;
        }

        if (authLoading || roleLoading) {
          return <LoadingScreen />;
        }

        if (!user) {
          return <LoginScreen />;
        }

              <div className="menu">

                  <>
                    <button className="menu-button" onClick={() => setOpenMenus((p) => ({ ...p, nuevo: !p.nuevo }))}>Nuevo {openMenus.nuevo ? '▾' : '▸'}</button>
                    <div className={`submenu ${openMenus.nuevo ? 'open' : ''}`}>
                      <button className="submenu-button" onClick={() => selectAction('Nuevo Servicio')}>Servicio</button>
                      <button className="submenu-button" onClick={() => selectAction('Obra')}>Obra</button>
                      <button className="submenu-button" onClick={() => selectAction('Novación')}>Novaciones</button>
                      <button className="submenu-button" onClick={() => selectAction('Agregado')}>Agregados</button>
                      <button className="submenu-button" onClick={() => selectAction('Movimiento de Obra')}>Movimiento de obra</button>
                      <button className="submenu-button" onClick={() => selectAction('Baja')}>Baja de Servicio</button>
                    </div>
                    <button className="menu-button" onClick={() => setOpenMenus((p) => ({ ...p, fact: !p.fact }))}>Facturación {openMenus.fact ? '▾' : '▸'}</button>
                    <div className={`submenu ${openMenus.fact ? 'open' : ''}`}>
                      <button className="submenu-button" onClick={() => selectAction('Agregado')}>Equipos agregados</button>
                      <button className="submenu-button" onClick={() => selectAction('Nuevo Servicio')}>Nuevo servicio</button>
                      <button className="submenu-button" onClick={() => selectAction('Novación')}>Novaciones</button>
                      <button className="submenu-button" onClick={() => selectAction('Obra')}>Nueva Obra</button>
                      <button className="submenu-button" onClick={() => selectAction('Movimiento de Obra')}>Movimiento de Obra</button>
                    </div>
                    <button className="menu-button" onClick={() => selectAction('Charla')}>Charlas informativas</button>
                    <button className="menu-button" onClick={() => { setSelectedForm('historial'); closeSidebar(); }}>Historial de Servicios</button>
                    {ENABLE_CLIENT_TRACKING_VIEW && isAdminUser && <button className="menu-button" onClick={() => { setShowClientViewModal(true); closeSidebar(); }}>Vista Clientes</button>}
                    {isAdminUser && <button className="menu-button" onClick={() => { setSelectedForm('dashboard-gerencia'); closeSidebar(); }}>Vista Gerencia</button>}
                  </>

              </div>
            </aside>

            {notificacion.mensaje && (

                <div className="top-titles">
                  <h1>Masterson Seguridad</h1>
                  <p className="subtitle-voga">{topbarSubtitle}</p>
                </div>
                {!isGerencia && (

                      <span className="search-icon">🔍</span>

                        value={searchTerm}
                        onChange={(e) => { setSearchTerm(e.target.value); setExpandedId(null); }}
                      />
                      {searchTerm.trim() !== '' && (
                        <div className="search-preview">
                          {filteredRows.length === 0 ? (
                            <div className="search-item"><small>Sin resultados.</small></div>
                          ) : (
                            filteredRows.slice(0, 8).map((r) => (
                              <div key={r.id}>
                                <div className="search-item" onClick={() => { setSelectedService(r); setSelectedForm('historial'); setExpandedId(null); setSearchTerm(''); }}>
                                  <strong>{r.clienteId || '-'} · {r.nombreServicio || 'Servicio sin nombre'}</strong>
                                  <small>Fecha de alta: {r.fechaAlta || '-'}</small>
                                </div>
                                {expandedId === r.id && (

                                  </div>

                              </div>

                        </div>

                    </div>

                <div className="topbar-actions">
                  {isAdminUser && (

                        <span className="topbar-action-icon"><i data-lucide="bell" /></span>
                        <span>Notificaciones</span>
                      </button>
                      {adminUnreadCount > 0 && <span className="notify-badge">{adminUnreadCount > 99 ? '99+' : adminUnreadCount}</span>}
                    </div>
                  )}
                  <button className="topbar-action-btn" type="button" onClick={openProfileView}>
                    <span className="topbar-action-icon"><i data-lucide="user-round" /></span>
                    <span>Perfil</span>
                  </button>
                </div>
              </header>

              <main className="main">
                {isMobile && mobileTab === 'home' && effectiveSelectedForm === 'home' ? renderMobileHome() : isMobile && mobileTab === 'servicios' ? renderMobileServices() : isMobile && mobileTab === 'mapa' ? (<section className="panel"><h2>Mapa</h2><div className="hint">Vista de mapa próxima versión.</div></section>) : effectiveSelectedForm === 'notificaciones' ? (
                  <section className="panel profile-view">
                    <h2>Notificaciones</h2>
                    <div className="hint">Solicitudes recibidas para cambio de usuario y contraseña.</div>
                    {!isAdminUser ? (
                      <div className="profile-option">Solo administradores pueden ver esta sección.</div>
                    ) : adminCredentialRequests.length === 0 ? (
                      <div className="profile-option">No hay solicitudes registradas.</div>
                    ) : (
                      adminCredentialRequests.map((req) => (
                        <article className="profile-option" key={req.id}>
                          <h3>
                            {req.solicitanteNombre || req.solicitanteEmail || 'Usuario'}
                            <span className={`status-chip-inline ${req.estado === 'aprobada' || req.estado === 'aplicada' ? 'resolved' : req.estado === 'rechazada' ? 'rejected' : 'pending'}`} style={{ marginLeft: 8 }}>
                              {requestStatusLabel(req.estado)}
                            </span>
                          </h3>
                          <div className="kv"><b>Email:</b> {req.solicitanteEmail || '-'}</div>
                          <div className="kv"><b>Usuario solicitado:</b> {req.nuevoUsuarioSolicitado || '-'}</div>
                          <div className="kv"><b>Contraseña solicitada:</b> {req.nuevaPasswordSolicitada || '-'}</div>
                          <div className="kv"><b>Fecha y hora de solicitud:</b> {formatRequestDateTime(req.creadoEn)}</div>
                          <div className="kv"><b>Última actualización:</b> {formatRequestDateTime(req.actualizadaEn)}</div>
                          {req.estado === 'pendiente' && (
                            <div className="request-status-row">
                              <button type="button" className="status-action-btn resolve" disabled={updatingRequestId === req.id} onClick={() => updateCredentialRequestStatus(req, 'aprobada')}>
                                {updatingRequestId === req.id ? 'Actualizando...' : 'Marcar aprobada'}
                              </button>
                              <button type="button" className="status-action-btn reject" disabled={updatingRequestId === req.id} onClick={() => updateCredentialRequestStatus(req, 'rechazada')}>
                                {updatingRequestId === req.id ? 'Actualizando...' : 'Marcar rechazada'}
                              </button>
                            </div>
                          )}
                        </article>
                      ))
                    )}
                  </section>
                ) : effectiveSelectedForm === 'perfil' ? (
                  <section className="panel profile-view">
                    <h2>Mi perfil</h2>
                    <div className="hint">{currentUserName} · {topbarSubtitle}</div>
                    <article className="profile-option">
                      <h3>Solicitar cambio de usuario y contraseña</h3>
                      <form className="profile-form" onSubmit={handleProfileCredentialsRequest}>
                        <input
                          type="text"
                          placeholder="Nuevo usuario"
                          value={profileUserRequest}
                          onChange={(e) => setProfileUserRequest(e.target.value)}
                        />
                        <input
                          type="password"
                          placeholder="Nueva contraseña"
                          value={profilePasswordRequest}
                          onChange={(e) => setProfilePasswordRequest(e.target.value)}
                        />
                        <button className="save-btn profile-save-btn" type="submit">Enviar solicitud</button>
                      </form>
                    </article>
                    <article className="profile-option">
                      <h3>Estado de mis solicitudes</h3>
                      {userCredentialRequests.length === 0 ? (
                        <div className="kv">Todavía no registraste solicitudes.</div>
                      ) : (
                        userCredentialRequests.slice(0, 5).map((req) => (
                          <div key={req.id} style={{ marginBottom: 8 }}>
                            <div className="kv"><b>Estado:</b> {requestStatusLabel(req.estado)}</div>
                            <div className="kv"><b>Fecha:</b> {formatRequestDateTime(req.creadoEn)}</div>
                            {(req.estado === 'aprobada' || req.estado === 'aplicada') && req?.credencialesInformadas && (
                              <div className="kv"><b>Credenciales informadas:</b> {req.credencialesInformadas.usuario || '-'} / {req.credencialesInformadas.password || '-'}</div>
                            )}
                            {req.estado === 'aprobada' && !req.aceptadoPorUsuario && (
                              <div className="request-status-row">
                                <button
                                  type="button"
                                  className="status-action-btn accept"
                                  onClick={() => handleUserAcceptCredentialChanges(req)}
                                  disabled={acceptingRequestId === req.id}
                                >
                                  {acceptingRequestId === req.id ? 'Aplicando...' : 'Aceptar cambios y cerrar sesión'}
                                </button>
                              </div>
                            )}
                          </div>
                        ))
                      )}
                    </article>
                    <button className="logout-btn profile-logout-btn" type="button" onClick={() => auth.signOut()}>Cerrar sesión</button>
                  </section>
                ) : effectiveSelectedForm === 'dashboard-gerencia' ? (
                  <DashboardGerencia rows={visibleRows} isMobileNative={isMobile && isGerencia} />
                ) : effectiveSelectedForm === 'home' ? (
                  <>
                    <section className="hero">
                      <h2>Masterson Seguridad</h2>
                      <p className="subtitle-voga">ÁREA TÉCNICA Y COMERCIAL</p>
                    </section>
                    <section className="kpi-grid">
                      {[
                        { key: 'total', label: 'Servicios totales', value: kpiStats.total },
                        { key: 'pending', label: 'Pendientes', value: kpiStats.pending },
                        { key: 'inprogress', label: 'En curso', value: kpiStats.inprogress },
                        { key: 'completed', label: 'Completados', value: kpiStats.completed },
                      ].map((card) => (
                        <div
                          className="kpi-card-wrap"
                          key={card.key}
                          onMouseEnter={() => setActiveKpi(card.key)}
                          onMouseLeave={() => setActiveKpi((prev) => (prev === card.key ? null : prev))}
                        >
                          <article
                            className={`kpi-card ${activeKpi === card.key ? 'active' : ''}`}
                          >
                            <div className="kpi-value">{card.value}</div>
                            <div className="kpi-label">{card.label}</div>
                          </article>
                          {activeKpi === card.key && (
                            <section className="kpi-breakdown">
                              <h3>{card.key === 'total' ? 'Ranking Comercial · Servicios Totales' : card.key === 'pending' ? 'Ranking Comercial · Pendientes' : card.key === 'inprogress' ? 'Ranking Comercial · En curso' : 'Ranking Comercial · Completados'}</h3>
                              {getCommercialBreakdown(card.key).length === 0 ? (
                                <div className="hint" style={{ color: '#d1faf5', marginBottom: 0 }}>Sin datos para este indicador.</div>
                              ) : (
                                <div className="kpi-breakdown-list">
                                  {getCommercialBreakdown(card.key).map((item, index, arr) => (
                                    <div className="kpi-breakdown-item" key={`${card.key}-${item.name}`}>
                                      <div className="kpi-breakdown-left">
                                        <span className="kpi-dot" style={{ '--dot-color': getRankColor(index, arr.length) }} />
                                        <span>{item.name}</span>
                                      </div>
                                      <button
                                        type="button"
                                        className="kpi-breakdown-count"
                                        onClick={(e) => {
                                          e.stopPropagation();
                                          setSelectedCommercial(item.name);
                                          setSelectedForm('ranking-comercial');
                                          setActiveKpi(null);
                                        }}
                                      >
                                        {item.value} servicios
                                      </button>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </section>
                          )}
                        </div>
                      ))}
                    </section>
                  </>

                ) : effectiveSelectedForm === 'ranking-comercial' ? (
                  <section className="panel">
                    <h2>Listado de servicios por vendedor</h2>
                    <div className="ranking-toolbar">
                      <div className="hint" style={{ marginBottom: 0 }}>
                        Vendedor seleccionado: <b style={{ color: '#e6fffd' }}>{selectedCommercial || 'Sin asignar'}</b>
                      </div>
                      <button className="pdf-btn" type="button" onClick={() => setSelectedForm('home')}>← Volver a Inicio</button>
                    </div>
                    <div className="ranking-grid">
                      {[
                        { key: 'total', label: 'Servicios totales' },
                        { key: 'pending', label: 'Pendientes' },
                        { key: 'inprogress', label: 'En curso' },
                        { key: 'completed', label: 'Completados' },
                      ].map((section) => {
                        const list = getServicesByCommercial(section.key, selectedCommercial || 'Sin asignar');
                        return (
                          <div className="ranking-section" key={section.key}>
                            <h3>{section.label} · {list.length}</h3>
                            {list.length === 0 ? (
                              <div className="hint" style={{ color: '#d1faf5', marginBottom: 0 }}>Sin servicios en esta sección.</div>
                            ) : (
                              <div className="ranking-services">
                                {list.map((service) => {
                                  const allowedEdit = canEditService(service);
                                  const showRestriction = !isAdminUser && !allowedEdit;
                                  return (
                                    <div className="ranking-service-row" key={service.id}>
                                      <button
                                        type="button"
                                        className="ranking-service-btn"
                                        onClick={() => {
                                          setSelectedService(service);
                                          setSelectedForm('historial');
                                        }}
                                      >
                                        {service.nombreServicio || 'Servicio sin nombre'} · ID {service.clienteId || '-'}
                                      </button>
                                      <div className="ranking-service-actions">
                                        <button
                                          type="button"
                                          className="edit-btn"
                                          disabled={!allowedEdit}
                                          onClick={() => startEditService(service)}
                                        >
                                          {allowedEdit ? '✎ Editar servicio' : '🔒 Editar'}
                                        </button>
                                        {showRestriction && <span className="lock-hint">🔒 Solo lectura</span>}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </section>
) : effectiveSelectedForm === 'historial' ? (
                  <section className="panel">
                    <h2>Historial de Servicios · Vista Ejecutiva</h2>
